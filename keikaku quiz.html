<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2級建築士 計画 マラソンテスト</title>
<style>
  :root{
    --ink:#1b1830; --ink-soft:#494363;
    --paper:#edecf4; --paper-2:#f9f9fc; --line:#d4d2e2;
    --accent:#5a51a0; --accent-soft:#e7e3f4;
    --ok:#2f7d54; --ok-soft:#e0efe5;
    --ng:#b4392f; --ng-soft:#f4e0dd;
    --mono:"SFMono-Regular",ui-monospace,"Roboto Mono",Menlo,monospace;
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--jp);color:var(--ink);background:var(--paper);
    background-image:linear-gradient(var(--line) 1px,transparent 1px);background-size:100% 40px;
    line-height:1.7;min-height:100%;display:flex;justify-content:center;}
  .app{width:100%;max-width:560px;min-height:100dvh;background:var(--paper-2);
    border-left:1px solid var(--line);border-right:1px solid var(--line);display:flex;flex-direction:column;}

  header{padding:18px 20px 14px;border-bottom:2px solid var(--ink);background:var(--paper-2);position:sticky;top:0;z-index:5;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
  h1{font-size:18px;font-weight:800;letter-spacing:.02em;margin-top:2px;}
  .meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);}
  .meta b{color:var(--ink);font-size:13px;}
  .track{height:5px;background:var(--accent-soft);margin-top:8px;border-radius:2px;overflow:hidden;}
  .bar{height:100%;width:0;background:var(--accent);transition:width .35s ease;}
  header.compact .meta,header.compact .track{display:none;}

  main{flex:1;padding:22px 20px 30px;display:flex;flex-direction:column;}
  .section-tag{display:inline-block;font-size:12px;font-weight:700;color:var(--ink-soft);
    border:1px solid var(--line);border-radius:20px;padding:3px 12px;margin-bottom:16px;align-self:flex-start;background:var(--paper);}
  .qhead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
  .qno{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--ink);line-height:1;}
  .qsrc{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:auto;}
  .stmt{font-size:18px;font-weight:500;letter-spacing:.01em;}
  .prompt{font-size:13px;color:var(--ink-soft);margin-top:16px;}

  .choices{display:flex;gap:14px;margin-top:14px;}
  .bubble{flex:1;cursor:pointer;border:1.5px solid var(--ink);background:var(--paper-2);
    border-radius:14px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .08s ease,background .15s ease;font-family:inherit;}
  .bubble:active{transform:scale(.97);}
  .mark{width:46px;height:46px;border-radius:50%;border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;font-weight:700;
    transition:background .15s ease,color .15s ease;}
  .blabel{font-size:14px;font-weight:700;}
  .bubble.dim{opacity:.4;}
  .bubble.chosen .mark{background:var(--ink);color:var(--paper-2);}
  .bubble.correct{border-color:var(--ok);background:var(--ok-soft);}
  .bubble.correct .mark{background:var(--ok);border-color:var(--ok);color:#fff;}
  .bubble.wrong{border-color:var(--ng);background:var(--ng-soft);}
  .bubble.wrong .mark{background:var(--ng);border-color:var(--ng);color:#fff;}
  .bubble[disabled]{cursor:default;}

  .fb{margin-top:20px;border-top:1px dashed var(--line);padding-top:18px;display:none;}
  .fb.show{display:block;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .verdict{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;}
  .verdict .dot{width:11px;height:11px;border-radius:50%;}
  .verdict.y{color:var(--ok);} .verdict.y .dot{background:var(--ok);}
  .verdict.n{color:var(--ng);} .verdict.n .dot{background:var(--ng);}
  .ansline{font-size:14px;margin-top:8px;color:var(--ink-soft);}
  .ansline b{color:var(--ink);}
  .point{margin-top:12px;background:var(--paper);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 8px 8px 0;font-size:14.5px;}
  .point .pt-l{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--accent);display:block;margin-bottom:4px;}

  .actions{margin-top:auto;padding-top:24px;}
  .next{width:100%;border:none;background:var(--ink);color:var(--paper-2);font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.04em;padding:16px;border-radius:14px;cursor:pointer;transition:opacity .15s ease;}
  .next:active{opacity:.85;} .next:disabled{opacity:.3;cursor:default;}

  .result{padding:30px 20px;text-align:center;display:none;flex-direction:column;flex:1;}
  .result.show{display:flex;}
  .score-big{font-family:var(--mono);font-size:64px;font-weight:700;line-height:1;color:var(--accent);}
  .score-sub{font-size:14px;color:var(--ink-soft);margin-top:6px;}
  .pct{font-family:var(--mono);font-size:15px;margin-top:18px;font-weight:700;}
  .review{margin-top:24px;text-align:left;}
  .review h3{font-size:13px;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:10px;font-family:var(--mono);}
  .miss{display:flex;gap:10px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .miss .mno{font-family:var(--mono);font-weight:700;color:var(--ng);min-width:36px;}
  .rbtn{width:100%;font-family:inherit;font-size:15px;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;margin-top:14px;}
  .rbtn.solid{border:none;background:var(--accent);color:#fff;}
  .rbtn.ghost{border:1.5px solid var(--ink);background:transparent;color:var(--ink);}
  .note{font-size:11.5px;color:var(--ink-soft);text-align:center;padding:14px 20px;border-top:1px solid var(--line);font-family:var(--mono);}

  .home{padding:30px 20px;flex:1;display:flex;flex-direction:column;}
  .home.hide{display:none;}
  .home .lead{font-size:14px;color:var(--ink-soft);margin-bottom:22px;line-height:1.8;}
  .home .lead b{color:var(--ink);}
  .pick{width:100%;text-align:left;border:1.5px solid var(--ink);background:var(--paper-2);border-radius:16px;padding:18px;margin-bottom:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:16px;transition:transform .08s ease,background .15s ease;}
  .pick:active{transform:scale(.98);background:var(--accent-soft);}
  .pick.retry{border-color:var(--accent);background:var(--accent-soft);}
  .pick .rng{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);min-width:84px;}
  .pick .ttl{font-size:16px;font-weight:700;}
  .pick .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .pick .txt{flex:1;} .pick .arw{font-size:20px;color:var(--ink-soft);}
  .hsec{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--ink-soft);margin:6px 0 12px;}
  .pending{font-size:12px;color:var(--ink-soft);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;margin-top:4px;line-height:1.7;}
  .star-btn{background:#fff;border:1px solid #d9d6e0;border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700;color:#85889a;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:auto;}
  .star-btn:active{transform:scale(.94);}
  .star-btn.on{background:#fffaf0;border-color:#f0c850;color:#b8860b;}
  .pick.star .rng{color:#b8860b;}
</style>
</head>
<body>
<div class="app">
  <header id="hdr" class="compact">
    <span class="eyebrow">2026 / 計画 マラソンテスト</span>
    <h1>1問ずつ解く 〇✕トレーナー</h1>
    <div class="meta">
      <span>問 <b id="cur">–</b> / <span id="total">–</span></span>
      <span>正答 <b id="hit">0</b></span>
    </div>
    <div class="track"><div class="bar" id="bar"></div></div>
  </header>

  <div class="home" id="home">
    <p class="lead">適当／不適当を判定する〇✕形式（環境・設備）。間違えた問題は記録され、<b>あとから間違いだけ再テスト</b>できます。</p>
    <button class="pick star" id="starHome" style="display:none;" onclick="startStarred()"><span class="rng">★</span><span class="txt"><span class="ttl">気になる問題</span><div class="sub" id="starHomeSub"></div></span><span class="arw">→</span></button>
    <button class="pick retry" id="retryStore" style="display:none;" onclick="startStoredWrong()">
      <span class="rng">復習</span>
      <span class="txt"><span class="ttl">前回までの間違いを再テスト</span><div class="sub" id="retryStoreSub"></div></span>
      <span class="arw">→</span>
    </button>
    <div class="hsec">出題範囲をえらぶ</div>
    <div id="homeButtons"></div>
    <div class="pending" id="pending"></div>
  </div>

  <main id="main" style="display:none;">
    <span class="section-tag" id="sec"></span>
    <div class="qhead">
      <span class="qno" id="qno"></span>
      <span class="qsrc" id="qsrc"></span>
      <button class="star-btn" id="starBtn" type="button">☆ 気になる</button>
    </div>
    <p class="stmt" id="stmt"></p>
    <p class="prompt">適当なら ① 、不適当なら ② を選ぶ</p>

    <div class="choices">
      <button class="bubble" id="b1" onclick="answer(1)"><span class="mark">①</span><span class="blabel">適当</span></button>
      <button class="bubble" id="b2" onclick="answer(2)"><span class="mark">②</span><span class="blabel">不適当</span></button>
    </div>

    <div class="fb" id="fb">
      <div class="verdict" id="verdict"><span class="dot"></span><span id="vtext"></span></div>
      <div class="ansline">正解は <b id="ans"></b> です。</div>
      <div class="point"><span class="pt-l">POINT</span><span id="point"></span></div>
    </div>

    <div class="actions"><button class="next" id="next" onclick="nextQ()" disabled>解答する</button></div>
  </main>

  <div class="result" id="result">
    <div class="score-big" id="rScore">0</div>
    <div class="score-sub" id="rSub"></div>
    <div class="pct" id="rPct"></div>
    <div class="review" id="reviewWrap"><h3>復習リスト（間違えた問題）</h3><div id="missList"></div></div>
    <button class="rbtn solid" id="retryNow" onclick="retryMisses()">間違えた問題だけ再テスト</button>
    <button class="rbtn ghost" onclick="goHome()">範囲をえらび直す</button>
  </div>

  <div class="note" id="note">2026 マラソンテスト 計画 ／ 全100問 収録</div>
</div>

<script>
const QUESTIONS = [
 {n:1, sec:"屋外気候・室内環境", src:"066・2", a:2,
  q:"ヒートアイランド現象は、大気中の二酸化炭素などの温室効果ガスが増えることを主たる要因として気温が上昇する現象である。",
  p:"ヒートアイランドの主因は都市化（舗装・排熱・緑地の減少）。温室効果ガスによる地球温暖化とは別物。"},
 {n:2, sec:"屋外気候・室内環境", src:"010・3", a:1,
  q:"一般に、全天積算日射量は夏至の頃に最大となるが、月平均気温は地面の熱容量のため、夏至より遅れて最高となる。",
  p:"気温のピークは日射のピークより遅れる（地面の蓄熱のため）。正しい。"},
 {n:3, sec:"屋外気候・室内環境", src:"012・3", a:1,
  q:"快晴日における屋外の絶対湿度は、一般に、1日の中ではあまり変化しないので、相対湿度は気温の高い日中に低く、気温の低い夜間に高くなる。",
  p:"絶対湿度がほぼ一定なら、気温が上がる日中は相対湿度が下がる。正しい。"},
 {n:4, sec:"屋外気候・室内環境", src:"006・1", a:1,
  q:"絶対湿度が同じであれば、空気を加熱・冷却しても、その空気の露点温度は変化しない。",
  p:"露点は水蒸気量（絶対湿度）で決まる。水蒸気量が同じなら露点は不変。正しい。"},
 {n:5, sec:"屋外気候・室内環境", src:"005・2", a:2,
  q:"乾球温度が同じであれば、乾球温度と湿球温度との差が大きいほうが、相対湿度は高い。",
  p:"乾湿差が大きい＝乾いている＝相対湿度は低い。「高い」は誤り。"},

 {n:6, sec:"空気汚染・換気", src:"007・4", a:1,
  q:"透湿とは、多孔質材料等の壁の両側に水蒸気圧差がある場合、水蒸気圧の高いほうから低いほうへ壁を通して湿気が移動することである。",
  p:"透湿の定義として正しい。"},
 {n:7, sec:"空気汚染・換気", src:"009・5", a:1,
  q:"JIS及びJASのホルムアルデヒド放散量による等級区分の表示記号では、「F☆☆☆」より「F☆☆☆☆」のほうが放散量は小さい。",
  p:"☆が多いほど放散量が少ない。F☆☆☆☆が最も少ない。正しい。"},
 {n:8, sec:"空気汚染・換気", src:"009・3", a:1,
  q:"居室の必要換気量は、一般に、居室内の二酸化炭素濃度の許容値を基準にして算出する。",
  p:"CO₂濃度（許容1,000ppm）を基準に必要換気量を求める。正しい。"},
 {n:9, sec:"空気汚染・換気", src:"018・3", a:2,
  q:"冬期、屋内の温度より外気温のほうが低い場合、屋内外の温度差によって、上部には外気が流入する力が生じ、下部には屋内の空気が流出する力が生じる。",
  p:"温度差換気は逆。暖かい室内空気は上昇し、上部から流出・下部から外気が流入する。記述は上下が逆で誤り。"},
 {n:10, sec:"空気汚染・換気", src:"016・2", a:1,
  q:"居室の空気中において、一般に、二酸化炭素の許容濃度は0.1％(1,000ppm)であり、毒性の強い一酸化炭素の許容濃度は0.0006％(6ppm)である。",
  p:"CO₂＝1,000ppm、CO＝6ppm。いずれも基準値どおりで正しい。"},

 {n:11, sec:"伝熱・結露", src:"063・5", a:1,
  q:"対流熱伝達は、壁面などの固体表面とそれに接している空気との間に生じる熱移動現象のことである。",
  p:"対流熱伝達の定義として正しい。"},
 {n:12, sec:"伝熱・結露", src:"023・5", a:2,
  q:"物質の熱容量が小さくなると、熱の吸収による温度上昇と放出による温度降下とが遅くなり、蓄熱という現象が生じる。",
  p:"熱容量が小さいほど温度変化は速く、蓄熱しにくい。記述は逆で誤り。"},
 {n:13, sec:"伝熱・結露", src:"024・4", a:2,
  q:"白色ペイント塗りの壁においては、短波長放射である可視光線の反射率は低く、長波長放射である赤外線の反射率は高い。",
  p:"白色は可視光（短波長）の反射率が高い。赤外線（長波長）はむしろ吸収・放射しやすい。逆で誤り。"},
 {n:14, sec:"伝熱・結露", src:"032・1", a:1,
  q:"冬期において、外壁の室内側に生じる表面結露は、防湿層を設けても防ぐことができない。",
  p:"防湿層は壁内部の内部結露対策。表面結露は断熱強化や湿度低下で防ぐ。防湿層では防げない、で正しい。"},
 {n:15, sec:"伝熱・結露", src:"024・5", a:2,
  q:"壁体の外気側表面の熱伝達抵抗の値は、一般に、室内側の熱伝達抵抗の値に比べて大きい。",
  p:"外気側は風で熱が伝わりやすく、熱伝達抵抗は小さい。「大きい」は誤り。"},

 {n:16, sec:"日照・日射・採光", src:"034・2", a:1,
  q:"地表面放射と大気放射の差を、実効放射(夜間放射)という。",
  p:"実効放射（夜間放射）の定義として正しい。"},
 {n:17, sec:"日照・日射・採光", src:"038・2", a:1,
  q:"窓の日射遮蔽係数は、その値が大きいほど日射の遮蔽効果は低い。",
  p:"遮蔽係数が大きい＝日射が多く入る＝遮蔽効果は低い。正しい。"},
 {n:18, sec:"日照・日射・採光", src:"038・4", a:2,
  q:"建築物の開口部に水平な庇を設ける場合、夏期における日射遮蔽効果は、南面より西面のほうが大きい。",
  p:"水平庇は太陽高度の高い南面で効果大。低い西日には効きにくい。南＞西なので記述は誤り。"},
 {n:19, sec:"日照・日射・採光", src:"036・3", a:1,
  q:"冬至の日の1日当たりの直達日射量は、水平面より南向き鉛直面のほうが大きい。",
  p:"冬は太陽高度が低く、南向き鉛直面のほうが日射を多く受ける。正しい。"},
 {n:20, sec:"日照・日射・採光", src:"053・1", a:2,
  q:"昼光率は、室内の壁や天井の表面の反射の影響を受けない。",
  p:"昼光率には反射光（間接昼光率）が含まれる。表面反射の影響を受ける。「受けない」は誤り。"},

 {n:21, sec:"音響", src:"047・5", a:2,
  q:"板状材料と剛壁の間に空気層を設けた吸音構造は、一般に、低音域の吸音よりも高音域の吸音に効果がある。",
  p:"板（膜）振動型の吸音は低音域に効く。高音域ではない。記述は逆で誤り。"},
 {n:22, sec:"音響", src:"050・3", a:2,
  q:"壁体における透過損失の値が小さいほど、遮音性能が優れている。",
  p:"透過損失が大きいほど遮音性能が高い。「小さいほど優れる」は逆で誤り。"},
 {n:23, sec:"音響", src:"048・2", a:1,
  q:"日本産業規格(JIS)における床衝撃音遮断性能の等級Lrについては、その数値が小さくなるほど床衝撃音の遮断性能が高くなる。",
  p:"Lrは小さいほど遮断性能が高い。正しい。"},
 {n:24, sec:"音響", src:"042・3", a:2,
  q:"室用途による室内騒音の評価値(NC値)は、その値が大きいほど、許容される騒音レベルは低くなる。",
  p:"NC値が大きい＝より大きな騒音を許容する。記述は逆で誤り。"},
 {n:25, sec:"音響", src:"049・2", a:2,
  q:"音が球面状に一様に広がる点音源の場合、音源からの距離が1/2になると音圧レベルは、約3dB上昇する。",
  p:"点音源は距離1/2で約+6dB（距離2倍で−6dB）。「3dB」は誤り。"},

 {n:26, sec:"光・色彩", src:"052・2", a:2,
  q:"色光の加法混色において、赤(R)、緑(G)、青(B)を同じ割合で混色すると、黒色になる。",
  p:"光の加法混色でRGBを等量混ぜると白色になる。黒は誤り。"},
 {n:27, sec:"光・色彩", src:"059・3", a:1,
  q:"マンセル表色系における明度は、面の色の明るさを示す指標であり、反射率の高低に応じて変化する。",
  p:"明度（Value）は反射率に対応して変化する。正しい。"},
 {n:28, sec:"光・色彩", src:"052・4", a:1,
  q:"マンセル色相環において、対角線上に位置する色同士を同じ割合で混色すると、無彩色になる。",
  p:"補色同士（色相環の反対）を混ぜると無彩色になる。正しい。"},

 {n:29, sec:"環境用語・単位", src:"061・2", a:1,
  q:"日射量は、ある面が受ける単位面積・単位時間当たりの日射エネルギー量で表される。",
  p:"正しい（単位はW/m²）。"},
 {n:30, sec:"環境用語・単位", src:"R07・03・2", a:1,
  q:"音の強さは、音波の進行方向に垂直な単位面積を単位時間当たりに通過する音響エネルギー量で表され、その単位はW/m²である。",
  p:"音の強さ（音響インテンシティ）の定義と単位として正しい。"},

 {n:31, sec:"空気調和設備", src:"078・4", a:2,
  q:"定風量単一ダクト方式は、ファンコイルユニットと定風量単一ダクトとを併用した方式に比べて、必要とするダクトスペースを小さくすることができる。",
  p:"全空気の単一ダクトは風量が多くダクトが大きい。FCU併用方式のほうがダクトは小さい。記述は逆で誤り。"},
 {n:32, sec:"空気調和設備", src:"078・2", a:1,
  q:"変風量単一ダクト方式は、低負荷時においては、必要換気量の確保と空気清浄度の維持が困難な場合がある。",
  p:"VAVは低負荷で風量を絞るため、換気不足になりうる。正しい。"},
 {n:33, sec:"空気調和設備", src:"081・3", a:2,
  q:"空気熱源ヒートポンプ方式のルームエアコンの暖房能力は、外気の温度が低くなるほど向上する。",
  p:"外気温が下がると暖房能力は低下する（着霜・効率低下）。「向上」は誤り。"},
 {n:34, sec:"空気調和設備", src:"083・3", a:2,
  q:"最下階に蓄熱槽を設けた開放回路配管方式は、密閉回路配管方式に比べて、一般に、ポンプ動力を低減することができる。",
  p:"開放回路は水を汲み上げる必要があり、密閉回路よりポンプ動力は大きい。「低減」は誤り。"},
 {n:35, sec:"空気調和設備", src:"083・4", a:2,
  q:"開放式冷却塔の冷却効果は、主として、「冷却水に接触する空気の温度」と「冷却水の温度」との差によって得られる。",
  p:"冷却塔は主に蒸発（潜熱）で冷却し、基準は空気の湿球温度。乾球の「空気の温度」差ではない。誤り。"},
 {n:36, sec:"空気調和設備", src:"075・1", a:1,
  q:"床吹出し空調方式は、冷房時には、通常の天井吹出し空調方式よりも給気温度を高くする必要がある。",
  p:"足元の冷え過ぎを防ぐため、床吹出しは給気温度を高めにする。正しい。"},
 {n:37, sec:"空気調和設備", src:"123・5", a:1,
  q:"窓システムにおいて、日射による窓部からの熱負荷低減を図るには、一般に、エアバリアよりダブルスキンのほうが効果が高い。",
  p:"ダブルスキンは日射による熱負荷の低減効果が高い。正しい（類似・参考問題）。"},
 {n:38, sec:"空気調和設備", src:"077・2", a:1,
  q:"10〜12℃程度の低温冷風を利用した低温送風空調方式は、送風搬送動力の低減が可能であり、空調機やダクトサイズを小さくすることができる。",
  p:"低温で送ると必要風量が減り、ダクト・送風機を小型化できる。正しい。"},

 {n:39, sec:"給水・給湯設備", src:"088・1", a:1,
  q:"水道直結増圧方式において、水道本管への逆流を防止するためには、一般に、増圧ポンプの吸込み側に逆流防止装置を設置する。",
  p:"増圧ポンプの吸込み側に逆流防止装置を設ける。正しい。"},
 {n:40, sec:"給水・給湯設備", src:"085・2", a:1,
  q:"事務所ビルにおける飲料水の受水槽の有効容量は、一般に、1日当たりの予想給水量の1/3〜1/2程度とする。",
  p:"受水槽は1日使用量のおよそ1/2を目安とする（高置水槽は1/10程度）。記述は適当。"},
 {n:41, sec:"給水・給湯設備", src:"098・4", a:1,
  q:"飲料水用受水槽のオーバーフロー管の排水は、一般排水系統の配管に間接排水とする。",
  p:"逆流・汚染防止のため、排水口空間を設けた間接排水とする。正しい。"},
 {n:42, sec:"給水・給湯設備", src:"098・1", a:1,
  q:"クロスコネクションは、飲料水の給水・給湯系統とその他の系統とが、配管・装置により直接接続されることをいう。",
  p:"クロスコネクションの定義として正しい（禁止事項）。"},

 {n:43, sec:"排水・衛生設備", src:"088・4", a:2,
  q:"通気立て管の下部は、最低位の排水横枝管より高い位置において、排水立て管に接続する。",
  p:"通気立て管の下部は最低位の排水横枝管より「低い位置」で接続する。「高い位置」は誤り。"},
 {n:44, sec:"排水・衛生設備", src:"095・5", a:1,
  q:"自然流下式の排水立て管の管径は、どの階においても、最下部の最も大きな排水負荷を負担する部分の管径と同一にする必要がある。",
  p:"排水立て管は上階で細くせず、最下部に合わせた同一管径とする。正しい。"},
 {n:45, sec:"排水・衛生設備", src:"091・3", a:2,
  q:"トラップの封水深は、トラップの管径が25mmの場合は管径と同寸法である25mm程度とする。",
  p:"封水深は管径によらず50〜100mm。25mmは浅すぎる。誤り。"},

 {n:46, sec:"電気・照明設備", src:"102・4", a:2,
  q:"中小規模の事務所ビルにおいて、電灯・コンセント用幹線の電気方式には、一般に、単相2線式100Vが用いられる。",
  p:"一般には単相3線式100/200Vを用いる。単相2線式100Vは誤り。"},
 {n:47, sec:"電気・照明設備", src:"104・1", a:2,
  q:"同一電線管に収める電線本数が多くなると、電線の許容電流は大きくなる。",
  p:"本数が増えると放熱が悪くなり、許容電流は小さくなる（電流減少係数）。「大きくなる」は誤り。"},
 {n:48, sec:"電気・照明設備", src:"102・1", a:2,
  q:"接地工事の種類は、接地工事の施設方法、接地抵抗値及び接地線の太さに応じて、A種、B種、C種の3種類である。",
  p:"接地工事はA・B・C・D種の4種類。3種類は誤り。"},
 {n:49, sec:"電気・照明設備", src:"109・4", a:1,
  q:"昼光利用制御は、室内に入る自然光を利用して、照明器具の調光を行うものである。",
  p:"昼光利用制御（デイライト制御）の説明として正しい。"},

 {n:50, sec:"電気・照明設備", src:"108・2", a:1,
  q:"LEDランプは、水銀の使用がなく、蛍光ランプに比べて熱放射が少なく寿命が長い。",
  p:"LEDの特徴として正しい（水銀フリー・低発熱・長寿命）。"},

 {n:51, sec:"消火・防災設備", src:"114・2", a:1,
  q:"屋外消火栓設備は、屋外から建築物の1階及び2階の火災を消火し、隣接する建築物への延焼等を防止するための設備である。",
  p:"屋外消火栓は主に1・2階の火災消火と延焼防止用。正しい。"},
 {n:52, sec:"消火・防災設備", src:"115・5", a:2,
  q:"水噴霧消火設備は、油火災の消火には適さない。",
  p:"水噴霧は霧状の水で窒息・冷却し、油火災にも有効。「適さない」は誤り。"},
 {n:53, sec:"消火・防災設備", src:"115・2", a:1,
  q:"閉鎖型スプリンクラー設備には、湿式、乾式及び予作動式の3種類がある。",
  p:"閉鎖型は湿式・乾式・予作動式の3種類。正しい。"},
 {n:54, sec:"消火・防災設備", src:"115・1", a:1,
  q:"非常警報設備の非常ベルは、音響装置の中心から1m離れた位置で90dB以上の音圧が必要である。",
  p:"非常ベルは中心から1mで90dB以上。正しい。"},
 {n:55, sec:"消火・防災設備", src:"116・1", a:2,
  q:"自動火災報知設備の定温式感知器は、周囲温度が一定の温度上昇率になったときに作動する。",
  p:"定温式は「一定の温度」に達したとき作動。「温度上昇率」で作動するのは差動式。誤り。"},

 {n:56, sec:"環境への配慮・省エネ", src:"R07・25・5", a:1,
  q:"ZEHは、室内環境の質を維持しつつ大幅な省エネルギーを実現したうえで、再生可能エネルギーを導入することにより、年間の一次エネルギー消費量の収支をゼロ又はマイナスとすることを目指した住宅である。",
  p:"ZEH（ネット・ゼロ・エネルギー・ハウス）の定義として正しい。"},
 {n:57, sec:"環境への配慮・省エネ", src:"119・4", a:1,
  q:"CASBEE(建築環境総合性能評価システム)におけるBEE(建築物の環境性能効率)を高めるため、建築物の環境品質(Q)の数値を大きく、かつ、建築物の環境負荷(L)の数値が小さくなるように計画した。",
  p:"BEE＝Q/L。Qを大きく・Lを小さくするとBEEは高くなる。正しい。"},
 {n:58, sec:"環境への配慮・省エネ", src:"121・5", a:1,
  q:"太陽熱利用のダイレクトゲイン方式とは、窓から入射する日射熱を直接、床や壁に蓄熱し、夜間時に放熱させる方式である。",
  p:"ダイレクトゲイン方式の説明として正しい。"},

 {n:59, sec:"設備用語", src:"131・2", a:2,
  q:"UPS ── 構内電話交換機のことであり、「事業所内などでの電話機相互の接続」と「電話局の回線と事業所内の電話機との接続」を行う装置である。",
  p:"これはPBX（構内交換機）の説明。UPSは無停電電源装置。組合せが誤り。"},
 {n:60, sec:"設備用語", src:"131・3", a:1,
  q:"SHF ── 空調機により空気に加えられる、又は、空気から除去される熱量のうち、顕熱量の占める割合である。",
  p:"SHF（顕熱比）の説明として正しい。"},

 {n:61, sec:"住宅", src:"159・5", a:2,
  q:"ツインベッドを用いる夫婦寝室の広さを、収納スペースを含めて、内法面積で9m²とした。",
  p:"ツインの夫婦寝室は収納込みで13〜15m²程度必要。9m²は狭すぎ。誤り。"},
 {n:62, sec:"住宅", src:"177・1", a:1,
  q:"食器棚(幅1,800mm、奥行450mm)と6人掛けの食卓があるダイニングの広さを、内法面積で13m²とした。",
  p:"6人掛け食卓＋食器棚なら13m²程度は妥当。正しい。"},

 {n:63, sec:"高齢者配慮の住宅", src:"182・4", a:1,
  q:"階段の昇り口の側壁に設ける足元灯の高さは、昇り口の1段目の踏面から上方に300mmとした。",
  p:"足元灯の取付け高さとして妥当。正しい。"},
 {n:64, sec:"高齢者配慮の住宅", src:"185・1", a:1,
  q:"高齢者に配慮して、階段の手摺の直径を35mmとし、段鼻からの高さを750mmとした。",
  p:"手摺径32〜36mm、高さ750〜800mm程度。正しい。"},
 {n:65, sec:"高齢者配慮の住宅", src:"179・3", a:1,
  q:"車椅子使用者に配慮し、居室の出入口扉の前後は段差を避け、内法寸法で1,400mm×1,400mm程度のスペースを確保した。",
  p:"車椅子の回転に1,400mm角程度を確保する。正しい。"},

 {n:66, sec:"集合住宅", src:"188・1", a:2,
  q:"テラスハウスは、共用の中庭を中心に、それを囲んで配置される集合住宅の形式である。",
  p:"これはコートハウス（中庭型）の説明。テラスハウスは各戸に専用庭をもつ連続住宅。誤り。"},
 {n:67, sec:"集合住宅", src:"190・3", a:2,
  q:"コレクティブハウスは、住宅入居希望者が組合を作り、協力して企画・設計から入居・管理まで運営していく方式の集合住宅である。",
  p:"これはコーポラティブハウスの説明。コレクティブハウスは家事等を共同化し共用空間をもつ形式。誤り。"},
 {n:68, sec:"集合住宅", src:"192・4", a:1,
  q:"スケルトンインフィル住宅は、「建築物の躯体や共用設備部分」と「住戸専有部分の内装や設備」とを明確に分けて計画することによって、住戸の更新性や可変性を高めた集合住宅である。",
  p:"SI住宅の説明として正しい。"},
 {n:69, sec:"集合住宅", src:"187・3", a:2,
  q:"専用面積が小さい住戸で構成する集合住宅を、メゾネット型とした。",
  p:"メゾネットは1住戸で2層を使う形式で、専用面積の大きい住戸向き。小住戸には不向き。誤り。"},
 {n:70, sec:"集合住宅", src:"190・4", a:1,
  q:"スキップフロア型は、一般に、共用廊下を介さずに、外気に接する2方向の開口部を有した住戸を設けることができる。",
  p:"スキップフロア型の特徴として正しい。"},

 {n:71, sec:"事務所", src:"198・1", a:2,
  q:"レンタブル比は、貸事務所ビルの収益性に関する指標の一つであり、収益部分の床面積に対する非収益部分の床面積の割合である。",
  p:"レンタブル比は延べ（基準階）面積に対する収益部分の割合。記述は分母・分子が逆で誤り。"},
 {n:72, sec:"事務所", src:"201・3", a:1,
  q:"事務室の在席率が50〜60％と想定されたので、執務空間の効率的な活用を考慮し、フリーアドレス方式を採用した。",
  p:"在席率が低い場合のフリーアドレスは合理的。正しい。"},
 {n:73, sec:"事務所", src:"196・5", a:1,
  q:"基準階の平面プランとして、片コア(偏心コア)タイプを採用したので、コア部分にも、外光・外気を取入れやすい計画とした。",
  p:"片コアはコアが外周側に寄るため外光・外気を取り入れやすい。正しい。"},
 {n:74, sec:"事務所", src:"198・3", a:2,
  q:"事務室の机の配置方式において、特に業務に集中することが必要な場合、一般に、並行式レイアウトよりも対向式レイアウトのほうが適している。",
  p:"集中作業には同じ向きの並行式が適する。向かい合う対向式は協働向き。記述は逆で誤り。"},

 {n:75, sec:"商業建築", src:"195・5", a:1,
  q:"レストランにおいて、厨房の床面積は、一般に、延べ面積の25〜40％程度である。",
  p:"レストランの厨房は延べ面積の25〜40％程度。正しい。"},
 {n:76, sec:"商業建築", src:"195・3", a:2,
  q:"量販店において、「延べ面積」に対する「売場部分の床面積の合計(売場内の通路を含む。)」の割合を50％とした。",
  p:"量販店の売場率は一般に60〜65％程度。50％は低すぎ。誤り。"},
 {n:77, sec:"商業建築", src:"209・4", a:1,
  q:"劇場において、客席側から見て右側を、舞台の上手といい、周囲の諸室の関係性を含めて計画した。",
  p:"客席から見て右が上手（かみて）、左が下手。正しい。"},
 {n:78, sec:"商業建築", src:"213・1", a:1,
  q:"劇場において、演目に応じて舞台と観客席との関係を変化させることができるように、アダプタブルステージ形式を採用した。",
  p:"可変舞台（アダプタブルステージ）の説明として正しい。"},
 {n:79, sec:"商業建築", src:"200・4", a:1,
  q:"ビジネスホテルにおいて、客室部門の床面積の合計は、一般に、延べ面積の60〜70％程度である。",
  p:"ビジネスホテルの客室部門は延べ面積の60〜70％程度。正しい。"},

 {n:80, sec:"公共建築", src:"204・5", a:2,
  q:"教科教室型の中学校において、学校生活の拠点となるホームベースを、教室移動の動線から離して、落ち着いた奥まった位置に設けた。",
  p:"ホームベースは生徒の生活拠点で、移動動線に沿った使いやすい位置に設ける。動線から離した奥まった位置は不適。誤り。"},
 {n:81, sec:"公共建築", src:"219・5", a:2,
  q:"保育所において、保育室は、乳児用と幼児用とを間仕切りのないワンルームとし、乳児と幼児の人数比の変動に対応できるようにした。",
  p:"乳児と幼児は発達段階・安全管理が異なるため保育室は分ける。間仕切りなしのワンルームは不適。誤り。"},
 {n:82, sec:"公共建築", src:"R07・14・5", a:2,
  q:"地域図書館において、書架を設置しない40席の閲覧室の床面積を、50m²とした。",
  p:"閲覧室は1席当たり約1.6〜3m²。40席なら64m²以上必要。50m²は狭すぎ。誤り。"},
 {n:83, sec:"公共建築", src:"214・3", a:1,
  q:"美術館において、展示室の床面積の合計を、延べ面積の40％程度となるように計画した。",
  p:"美術館の展示室は延べ面積の30〜50％程度。40％は妥当。正しい。"},
 {n:84, sec:"公共建築", src:"157・1", a:2,
  q:"病院において、患者4人収容の一般病室の内法面積を、20m²とした。",
  p:"一般病室は患者1人当たり内法6.4m²以上。4人なら25.6m²以上必要。20m²は不足。誤り。"},
 {n:85, sec:"公共建築", src:"218・4", a:1,
  q:"ケアハウスは、家族による援助を受けることが困難な高齢者が、日常生活上必要なサービスを受けながら自立的な生活をする施設である。",
  p:"ケアハウス（軽費老人ホームC型）の説明として正しい。"},

 {n:86, sec:"計画一般（駐車・寸法・防災ほか）", src:"154・3", a:1,

let idx=0, hits=0, locked=false;
let ACTIVE=[]; let misses=[]; let storedWrong=[];
const STORE_KEY="keikaku_wrong";
/* ===== 気になる(★) ===== */
let starred=[];
const STAR_KEY="keikaku_star";
async function loadStarred(){
  let v=null;
  try{ if(window.storage&&window.storage.get){const r=await window.storage.get(STAR_KEY); if(r&&r.value!=null)v=r.value;} }catch(e){}
  if(v==null){ try{ v=localStorage.getItem(STAR_KEY);}catch(e){} }
  try{ starred=v?JSON.parse(v):[]; }catch(e){ starred=[]; }
  refreshStarButton();
}
async function saveStarred(){
  const v=JSON.stringify(starred);
  try{ if(window.storage&&window.storage.set){await window.storage.set(STAR_KEY,v);} }catch(e){}
  try{ localStorage.setItem(STAR_KEY,v);}catch(e){}
}
function refreshStarButton(){
  const b=document.getElementById("starHome"); if(!b) return;
  const sub=document.getElementById("starHomeSub");
  if(starred.length>0){ if(sub) sub.textContent="★を付けた "+starred.length+" 問だけ集中"; b.style.display="flex"; }
  else b.style.display="none";
}
function startStarred(){ startSet(QUESTIONS.filter(q=>starred.includes(q.n))); }
function setStarIcon(btn,on){ btn.classList.toggle("on",on); btn.textContent=on?"★ 気になる":"☆ 気になる"; }
async function toggleStar(btn,q){ const i=starred.indexOf(q.n); if(i<0)starred.push(q.n); else starred.splice(i,1); setStarIcon(btn,i<0); await saveStarred(); refreshStarButton(); }

const $=id=>document.getElementById(id);

async function loadStored(){
  try{ const r=await window.storage.get(STORE_KEY); storedWrong=r&&r.value?JSON.parse(r.value):[]; }
  catch(e){ storedWrong=[]; }
  refreshRetryButton();
}
async function saveStored(){ try{ await window.storage.set(STORE_KEY, JSON.stringify(storedWrong)); }catch(e){} }
function refreshRetryButton(){
  const btn=$("retryStore");
  if(storedWrong.length>0){ $("retryStoreSub").textContent="まだ間違いとして残っている "+storedWrong.length+" 問"; btn.style.display="flex"; }
  else btn.style.display="none";
}

/* ---- ホームのボタンを、収録済みの問題に合わせて生成 ---- */
function buildHome(){
  const has1=QUESTIONS.filter(q=>q.n<=50);
  const has2=QUESTIONS.filter(q=>q.n>=51);
  const wrap=$("homeButtons"); wrap.innerHTML="";
  if(has1.length){
    wrap.insertAdjacentHTML("beforeend",
      '<button class="pick" onclick="startSet(QUESTIONS.filter(q=>q.n<=50))">'+
      '<span class="rng">問 1–'+Math.max(...has1.map(q=>q.n))+'</span>'+
      '<span class="txt"><span class="ttl">マークシート 1</span><div class="sub">屋外気候・換気・伝熱・採光・音・色彩・設備 ほか（'+has1.length+'問）</div></span>'+
      '<span class="arw">→</span></button>');
  }
  if(has2.length){
    wrap.insertAdjacentHTML("beforeend",
      '<button class="pick" onclick="startSet(QUESTIONS.filter(q=>q.n>=51))">'+
      '<span class="rng">問 51–'+Math.max(...has2.map(q=>q.n))+'</span>'+
      '<span class="txt"><span class="ttl">マークシート 2</span><div class="sub">'+has2.length+'問</div></span>'+
      '<span class="arw">→</span></button>');
  }
  wrap.insertAdjacentHTML("beforeend",
    '<button class="pick" onclick="startAll()">'+
    '<span class="rng">全'+QUESTIONS.length+'問</span>'+
    '<span class="txt"><span class="ttl">収録分を通しで</span><div class="sub">いま収録している問題をぶっ通し</div></span>'+
    '<span class="arw">→</span></button>');
  const maxN=Math.max(...QUESTIONS.map(q=>q.n));
  if(maxN<100){ $("pending").textContent="※ 問"+(maxN+1)+"〜100は問題文が未収録です。残りのページを送れば追加します。"; $("pending").style.display="block"; }
  else $("pending").style.display="none";
}

function startSet(list){
  if(!list.length) return;
  ACTIVE=list.slice(); idx=0; hits=0; locked=false; misses=[];
  $("home").className="home hide"; $("result").className="result"; $("hdr").className="";
  $("main").style.display="flex"; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function startAll(){ startSet(QUESTIONS); }
function startStoredWrong(){ startSet(QUESTIONS.filter(q=>storedWrong.includes(q.n))); }

function render(){
  const q=ACTIVE[idx]; locked=false;
  $("sec").textContent=q.sec; const _sb=$("starBtn"); if(_sb){ setStarIcon(_sb, starred.includes(q.n)); _sb.onclick=()=>toggleStar(_sb,q); } $("qno").textContent="問"+q.n; $("qsrc").textContent=q.src; $("stmt").textContent=q.q;
  $("cur").textContent=idx+1; $("total").textContent=ACTIVE.length; $("hit").textContent=hits;
  $("bar").style.width=((idx)/ACTIVE.length*100)+"%";
  ["b1","b2"].forEach(id=>{const b=$(id);b.disabled=false;b.className="bubble";});
  $("fb").className="fb";
  const nb=$("next"); nb.textContent="解答する"; nb.disabled=true; nb.onclick=()=>{};
}

function answer(choice){
  if(locked) return; locked=true;
  const q=ACTIVE[idx]; const correct=(choice===q.a);
  if(correct) hits++; else misses.push(q);
  $("hit").textContent=hits;
  const b1=$("b1"), b2=$("b2"); b1.disabled=true; b2.disabled=true;
  const chosen=choice===1?b1:b2, right=q.a===1?b1:b2;
  chosen.classList.add("chosen"); right.classList.add("correct");
  if(!correct) chosen.classList.add("wrong");
  (choice===1?b2:b1).classList.add("dim");
  $("verdict").className="verdict "+(correct?"y":"n");
  $("vtext").textContent=correct?"正解":"不正解";
  $("ans").textContent=q.a===1?"① 適当":"② 不適当";
  $("point").textContent=q.p; $("fb").className="fb show";
  const nb=$("next"); nb.disabled=false;
  nb.textContent=idx===ACTIVE.length-1?"結果を見る":"次の問題へ →"; nb.onclick=nextQ;
}

function nextQ(){
  if(!locked) return;
  if(idx===ACTIVE.length-1){ showResult(); return; }
  idx++; render(); window.scrollTo({top:0,behavior:"smooth"});
}

function showResult(){
  $("main").style.display="none"; $("bar").style.width="100%";
  const missNums=misses.map(m=>m.n);
  ACTIVE.forEach(q=>{
    const inStore=storedWrong.includes(q.n);
    if(missNums.includes(q.n)){ if(!inStore) storedWrong.push(q.n); }
    else if(inStore){ storedWrong=storedWrong.filter(n=>n!==q.n); }
  });
  saveStored(); refreshRetryButton();
  const total=ACTIVE.length;
  $("rScore").textContent=hits; $("rSub").textContent="／ "+total+" 問正解";
  $("rPct").textContent="正答率 "+Math.round(hits/total*100)+"％";
  if(misses.length===0){
    $("reviewWrap").innerHTML='<h3 style="color:var(--ok)">全問正解！復習なし</h3>';
    $("retryNow").style.display="none";
  }else{
    $("reviewWrap").innerHTML='<h3>復習リスト（間違えた問題）</h3><div id="missList"></div>';
    const list=$("missList");
    misses.slice().sort((a,b)=>a.n-b.n).forEach(m=>{
      const d=document.createElement("div"); d.className="miss";
      d.innerHTML='<span class="mno">問'+m.n+'</span><span>'+m.q+'<br><span style="color:var(--ink-soft)">→ 正解 '+(m.a===1?"① 適当":"② 不適当")+'</span></span>';
      list.appendChild(d);
    });
    $("retryNow").style.display="block";
    $("retryNow").textContent="間違えた問題だけ再テスト（"+misses.length+"問）";
  }
  $("result").className="result show";
}

function retryMisses(){ startSet(misses); }
function goHome(){ refreshStarButton();
  $("result").className="result"; $("main").style.display="none";
  $("hdr").className="compact"; $("home").className="home";
  refreshRetryButton(); window.scrollTo({top:0,behavior:"smooth"});
}

buildHome();
loadStored();
loadStarred();
</script>
