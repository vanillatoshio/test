<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アプリ検索｜2級建築士</title><style>
:root{--accent:#5a51a0;--accent-bg:#f0eef9;--ink:#2a2733;--muted:#8a8696;--line:#e6e3f0;--card:#fff;--bg:#f6f5fb;
--keikaku:#2e9e6b;--houki:#c08a2e;--kouzou:#6b4ea0;--sekou:#0f8a86;--gensen:#3f51b5;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}html,body{margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;}
.wrap{max-width:560px;margin:0 auto;padding:16px 16px 48px;}
header.top{text-align:center;padding:28px 0 6px;}
header.top .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:700;}
header.top h1{font-size:23px;margin:6px 0 2px;font-weight:800;}
header.top .sub{font-size:13px;color:var(--muted);}
.lead{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 18px;margin:16px 0 18px;font-size:13.5px;color:#55525f;}
.lead b{color:var(--accent);}
.search-link{display:flex;align-items:center;gap:12px;text-decoration:none;background:var(--accent);color:#fff;border-radius:16px;padding:15px 18px;margin:0 0 22px;}
.search-link:active{transform:scale(.985);}.search-link .si{font-size:20px;}.search-link .st{flex:1;}
.search-link .st .n{font-size:15.5px;font-weight:800;}.search-link .st .d{font-size:12px;color:#d7d2f0;}.search-link .ar{font-size:18px;color:#d7d2f0;}
.group{margin-bottom:26px;}.group-head{display:flex;align-items:baseline;gap:10px;margin:0 4px 12px;}
.group-head .ttl{font-size:16px;font-weight:800;}
.group-head .tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-bg);border-radius:999px;padding:3px 10px;}
.cards{display:flex;flex-direction:column;gap:10px;}
.card{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:16px;border-left:5px solid var(--c,var(--accent));padding:15px 16px;transition:.15s;}
.card:active{transform:scale(.985);}
.card .ic{width:34px;height:34px;border-radius:10px;background:var(--c,var(--accent));color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none;}
.card .body{flex:1;min-width:0;}.card .name{font-size:15.5px;font-weight:700;}
.card .desc{font-size:12px;color:var(--muted);}
.card .cnt{font-size:12px;font-weight:700;color:var(--c,var(--accent));white-space:nowrap;}
footer{text-align:center;font-size:11px;color:#b6bccb;margin-top:18px;}
/* search */
.searchbox{position:sticky;top:0;background:var(--bg);padding:10px 0 12px;z-index:5;}
.searchbox input{width:100%;border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:16px;font-family:inherit;background:var(--card);color:var(--ink);}
.searchbox input:focus{outline:none;border-color:var(--accent);}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}
.backlink{display:inline-block;color:var(--accent);font-weight:700;text-decoration:none;font-size:14px;margin-bottom:6px;}
</style></head><body><div class="wrap"><a class="backlink" href="index.html">← メニュー</a>
<header class="top"><div class="eyebrow">2級建築士 学習アプリ</div><h1>アプリ検索</h1><div class="sub">23アプリから探す</div></header>
<div class="searchbox"><input id="q" type="search" placeholder="例：法規／構造／模試／厳選／糸島…" autocomplete="off"></div>
<div class="cards" id="list"></div><div class="empty" id="empty" style="display:none;">該当するアプリがありません</div>
<footer>科目名・テスト名・キーワードで絞り込めます</footer></div>
<script>
const DATA=[{"f":"keikaku_marathon.html","s":"keikaku","n":"計画 マラソン","d":"環境・設備・計画","g":"マラソンテスト","cnt":100,"kw":"マラソンテスト 計画 マラソン 環境・設備・計画 計画 keikaku_marathon.html"},{"f":"kozo_marathon.html","s":"kozo","n":"構造 マラソン","d":"力学・各構造","g":"マラソンテスト","cnt":100,"kw":"マラソンテスト 構造 マラソン 力学・各構造 構造 kozo_marathon.html"},{"f":"sekou_marathon.html","s":"sekou","n":"施工 マラソン","d":"施工管理・各工事","g":"マラソンテスト","cnt":100,"kw":"マラソンテスト 施工 マラソン 施工管理・各工事 施工 sekou_marathon.html"},{"f":"kozo_gensen.html","s":"kozo","n":"構造 厳選","d":"5択を○×に分解","g":"マラソンテスト","cnt":50,"kw":"マラソンテスト 構造 厳選 5択を○×に分解 構造 kozo_gensen.html"},{"f":"moshi2_keikaku.html","s":"keikaku","n":"計画","d":"環境・設備","g":"公開模試②","cnt":20,"kw":"公開模試② 計画 環境・設備 計画 moshi2_keikaku.html"},{"f":"moshi2_houki.html","s":"houki","n":"法規","d":"建築法規","g":"公開模試②","cnt":19,"kw":"公開模試② 法規 建築法規 法規 moshi2_houki.html"},{"f":"moshi2_kozo.html","s":"kozo","n":"構造","d":"構造全般","g":"公開模試②","cnt":19,"kw":"公開模試② 構造 構造全般 構造 moshi2_kozo.html"},{"f":"moshi2_sekou.html","s":"sekou","n":"施工","d":"施工全般","g":"公開模試②","cnt":19,"kw":"公開模試② 施工 施工全般 施工 moshi2_sekou.html"},{"f":"moshi2b_keikaku.html","s":"keikaku","n":"計画","d":"旧データ","g":"公開模試②（旧版）","cnt":17,"kw":"公開模試②（旧版） 計画 旧データ 計画 moshi2b_keikaku.html"},{"f":"moshi2b_houki.html","s":"houki","n":"法規","d":"旧データ","g":"公開模試②（旧版）","cnt":8,"kw":"公開模試②（旧版） 法規 旧データ 法規 moshi2b_houki.html"},{"f":"moshi2b_kozo.html","s":"kozo","n":"構造","d":"旧データ","g":"公開模試②（旧版）","cnt":15,"kw":"公開模試②（旧版） 構造 旧データ 構造 moshi2b_kozo.html"},{"f":"moshi2b_sekou.html","s":"sekou","n":"施工","d":"旧データ","g":"公開模試②（旧版）","cnt":24,"kw":"公開模試②（旧版） 施工 旧データ 施工 moshi2b_sekou.html"},{"f":"hisshou1_houki.html","s":"houki","n":"法規","d":"総則・防火・関係法令","g":"必勝テスト①","cnt":19,"kw":"必勝テスト① 法規 総則・防火・関係法令 法規 hisshou1_houki.html"},{"f":"hisshou1_kozo.html","s":"kozo","n":"構造","d":"構造強度ほか","g":"必勝テスト①","cnt":8,"kw":"必勝テスト① 構造 構造強度ほか 構造 hisshou1_kozo.html"},{"f":"kakunin1_houki.html","s":"houki","n":"法規","d":"確認テスト","g":"確認テスト①","cnt":9,"kw":"確認テスト① 法規 確認テスト 法規 kakunin1_houki.html"},{"f":"kakunin1_keikaku.html","s":"keikaku","n":"計画","d":"確認テスト","g":"確認テスト①","cnt":17,"kw":"確認テスト① 計画 確認テスト 計画 kakunin1_keikaku.html"},{"f":"houki_itoshima1.html","s":"houki","n":"糸島①","d":"法規確認","g":"法規確認 糸島","cnt":19,"kw":"法規確認 糸島 糸島① 法規確認 法規 houki_itoshima1.html"},{"f":"houki_itoshima2.html","s":"houki","n":"糸島②","d":"法規確認","g":"法規確認 糸島","cnt":20,"kw":"法規確認 糸島 糸島② 法規確認 法規 houki_itoshima2.html"},{"f":"gensen_b.html","s":"gensen","n":"厳選B","d":"計画・法規・構造・環境","g":"厳選問題","cnt":27,"kw":"厳選問題 厳選B 計画・法規・構造・環境 総合 gensen_b.html"},{"f":"gensen_b2.html","s":"gensen","n":"厳選B-2","d":"法規・設備ほか","g":"厳選問題","cnt":27,"kw":"厳選問題 厳選B-2 法規・設備ほか 総合 gensen_b2.html"},{"f":"gensen_d.html","s":"gensen","n":"厳選D","d":"施工・法規ほか","g":"厳選問題","cnt":76,"kw":"厳選問題 厳選D 施工・法規ほか 総合 gensen_d.html"},{"f":"houki_kozo.html","s":"houki","n":"法規（構造強度）","d":"構造規定","g":"法規ピンポイント","cnt":25,"kw":"法規ピンポイント 法規（構造強度） 構造規定 法規 houki_kozo.html"},{"f":"houki_note.html","s":"houki","n":"法規まとめノート","d":"数値暗記","g":"法規ピンポイント","cnt":45,"kw":"法規ピンポイント 法規まとめノート 数値暗記 法規 houki_note.html"}];
const SUBJP={"keikaku":"計画","houki":"法規","kozo":"構造","sekou":"施工","gensen":"総合"};
const CVAR={"keikaku":"--keikaku","houki":"--houki","kozo":"--kouzou","sekou":"--sekou","gensen":"--gensen"};
const list=document.getElementById('list'),empty=document.getElementById('empty'),q=document.getElementById('q');
function render(items){
  list.innerHTML=items.map(it=>`<a class="card" style="--c:var(${CVAR[it.s]})" href="${encodeURI(it.f)}">
    <span class="ic">${SUBJP[it.s][0]}</span>
    <span class="body"><span class="name">${it.n}</span><span class="desc">${it.g}・${it.d}</span></span>
    <span class="cnt">${it.cnt}問</span></a>`).join('');
  empty.style.display=items.length?'none':'block';
}
function norm(s){return (s||'').toLowerCase();}
q.addEventListener('input',()=>{
  const t=norm(q.value).trim();
  if(!t){render(DATA);return;}
  const terms=t.split(/\s+/);
  render(DATA.filter(it=>{const h=norm(it.kw);return terms.every(x=>h.includes(x));}));
});
render(DATA);
</script></body></html>
