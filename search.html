<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>問題 横断検索｜2級建築士</title>
<style>
  :root{
    --accent:#5a51a0;--accent-bg:#f0eef9;--ink:#2a2733;--muted:#8a8696;--line:#e6e3f0;
    --card:#ffffff;--bg:#f6f5fb;--maru:#2e9e6b;--batsu:#d9534f;
    --keikaku:#2e9e6b;--houki:#d99a2b;--kouzou:#5a51a0;--sekou:#d9534f;--gensen:#4f73c4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:600px;margin:0 auto;padding:14px 14px 48px;}
  header.top{text-align:center;padding:18px 0 6px;}
  header.top .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:700;}
  header.top h1{font-size:21px;margin:5px 0 2px;font-weight:800;}
  header.top .sub{font-size:12.5px;color:var(--muted);}
  .searchbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 0 10px;margin-bottom:6px;}
  .searchbox{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:11px 14px;}
  .searchbox:focus-within{border-color:var(--accent);}
  .searchbox input{flex:1;border:none;outline:none;font-size:16px;font-family:inherit;background:transparent;color:var(--ink);min-width:0;}
  .searchbox .ic{font-size:17px;color:var(--muted);}
  .searchbox .clr{border:none;background:var(--line);color:#fff;border-radius:999px;width:22px;height:22px;font-size:13px;cursor:pointer;flex:none;display:none;}
  .searchbox .clr.show{display:block;}
  .status{font-size:12.5px;color:var(--muted);margin:2px 4px 12px;font-weight:600;}
  .status b{color:var(--accent);}
  .solvebtn{display:none;width:100%;border:none;font-family:inherit;cursor:pointer;background:var(--accent);color:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:800;margin:0 0 14px;}
  .solvebtn.show{display:block;}
  .solvebtn:active{transform:scale(.99);}
  .note{font-size:11.5px;color:var(--muted);margin:-8px 4px 14px;}
  .batches{display:flex;flex-direction:column;gap:8px;margin:0 0 14px;}
  .batch-h{font-size:12px;font-weight:800;color:var(--accent);margin:2px 4px 2px;}
  .batchbtn{display:flex;align-items:center;justify-content:space-between;width:100%;border:1.5px solid var(--accent);background:var(--card);color:var(--accent);border-radius:13px;padding:13px 16px;font-size:14.5px;font-weight:800;cursor:pointer;font-family:inherit;}
  .batchbtn:active{transform:scale(.99);}
  .batchbtn .rng{font-size:12px;color:var(--muted);font-weight:700;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin:0 0 14px;}
  .chip{font-size:12px;font-weight:700;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:999px;padding:5px 12px;cursor:pointer;font-family:inherit;}
  .chip:active{transform:scale(.96);}
  .res{display:flex;flex-direction:column;gap:10px;}
  a.hit{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;position:relative;overflow:hidden;transition:.12s;}
  a.hit:active{transform:scale(.99);}
  a.hit::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--c,var(--accent));}
  .hit .top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .hit .badge{font-size:11px;font-weight:700;color:#fff;background:var(--c,var(--accent));border-radius:6px;padding:2px 8px;white-space:nowrap;}
  .hit .ox{font-size:14px;font-weight:800;}
  .hit .ox.o{color:var(--maru);}
  .hit .ox.x{color:var(--batsu);}
  .hit .src{font-size:11.5px;color:var(--muted);font-weight:700;}
  .hit .q{font-size:14px;line-height:1.75;color:#33303d;}
  .hit .p{font-size:12.5px;line-height:1.7;color:var(--muted);margin-top:5px;}
  .hit mark{background:#fff2a8;color:inherit;border-radius:3px;padding:0 1px;font-weight:700;}
  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:34px 10px;}
  .err{background:#fff7f6;border:1px solid #f3d6d4;border-radius:12px;padding:11px 14px;font-size:12px;margin-bottom:12px;color:var(--batsu);}
  .err b{display:block;margin-bottom:3px;}
  .bar{display:flex;align-items:center;gap:12px;margin:10px 0 14px;}
  .back{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;padding:6px 0;}
  .progress{flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden;}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:.3s;}
  .counter{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap;}
  .qcard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 20px;box-shadow:0 6px 20px rgba(60,50,120,.05);}
  .qbadge{display:inline-flex;gap:8px;align-items:center;margin-bottom:14px;}
  .qbadge .b{font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:2px 9px;background:var(--c,var(--accent));}
  .qbadge .s{font-size:11.5px;color:var(--muted);font-weight:700;}
  .q-text{font-size:16.5px;line-height:1.9;font-weight:500;}
  .choices{display:flex;gap:14px;margin-top:22px;}
  .choice{flex:1;border:2px solid var(--line);background:var(--card);border-radius:16px;padding:18px 0;font-size:30px;font-weight:800;cursor:pointer;font-family:inherit;transition:.12s;color:var(--ink);}
  .choice:active{transform:scale(.96);}
  .choice.maru{color:var(--maru);}
  .choice.batsu{color:var(--batsu);}
  .choice:disabled{cursor:default;}
  .choice.sel-correct{border-color:var(--maru);background:#eef9f3;}
  .choice.sel-wrong{border-color:var(--batsu);background:#fdeeed;}
  .choice.dim{opacity:.35;}
  .result{margin-top:18px;border-radius:16px;padding:16px 18px;display:none;}
  .result.show{display:block;animation:fade .25s;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .result.ok{background:#eef9f3;border:1px solid #bfe6d2;}
  .result.ng{background:#fdeeed;border:1px solid #f3cecb;}
  .result .verdict{font-weight:800;font-size:15px;margin-bottom:8px;}
  .result.ok .verdict{color:var(--maru);}
  .result.ng .verdict{color:var(--batsu);}
  .result .ans{font-size:13px;color:var(--muted);font-weight:700;}
  .result .point{font-size:14px;line-height:1.8;margin-top:8px;color:#3d3a47;}
  .result .point b{color:var(--accent);}
  .next{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;display:none;}
  .next.show{display:block;}
  .next:active{transform:scale(.98);}
  .summary{text-align:center;padding-top:20px;}
  .summary .ring{width:150px;height:150px;border-radius:50%;margin:18px auto;display:flex;align-items:center;justify-content:center;background:conic-gradient(var(--accent) var(--deg,0deg),var(--line) 0);}
  .summary .ring .inner{width:122px;height:122px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .summary .ring .pct{font-size:34px;font-weight:800;color:var(--accent);}
  .summary .ring .lbl{font-size:12px;color:var(--muted);}
  .summary h2{font-size:20px;margin:6px 0;}
  .summary .score{font-size:15px;color:var(--muted);margin-bottom:18px;}
  .summary .acts{display:flex;flex-direction:column;gap:10px;}
  .summary .acts button{border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:none;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-ghost{background:var(--card);color:var(--accent);border:1px solid var(--line)!important;}
  .btn-review{background:#fff7f6;color:var(--batsu);border:1px solid #f3d6d4!important;}
  .hidden{display:none!important;}
  footer{text-align:center;font-size:11px;color:#b6b2c4;margin-top:26px;}
  footer a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">2級建築士 学習アプリ</div>
    <h1>問題 横断検索</h1>
    <div class="sub">全アプリの問題・選択肢・解説をまとめて検索・演習<br><b style="color:#5a51a0;">20問分割版 v3</b></div>
  </header>

  <section id="searchView">
    <div class="searchbar">
      <div class="searchbox">
        <span class="ic">🔍</span>
        <input id="q" type="search" placeholder="キーワード（例：斜線、断熱、界壁、宅建業…）" autocomplete="off" enterkeyhint="search">
        <button class="clr" id="clr" aria-label="クリア">×</button>
      </div>
    </div>
    <div class="status" id="status">読み込み中…</div>
    <button class="solvebtn" id="solveBtn"></button>
    <div class="note" id="note"></div>
    <div class="batches" id="batches"></div>
    <div class="chips" id="chips"></div>
    <div id="errBox"></div>
    <div class="res" id="res"></div>
  </section>

  <section id="quizView" class="hidden">
    <div class="bar">
      <button class="back" id="qBack">← 検索に戻る</button>
      <div class="progress"><i id="prog"></i></div>
      <div class="counter" id="counter">1/1</div>
    </div>
    <div class="qcard">
      <div class="qbadge" id="qBadge"></div>
      <div class="q-text" id="qText"></div>
      <div class="choices">
        <button class="choice maru" id="cMaru">○</button>
        <button class="choice batsu" id="cBatsu">×</button>
      </div>
      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div class="ans" id="ansLine"></div>
        <div class="point" id="pointText"></div>
      </div>
    </div>
    <button class="next" id="nextBtn">次の問題 →</button>
  </section>

  <section id="sumView" class="hidden">
    <div class="summary">
      <div class="ring" id="ring"><div class="inner">
        <div class="pct" id="pct">0%</div><div class="lbl">正答率</div>
      </div></div>
      <h2 id="sumTitle">おつかれさまでした</h2>
      <div class="score" id="sumScore"></div>
      <div class="acts">
        <button class="btn-review hidden" id="sumReview"></button>
        <button class="btn-primary hidden" id="sumNext"></button>
        <button class="btn-primary" id="sumRetry">もう一度すべて</button>
        <button class="btn-ghost" id="sumBack">検索に戻る</button>
      </div>
    </div>
  </section>

  <footer><a href="index.html">← メニューに戻る</a></footer>
</div>

<script>
const APPS = [
  {f:"moshi2b_keikaku.html",label:"模試② 計画",sub:"keikaku"},
  {f:"moshi2b_houki.html",label:"模試② 法規",sub:"houki"},
  {f:"moshi2b_kozo.html",label:"模試② 構造",sub:"kouzou"},
  {f:"moshi2b_sekou.html",label:"模試② 施工",sub:"sekou"},
  {f:"moshi2_keikaku.html",label:"模試③ 計画",sub:"keikaku"},
  {f:"moshi2_houki.html",label:"模試③ 法規",sub:"houki"},
  {f:"moshi2_kozo.html",label:"模試③ 構造",sub:"kouzou"},
  {f:"moshi2_sekou.html",label:"模試③ 施工",sub:"sekou"},
  {f:"keikaku_marathon.html",label:"計画100問",sub:"keikaku"},
  {f:"kozo_marathon.html",label:"構造100問",sub:"kouzou"},
  {f:"sekou_marathon.html",label:"施工100問",sub:"sekou"},
  {f:"kozo_gensen.html",label:"構造厳選(○×)",sub:"kouzou"},
  {f:"gensen_d.html",label:"厳選D",sub:"gensen"},
  {f:"gensen_b.html",label:"厳選B",sub:"gensen"},
  {f:"gensen_b2.html",label:"厳選B2",sub:"gensen"},
  {f:"houki_note.html",label:"法規ノート",sub:"houki"},
  {f:"houki_kozo.html",label:"法規構造",sub:"gensen"},
  {f:"kakunin1_keikaku.html",label:"確認① 計画",sub:"keikaku"},
  {f:"kakunin1_houki.html",label:"確認① 法規",sub:"houki"},
  {f:"houki kakunin itoshima quiz.html",label:"法規確認 糸島",sub:"houki"},
  {f:"hisshou1_houki.html",label:"必勝① 法規",sub:"houki"},
  {f:"hisshou1_kozo.html",label:"必勝① 構造",sub:"kouzou"},
];

const el = id => document.getElementById(id);
let INDEX=[], failed=[], curHits=[];

function extractQuestions(html){
  const m = html.match(/(?:const|let|var)\s+QUESTIONS\s*=\s*(\[[\s\S]*?\n\s*\]);/);
  if(!m) return null;
  try{ return (new Function("return " + m[1] + ";"))(); }catch(e){ return null; }
}
function pickText(o){
  if(o.q) return o.q; if(o.question) return o.question; if(o.text) return o.text;
  let best="";
  for(const k in o){ if(typeof o[k]==="string" && o[k].length>best.length) best=o[k]; }
  return best;
}
function pickPoint(o){ return o.p||o.point||o.explain||o.kaisetsu||o.exp||""; }
/* いろいろな答え形式を ○/× に正規化（5択など決められないものは "")  */
function pickOX(o){
  const keys=["a","ans","answer","correct","seikai","isTrue","tf"];
  for(const k of keys){ if(typeof o[k]==="boolean") return o[k]?"○":"×"; }
  for(const k of keys){
    const v=o[k];
    if(typeof v==="string"){
      const s=v.trim();
      if(/^(○|◯|まる|maru|true|t|正しい|正|適当|o)$/i.test(s)) return "○";
      if(/^(×|✕|ばつ|batsu|false|f|誤り|誤|不適当|x)$/i.test(s)) return "×";
    }
  }
  // 解説の文頭から推定（「正しい。」「誤り。」など）
  const pt = (pickPoint(o)||"").replace(/^[\s\u3000]+/,"");
  if(/^(正しい|適当|妥当|○|◯)/.test(pt)) return "○";
  if(/^(誤り|誤っ|不適当|不適切|逆|×|✕)/.test(pt)) return "×";
  // フォールバック：選択肢配列が無く（＝5択でなく）boolean値を持つキーがあれば答えとみなす
  const hasChoices = Array.isArray(o.choices)||Array.isArray(o.opts)||Array.isArray(o.options);
  if(!hasChoices){
    for(const k in o){ if(typeof o[k]==="boolean") return o[k]?"○":"×"; }
  }
  return "";
}
function allText(o){ return Object.values(o).filter(v=>typeof v==="string").join("　"); }

async function loadAll(){
  const results = await Promise.all(APPS.map(async app=>{
    try{
      const r = await fetch(encodeURI(app.f), {cache:"no-store"});
      if(!r.ok) throw 0;
      const html = await r.text();
      const qs = extractQuestions(html);
      if(!qs || !Array.isArray(qs)) throw 0;
      return qs.map(o=>({
        q: pickText(o), p: pickPoint(o), ox: pickOX(o),
        src: o.src||o.no||o.id||"", app: app.label, file: app.f, sub: app.sub,
        blob: allText(o)
      }));
    }catch(e){ failed.push(app.label); return []; }
  }));
  INDEX = results.flat();
  renderStatus(); renderErr(); search();
}

function renderStatus(extra){
  if(extra!==undefined){ el("status").innerHTML = extra; return; }
  el("status").innerHTML = `<b>${APPS.length-failed.length}</b> アプリ・<b>${INDEX.length}</b> 問を検索できます`;
}
function renderErr(){
  if(!failed.length){ el("errBox").innerHTML=""; return; }
  el("errBox").innerHTML = `<div class="err"><b>読み込めなかったアプリ（${failed.length}）</b>${failed.join("、")}<br>※ 未アップ、またはファイル名が違う可能性があります。</div>`;
}
const norm = s => (s||"").toLowerCase();
function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function tokenize(kw){ return kw.split(/[\s\u3000,\u3001]+/).map(x=>x.trim()).filter(Boolean); }
function hl(text, toks){
  let t = esc(text);
  (Array.isArray(toks)?toks:[toks]).forEach(tok=>{
    if(!tok) return;
    const re = new RegExp("("+tok.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    t = t.replace(re,"<mark>$1</mark>");
  });
  return t;
}

function search(){
  const kw = el("q").value.trim();
  el("clr").classList.toggle("show", !!kw);
  const res = el("res");
  if(!kw){
    res.innerHTML = `<div class="empty">キーワードを入力すると、全アプリの問題・選択肢・解説から該当する枝を一覧表示します。<br>そのまま「まとめて解く」で○×演習もできます。</div>`;
    el("solveBtn").classList.remove("show"); el("note").textContent="";
    renderStatus(); curHits=[]; return;
  }
  const toks = tokenize(kw);
  const ntoks = toks.map(norm);
  curHits = INDEX.filter(it=>{ const b=norm(it.blob); return ntoks.some(t=>b.includes(t)); });
  const orLabel = toks.length>1 ? `「${toks.map(esc).join(" / ")}」のいずれか` : `「<b>${esc(kw)}</b>」`;
  renderStatus(`${orLabel}… <b>${curHits.length}</b> 件ヒット`);

  const solvable = curHits.filter(it=>it.ox==="○"||it.ox==="×");
  const sb = el("solveBtn"), note=el("note"), batchBox=el("batches");
  const BATCH=20;
  batchBox.innerHTML="";
  if(solvable.length){
    const skipped = curHits.length - solvable.length;
    if(solvable.length<=BATCH){
      // 20問以下：1ボタンでまとめて
      sb.textContent = `▶ ${solvable.length}問 をまとめて解く`;
      sb.classList.add("show");
      sb.onclick = ()=>startQuiz(solvable);
    }else{
      // 20問より多い：全部 ＋ 20問ずつのバッチ
      sb.textContent = `▶ 全${solvable.length}問 を一気に解く`;
      sb.classList.add("show");
      sb.onclick = ()=>startQuiz(solvable);
      batches = [];
      for(let i=0;i<solvable.length;i+=BATCH) batches.push(solvable.slice(i,i+BATCH));
      const h=document.createElement("div"); h.className="batch-h";
      h.textContent=`または 20問ずつ（全${batches.length}回）に分けて解く`;
      batchBox.appendChild(h);
      batches.forEach((chunk,i)=>{
        const from=i*BATCH+1, to=i*BATCH+chunk.length;
        const b=document.createElement("button"); b.className="batchbtn";
        b.innerHTML=`<span>${i+1}回目を解く</span><span class="rng">${from}〜${to}問（${chunk.length}問）</span>`;
        b.onclick=()=>startBatch(i);
        batchBox.appendChild(b);
      });
    }
    let nt = skipped>0 ? `※ ○×で答えが決まらない${skipped}問（5択など）は演習から除外` : "";
    if(toks.length>1){ nt = (nt?nt+"　/　":"") + "複数語は「いずれかを含む」検索"; }
    note.textContent = nt;
  }else{ sb.classList.remove("show"); note.textContent=""; }

  if(!curHits.length){ res.innerHTML = `<div class="empty">「${esc(kw)}」に一致する問題は見つかりませんでした。</div>`; return; }

  res.innerHTML = curHits.map(it=>{
    const oxClass = it.ox==="○"?"o":(it.ox==="×"?"x":"");
    const srcLine = it.src?`<span class="src">${esc(String(it.src))}</span>`:"";
    const pLine = it.p?`<div class="p">${hl(it.p,toks)}</div>`:"";
    return `<a class="hit" style="--c:var(--${it.sub})" href="${encodeURI(it.file)}">
      <div class="top"><span class="badge">${esc(it.app)}</span>${it.ox?`<span class="ox ${oxClass}">${it.ox}</span>`:""}${srcLine}</div>
      <div class="q">${hl(it.q,toks)}</div>${pLine}</a>`;
  }).join("");
}

/* ===== まとめて解く ===== */
let pool=[], idx=0, correct=0, sessWrong=[];
let batches=[], curBatch=null;
const searchView=el("searchView"), quizView=el("quizView"), sumView=el("sumView");
function runQuiz(list){
  pool=list.slice(); idx=0; correct=0; sessWrong=[];
  searchView.classList.add("hidden"); sumView.classList.add("hidden"); quizView.classList.remove("hidden");
  window.scrollTo(0,0); showQ();
}
function startQuiz(list){ curBatch=null; runQuiz(list); }
function startBatch(i){ curBatch=i; runQuiz(batches[i]); }
function showQ(){
  const it=pool[idx];
  el("qBadge").innerHTML = `<span class="b" style="--c:var(--${it.sub})">${esc(it.app)}</span>${it.src?`<span class="s">${esc(String(it.src))}</span>`:""}`;
  el("qText").textContent = it.q;
  el("counter").textContent = `${idx+1}/${pool.length}`;
  el("prog").style.width = `${(idx/pool.length)*100}%`;
  const cM=el("cMaru"), cB=el("cBatsu");
  [cM,cB].forEach(c=>{ c.disabled=false; c.classList.remove("sel-correct","sel-wrong","dim"); });
  el("result").className="result"; el("nextBtn").className="next";
  cM.onclick=()=>answerQ(true); cB.onclick=()=>answerQ(false);
}
function answerQ(choice){
  const it=pool[idx], ans=(it.ox==="○");
  const cM=el("cMaru"), cB=el("cBatsu");
  cM.disabled=true; cB.disabled=true;
  const ok=(choice===ans);
  const chosen=choice?cM:cB, other=choice?cB:cM;
  if(ok){ chosen.classList.add("sel-correct"); other.classList.add("dim"); correct++; }
  else{ chosen.classList.add("sel-wrong"); (ans?cM:cB).classList.add("sel-correct"); sessWrong.push(idx); }
  const res=el("result");
  res.classList.add("show", ok?"ok":"ng");
  el("verdict").textContent = ok?"正解！":"不正解";
  el("ansLine").textContent = `正解は「${it.ox}」`;
  el("pointText").innerHTML = it.p?`<b>ポイント：</b>${esc(it.p)}`:"";
  el("prog").style.width = `${((idx+1)/pool.length)*100}%`;
  const nb=el("nextBtn");
  nb.classList.add("show");
  nb.textContent = (idx+1<pool.length)?"次の問題 →":"結果を見る →";
  nb.onclick=()=>{ idx++; if(idx<pool.length) showQ(); else showSum(); };
}
function showSum(){
  quizView.classList.add("hidden"); sumView.classList.remove("hidden"); window.scrollTo(0,0);
  const total=pool.length, pct=Math.round(correct/total*100);
  el("pct").textContent=pct+"%";
  el("ring").style.setProperty("--deg",(pct*3.6)+"deg");
  el("sumScore").textContent=`${total}問中 ${correct}問 正解`;
  let t="おつかれさまでした";
  if(pct===100)t="全問正解！🎯"; else if(pct>=80)t="good! あと少し"; else if(pct>=50)t="復習で固めよう"; else t="間違いを見直そう";
  el("sumTitle").textContent=t;
  const wrongList = sessWrong.map(i=>pool[i]);
  const rb=el("sumReview");
  if(wrongList.length){ rb.classList.remove("hidden"); rb.textContent=`間違えた${wrongList.length}問を解き直す`; rb.onclick=()=>startQuiz(wrongList); }
  else rb.classList.add("hidden");
  // 次の20問（バッチ演習中で次がある場合）
  const nx=el("sumNext");
  if(curBatch!==null && batches[curBatch+1]){
    const next=batches[curBatch+1];
    nx.classList.remove("hidden");
    nx.textContent=`次の${next.length}問へ →`;
    const ni=curBatch+1;
    nx.onclick=()=>startBatch(ni);
  }else{ nx.classList.add("hidden"); }
  el("sumRetry").textContent = (curBatch!==null)?"この回をもう一度":"もう一度すべて";
  el("sumRetry").onclick=()=>{ const c=curBatch; if(c!==null) startBatch(c); else startQuiz(pool); };
}
function backToSearch(){
  quizView.classList.add("hidden"); sumView.classList.add("hidden"); searchView.classList.remove("hidden"); window.scrollTo(0,0);
}
el("qBack").onclick=backToSearch; el("sumBack").onclick=backToSearch;

const CHIPS=[
  {l:"確認申請",q:"確認"},{l:"斜線",q:"斜線"},{l:"断熱",q:"断熱"},
  {l:"界壁",q:"界壁"},{l:"防火区画",q:"防火区画"},{l:"採光",q:"採光"},
  {l:"換気",q:"換気"},{l:"接合",q:"接合 溶接"},{l:"基礎",q:"基礎"},
  {l:"避難",q:"避難"},{l:"容積率",q:"容積"},{l:"宅建業",q:"宅地建物取引"}
];
el("chips").innerHTML=CHIPS.map(c=>`<button class="chip" data-q="${esc(c.q)}">${esc(c.l)}</button>`).join("");
el("chips").addEventListener("click",e=>{ const b=e.target.closest(".chip"); if(b){ el("q").value=b.dataset.q; search(); el("q").focus(); } });
el("q").addEventListener("input", search);
el("clr").addEventListener("click", ()=>{ el("q").value=""; search(); el("q").focus(); });
loadAll();
</script>
