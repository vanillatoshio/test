<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2級建築士 厳選問題D 〇×トレーナー</title>
<style>
  :root{
    --ink:#1b1830; --ink-soft:#494363;
    --paper:#edecf4; --paper-2:#f9f9fc; --line:#d4d2e2;
    --accent:#5a51a0; --accent-soft:#e7e3f4;
    --ok:#2f7d54; --ok-soft:#e0efe5;
    --ng:#b4392f; --ng-soft:#f4e0dd;
    --mono:"SFMono-Regular",ui-monospace,"Roboto Mono",Menlo,monospace;
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--jp);color:var(--ink);background:var(--paper);
    background-image:linear-gradient(var(--line) 1px,transparent 1px);background-size:100% 40px;
    line-height:1.7;min-height:100%;display:flex;justify-content:center;}
  .app{width:100%;max-width:560px;min-height:100dvh;background:var(--paper-2);
    border-left:1px solid var(--line);border-right:1px solid var(--line);display:flex;flex-direction:column;}

  header{padding:18px 20px 14px;border-bottom:2px solid var(--ink);background:var(--paper-2);position:sticky;top:0;z-index:5;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;}
  h1{font-size:18px;font-weight:800;letter-spacing:.02em;margin-top:2px;}
  .meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:12px;font-family:var(--mono);font-size:12px;color:var(--ink-soft);}
  .meta b{color:var(--ink);font-size:13px;}
  .track{height:5px;background:var(--accent-soft);margin-top:8px;border-radius:2px;overflow:hidden;}
  .bar{height:100%;width:0;background:var(--accent);transition:width .35s ease;}
  header.compact .meta,header.compact .track{display:none;}

  main{flex:1;padding:22px 20px 30px;display:flex;flex-direction:column;}
  .section-tag{display:inline-block;font-size:12px;font-weight:700;color:var(--ink-soft);
    border:1px solid var(--line);border-radius:20px;padding:3px 12px;margin-bottom:16px;align-self:flex-start;background:var(--paper);}
  .qhead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
  .qno{font-family:var(--mono);font-size:34px;font-weight:700;color:var(--ink);line-height:1;}
  .qsrc{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:auto;}
  .stmt{font-size:17px;font-weight:500;letter-spacing:.01em;}
  .prompt{font-size:13px;color:var(--ink-soft);margin-top:16px;}

  .choices{display:flex;gap:14px;margin-top:14px;}
  .bubble{flex:1;cursor:pointer;border:1.5px solid var(--ink);background:var(--paper-2);
    border-radius:14px;padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .08s ease,background .15s ease;font-family:inherit;}
  .bubble:active{transform:scale(.97);}
  .mark{width:46px;height:46px;border-radius:50%;border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;font-weight:700;
    transition:background .15s ease,color .15s ease;}
  .blabel{font-size:14px;font-weight:700;}
  .bubble.dim{opacity:.4;}
  .bubble.chosen .mark{background:var(--ink);color:var(--paper-2);}
  .bubble.correct{border-color:var(--ok);background:var(--ok-soft);}
  .bubble.correct .mark{background:var(--ok);border-color:var(--ok);color:#fff;}
  .bubble.wrong{border-color:var(--ng);background:var(--ng-soft);}
  .bubble.wrong .mark{background:var(--ng);border-color:var(--ng);color:#fff;}
  .bubble[disabled]{cursor:default;}

  .fb{margin-top:20px;border-top:1px dashed var(--line);padding-top:18px;display:none;}
  .fb.show{display:block;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .verdict{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;}
  .verdict .dot{width:11px;height:11px;border-radius:50%;}
  .verdict.y{color:var(--ok);} .verdict.y .dot{background:var(--ok);}
  .verdict.n{color:var(--ng);} .verdict.n .dot{background:var(--ng);}
  .ansline{font-size:14px;margin-top:8px;color:var(--ink-soft);}
  .ansline b{color:var(--ink);}
  .point{margin-top:12px;background:var(--paper);border-left:3px solid var(--accent);padding:12px 14px;border-radius:0 8px 8px 0;font-size:14.5px;}
  .point .pt-l{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--accent);display:block;margin-bottom:4px;}

  .actions{margin-top:auto;padding-top:24px;}
  .next{width:100%;border:none;background:var(--ink);color:var(--paper-2);font-family:inherit;font-size:16px;font-weight:700;letter-spacing:.04em;padding:16px;border-radius:14px;cursor:pointer;transition:opacity .15s ease;}
  .next:active{opacity:.85;} .next:disabled{opacity:.3;cursor:default;}

  .result{padding:30px 20px;text-align:center;display:none;flex-direction:column;flex:1;}
  .result.show{display:flex;}
  .score-big{font-family:var(--mono);font-size:64px;font-weight:700;line-height:1;color:var(--accent);}
  .score-sub{font-size:14px;color:var(--ink-soft);margin-top:6px;}
  .pct{font-family:var(--mono);font-size:15px;margin-top:18px;font-weight:700;}
  .review{margin-top:24px;text-align:left;}
  .review h3{font-size:13px;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:10px;font-family:var(--mono);}
  .miss{display:flex;gap:10px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
  .miss .mno{font-family:var(--mono);font-weight:700;color:var(--ng);min-width:46px;}
  .rbtn{width:100%;font-family:inherit;font-size:15px;font-weight:700;padding:14px;border-radius:14px;cursor:pointer;margin-top:14px;}
  .rbtn.solid{border:none;background:var(--accent);color:#fff;}
  .rbtn.ghost{border:1.5px solid var(--ink);background:transparent;color:var(--ink);}
  .note{font-size:11.5px;color:var(--ink-soft);text-align:center;padding:14px 20px;border-top:1px solid var(--line);font-family:var(--mono);}

  .home{padding:30px 20px;flex:1;display:flex;flex-direction:column;}
  .home.hide{display:none;}
  .home .lead{font-size:14px;color:var(--ink-soft);margin-bottom:22px;line-height:1.8;}
  .home .lead b{color:var(--ink);}
  .pick{width:100%;text-align:left;border:1.5px solid var(--ink);background:var(--paper-2);border-radius:16px;padding:18px;margin-bottom:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:16px;transition:transform .08s ease,background .15s ease;}
  .pick:active{transform:scale(.98);background:var(--accent-soft);}
  .pick.retry{border-color:var(--accent);background:var(--accent-soft);}
  .pick .rng{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);min-width:84px;}
  .pick .ttl{font-size:16px;font-weight:700;}
  .pick .sub{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .pick .txt{flex:1;} .pick .arw{font-size:20px;color:var(--ink-soft);}
  .hsec{font-family:var(--mono);font-size:11px;letter-spacing:.15em;color:var(--ink-soft);margin:6px 0 12px;}
  .pending{font-size:12px;color:var(--ink-soft);border:1px dashed var(--line);border-radius:12px;padding:12px 14px;margin-top:4px;line-height:1.7;}
</style>
</head>
<body>
<div class="app">
  <header id="hdr" class="compact">
    <span class="eyebrow">2026 / 厳選問題D</span>
    <h1>1問ずつ解く 〇✕トレーナー</h1>
    <div class="meta">
      <span>問 <b id="cur">–</b> / <span id="total">–</span></span>
      <span>正答 <b id="hit">0</b></span>
    </div>
    <div class="track"><div class="bar" id="bar"></div></div>
  </header>

  <div class="home" id="home">
    <p class="lead">厳選問題〔D〕の各肢をバラした〇✕形式。記述が<b>正しければ ①適当</b>、<b>誤っていれば ②不適当</b>を選びます。間違えた問題は記録され、<b>あとから間違いだけ再テスト</b>できます。</p>
    <button class="pick retry" id="retryStore" style="display:none;" onclick="startStoredWrong()">
      <span class="rng">復習</span>
      <span class="txt"><span class="ttl">前回までの間違いを再テスト</span><div class="sub" id="retryStoreSub"></div></span>
      <span class="arw">→</span>
    </button>
    <div class="hsec">出題範囲をえらぶ</div>
    <div id="homeButtons"></div>
    <div class="pending" id="pending"></div>
  </div>

  <main id="main" style="display:none;">
    <span class="section-tag" id="sec"></span>
    <div class="qhead">
      <span class="qno" id="qno"></span>
      <span class="qsrc" id="qsrc"></span>
    </div>
    <p class="stmt" id="stmt"></p>
    <p class="prompt">記述が正しければ ① 、誤っていれば ② を選ぶ</p>

    <div class="choices">
      <button class="bubble" id="b1" onclick="answer(1)"><span class="mark">①</span><span class="blabel">適当</span></button>
      <button class="bubble" id="b2" onclick="answer(2)"><span class="mark">②</span><span class="blabel">不適当</span></button>
    </div>

    <div class="fb" id="fb">
      <div class="verdict" id="verdict"><span class="dot"></span><span id="vtext"></span></div>
      <div class="ansline">正解は <b id="ans"></b> です。</div>
      <div class="point"><span class="pt-l">POINT</span><span id="point"></span></div>
    </div>

    <div class="actions"><button class="next" id="next" onclick="nextQ()" disabled>解答する</button></div>
  </main>

  <div class="result" id="result">
    <div class="score-big" id="rScore">0</div>
    <div class="score-sub" id="rSub"></div>
    <div class="pct" id="rPct"></div>
    <div class="review" id="reviewWrap"><h3>復習リスト（間違えた問題）</h3><div id="missList"></div></div>
    <button class="rbtn solid" id="retryNow" onclick="retryMisses()">間違えた問題だけ再テスト</button>
    <button class="rbtn ghost" onclick="goHome()">範囲をえらび直す</button>
  </div>

  <div class="note" id="note">2026 厳選問題D ／ 正答一覧ベース収録</div>
</div>

<script>
/* a:1=適当(正しい記述) / a:2=不適当(誤った記述=正答一覧Dの正答肢)
   src は「元問題番号-肢番号」 */
const QUESTIONS = [
 /* ===== 建築法規 問18 日影規制（正答=肢2）===== */
 {n:1, sec:"日影規制", src:"問18-2", a:2,
  q:"同一の敷地内に2以上の建築物がある場合、これらの建築物をそれぞれ別の建築物とみなして、日影規制を適用する。",
  p:"同一敷地内に2以上の建築物がある場合は、これらを「一の建築物」とみなして日影規制を適用する。別々とみなすのは誤り。"},
 {n:2, sec:"日影規制", src:"問18-1", a:1,
  q:"建築物の敷地が幅員10m以下の道路に接する場合、当該道路の反対側の境界線は、当該道路の幅の1/2だけ外側にあるものとみなす。",
  p:"幅員10m以下の道路に接する場合、道路幅の1/2だけ外側を境界線とみなす。正しい。"},
 {n:3, sec:"日影規制", src:"問18-3", a:1,
  q:"商業地域内においては、原則として、日影規制は適用されない。",
  p:"商業・工業・工業専用地域は日影規制の対象区域から除かれる。正しい。"},
 {n:4, sec:"日影規制", src:"問18-4", a:1,
  q:"第一種低層住居専用地域内においては、原則として、軒の高さが7mを超える建築物又は地階を除く階数が3以上の建築物について、日影規制を適用する。",
  p:"低層住専は「軒高7m超 又は 階数3以上」で日影規制の対象。正しい。"},
 {n:5, sec:"日影規制", src:"問18-5", a:1,
  q:"日影規制が適用されるか否かの建築物の高さの算定は、原則として、平均地盤面からの高さによる。",
  p:"日影規制の高さ算定は平均地盤面から。正しい。"},

 /* ===== 建築法規 問19 防火地域（正答=肢5）===== */
 {n:6, sec:"防火地域", src:"問19-5", a:2,
  q:"準防火地域内にある3階建て、延べ面積300m²の診療所(患者の収容施設がないもの)は、耐火建築物としなければならない。",
  p:"患者収容施設のない診療所で3階建て・延べ300m²なら、準防火地域では準耐火建築物等でも可。耐火建築物に限るとするのは誤り。"},
 {n:7, sec:"防火地域", src:"問19-1", a:1,
  q:"防火地域内において一戸建て住宅を新築する場合、屋根の構造は、市街地における通常の火災による火の粉により防火上有害な発炎をしないものとしなければならない。",
  p:"防火・準防火地域の屋根は火の粉による発炎防止等の性能が必要。正しい。"},
 {n:8, sec:"防火地域", src:"問19-2", a:1,
  q:"防火地域内の高さ2mを超える看板で、建築物の屋上に設けるものは、その主要な部分を不燃材料で造り、又は覆わなければならない。",
  p:"防火地域内・屋上の高さ2m超の看板等は主要部を不燃材料で造る/覆う。正しい。"},
 {n:9, sec:"防火地域", src:"問19-3", a:1,
  q:"防火地域内にある建築物に附属する高さ2mを超える門・塀は、延焼防止上支障のない構造としなければならない。",
  p:"防火地域内の高さ2m超の門・塀は延焼防止上支障のない構造とする。正しい。"},

 /* ===== 建築法規 問20 適用関係（正答=肢1）===== */
 {n:10, sec:"建基法・適用", src:"問20-1", a:2,
  q:"特定行政庁は、国際的な規模の競技会の用に供する特別の必要がある仮設興行場について、安全上・防火上・衛生上支障がなく公益上やむを得ないと認める場合、1年を超えて使用する建築物として建築を許可することはできない。",
  p:"特定行政庁は所定の手続を経れば、1年を超える期間の仮設建築物の存続を許可できる。「許可できない」とするのは誤り。"},
 {n:11, sec:"建基法・適用", src:"問20-3", a:1,
  q:"防火地域及び準防火地域以外の区域内における木造3階建ての一戸建て住宅(住宅以外の用途に供する部分はない)について、指定確認検査機関が建築基準法第6条の2第1項による確認をする場合、原則として消防長又は消防署長の同意が必要である。",
  p:"住宅でも一定規模等では消防同意が必要。正しい。"},
 {n:12, sec:"建基法・適用", src:"問20-5", a:1,
  q:"高さ6mの観覧車を築造する場合には、建築基準法第20条の規定が準用される。",
  p:"高さ6mを超える観覧車等の工作物には構造関係規定が準用される（本肢は正しい記述として扱う）。",},

 /* ===== 建築法規 問23 バリアフリー法（正答=肢2／組合せ問題）===== */
 {n:13, sec:"バリアフリー法", src:"問23-イ", a:2,
  q:"「高齢者、障害者等の移動等の円滑化の促進に関する法律」上、移動等円滑化経路を構成する敷地内の通路の幅は、原則として、120cm以上でなければならない。",
  p:"敷地内通路の幅は原則として「140cm以上」。120cm以上とするのは誤り（本問は誤りの肢を含む組合せ問題で、正答は2）。"},
 {n:14, sec:"バリアフリー法", src:"問23-ハ", a:1,
  q:"建築物移動等円滑化基準において、多数の者が利用する駐車場を設ける場合、車椅子使用者用駐車施設の総数が200以下のときは、原則として、その総数に1/50を乗じて得た数以上の車椅子使用者用駐車施設を設けなければならない。",
  p:"車椅子使用者用駐車施設は総数200以下なら1/50以上を設置。正しい。"},

 /* ===== 建築法規 問25 宅造法・都計法（正答=肢5）===== */
 {n:15, sec:"宅造法ほか", src:"問25-5", a:2,
  q:"「都市計画法」上、高度利用地区は、用途地域内において市街地の環境を維持し、又は土地利用の増進を図るため、建築物の高さの最高限度又は最低限度を定める地区をいう。",
  p:"高度利用地区は容積率の最高/最低限度や建蔽率の最高限度等を定める地区。建築物の「高さ」の最高/最低限度を定めるのは高度地区。記述は誤り。"},
 {n:16, sec:"宅造法ほか", src:"問25-1", a:1,
  q:"「宅地造成及び特定盛土等規制法」上、宅地造成等工事規制区域内の土地の所有者は、宅地造成等に伴う災害が生じないよう、その土地を常時安全な状態に維持するよう努めなければならない。",
  p:"規制区域内の土地所有者等には安全維持の努力義務がある。正しい。"},
 {n:17, sec:"宅造法ほか", src:"問25-4", a:1,
  q:"「都市計画法」上、都市計画施設の区域内において、地階を有しない木造2階建ての一戸建て住宅を新築しようとする者は、原則として、都道府県知事等の許可を受けなければならない。",
  p:"都市計画施設の区域内の建築は原則として知事等の許可が必要。正しい。"},

 /* ===== 建築構造 問7 平家建て構造計算（正答=肢1）===== */
 {n:18, sec:"構造計算", src:"問7-1", a:2,
  q:"延べ面積150m²、高さ5mの平家建ての事務所(構造計算等に関する安全性の確認は行わないもの)で、補強コンクリートブロック造とする場合、耐力壁の厚さを15cmとした。",
  p:"補強CB造の耐力壁の厚さは原則15cm以上だが、高さ等の条件により本肢は正答一覧で誤り。数値・条件を原本で確認。"},
 {n:19, sec:"構造計算", src:"問7-2", a:1,
  q:"鉄筋コンクリート造とするにあたって、構造耐力上主要な部分である柱・はりにおいて、複筋ばりとし、これにあばら筋をはりの大きい方の3/4以下の間隔で配置した。",
  p:"あばら筋ははりの丈の3/4以下の間隔で配置。正しい。"},
 {n:20, sec:"構造計算", src:"問7-3", a:1,
  q:"鉄筋コンクリート造とするにあたって、構造耐力上主要な部分であるはりにおいて、その端部及び隅角部に径12mm以上の鉄筋を縦に配置した。",
  p:"はりの端部・隅角部の配筋として適当。正しい。"},

 /* ===== 建築構造 問8 構造強度（正答=肢4）===== */
 {n:21, sec:"構造強度", src:"問8-4", a:2,
  q:"保有水平耐力計算により構造耐力上主要な部分の断面に生ずる長期の応力度を計算する場合、多雪区域においては、地震力を考慮しなければならない。",
  p:"本肢は正答一覧で誤り。多雪区域での荷重組合せ（長期/短期、積雪・地震の扱い）を原本で確認。"},
 {n:22, sec:"構造強度", src:"問8-1", a:1,
  q:"建築基準法第20条第1項第三号に掲げる建築物に設ける屋上から突出する煙突は、国土交通大臣が定める基準に従った構造計算により、風圧並びに地震その他の震動・衝撃に対して構造耐力上安全であることを確かめなければならない。",
  p:"屋上突出の煙突等は風圧・地震等に対する構造計算で安全確認。正しい。"},
 {n:23, sec:"構造強度", src:"問8-2", a:1,
  q:"構造耐力上主要な部分である柱・筋かい・土台のうち、地面から1m以内の部分には、有効な防腐措置を講ずるとともに、必要に応じてしろあり等の虫害を防ぐための措置を講じなければならない。",
  p:"地面から1m以内の柱・筋かい・土台には防腐・防蟻措置。正しい。"},

 /* ===== 建築構造 問9 防火区画・防火壁（正答=肢3）===== */
 {n:24, sec:"防火区画", src:"問9-3", a:2,
  q:"平家建て、延べ面積1,200m²の旅館で、耐火建築物及び準耐火建築物以外のものは、床面積の合計1,000m²以内ごとに防火上有効な構造の防火壁等によって区画しなければならない。",
  p:"本肢は正答一覧で誤り。防火壁区画の対象規模・適用除外（耐火/準耐火等）の条件を原本で確認。"},
 {n:25, sec:"防火区画", src:"問9-1", a:1,
  q:"木造建築物等の小屋組が木造である場合、原則として、小屋裏に準耐火構造の隔壁を設けなければならない場合がある（延べ面積等の条件による）。",
  p:"大規模な木造建築物等では小屋裏に準耐火構造の隔壁を設ける規定がある。正しい。"},
 {n:26, sec:"防火区画", src:"問9-2", a:1,
  q:"建築面積が300m²の建築物の小屋組が木造である場合、桁行間隔12m以内ごとに小屋裏に準耐火構造の隔壁を設けなければならない。",
  p:"木造小屋組は桁行間隔12m以内ごとに小屋裏隔壁。正しい。"},

 /* ===== 建築（法規）問10 避難施設（正答=肢4）===== */
 {n:27, sec:"避難施設", src:"問10-4", a:2,
  q:"木造2階建ての一戸建て住宅において、2階の各居室から1階又は地上に通ずる直通階段に至る歩行距離の制限を受けない。",
  p:"本肢は正答一覧で誤り。一戸建て住宅でも所定の場合は直通階段・歩行距離等の規定が関係する。原本で条件を確認。"},
 {n:28, sec:"避難施設", src:"問10-1", a:1,
  q:"延べ面積100m²の一戸建ての住宅で、廊下の幅に関する規定の適用を受けない場合がある。",
  p:"一戸建て住宅の廊下幅は用途・規模により規定対象外となる場合がある。正しい。"},
 {n:29, sec:"避難施設", src:"問10-5", a:1,
  q:"木造2階建ての一戸建て住宅で、2階にあるバルコニーの周囲には、安全上必要な高さが1.1m以上の手すり壁・さく又は金網を設けなければならない。",
  p:"2階以上のバルコニー周囲は高さ1.1m以上の手すり等。正しい。"},

 /* ===== 建築構造 問8 多雪区域の荷重組合せ（正答=肢4）===== */
 {n:30, sec:"構造荷重", src:"構問8-4", a:1,
  q:"多雪区域内の建築物の構造計算を計算により行う場合、暴風時の応力度等計算で採用する荷重・外力の組合せは、G+P+0.35S+W（G:固定荷重、P:積載荷重、S:積雪荷重、W:風圧力）とする。",
  p:"多雪区域の暴風時の荷重組合せは G+P+0.35S+W。正答一覧で正答はこの肢4。"},
 {n:31, sec:"構造荷重", src:"構問8-1", a:2,
  q:"多雪区域内の建築物の暴風時の荷重組合せは、G+P+S+W（積雪荷重Sを低減せずそのまま加算）とする。",
  p:"多雪区域の暴風時は積雪を0.35倍に低減して組み合わせる（G+P+0.35S+W）。Sをそのまま加えるのは誤り。"},

 /* ===== 建築構造 問10 木造部材名称（正答=肢4）===== */
 {n:32, sec:"木造部材", src:"構問10-4", a:2,
  q:"「野縁」は、天井と壁の接する部分に取り付ける見切り部材である。",
  p:"野縁は天井仕上げの下地材（天井板を取り付けるための下地）。見切り部材とするのは誤り。正答一覧で正答はこの肢4。"},
 {n:33, sec:"木造部材", src:"構問10-1", a:1,
  q:"「胴差」は、軸組において2階以上の床の位置で床梁を受け、通し柱を相互につなぐ横架材である。",
  p:"胴差の説明として正しい。"},
 {n:34, sec:"木造部材", src:"構問10-2", a:1,
  q:"「軒桁」は、軒の部分において小屋梁に直角に取り合う横架材である。",
  p:"軒桁の説明として正しい。"},

 /* ===== 建築構造 問16 鉄骨（正答=肢4）===== */
 {n:35, sec:"鉄骨構造", src:"構問16-4", a:2,
  q:"埋込み形式の柱脚において、埋込み深さは、柱の見付け幅のうち大きいほうの柱幅とする。",
  p:"本肢は正答一覧で誤り。埋込み形式柱脚の埋込み深さの基準（柱幅の何倍以上か）を原本で確認。"},
 {n:36, sec:"鉄骨構造", src:"構問16-1", a:1,
  q:"十分な量のスチフナーを設けることで、ウェブの局部座屈を防止することができる。",
  p:"スチフナーはウェブの局部座屈防止に有効。正しい。"},

 /* ===== 建築構造 問17 鉄骨接合（正答=肢4）===== */
 {n:37, sec:"鉄骨接合", src:"構問17-4", a:2,
  q:"一つの継手に高力ボルトと溶接とを併用する場合、ボルトには初期すべりが生じるため、全応力を溶接で負担する必要がある。",
  p:"本肢は正答一覧で誤り。高力ボルトと溶接の併用時の応力分担の考え方を原本で確認。"},
 {n:38, sec:"鉄骨接合", src:"構問17-1", a:1,
  q:"隅肉溶接において、隅肉のサイズは、原則として、薄いほうの母材厚さ以下の値とする。",
  p:"隅肉サイズは薄い母材厚さ以下とするのが原則。正しい。"},
 {n:39, sec:"鉄骨接合", src:"構問17-2", a:1,
  q:"高力ボルトの接合において、ボルト孔の中心間の距離は、一般に、ねじの呼び径の2.5倍以上とする。",
  p:"高力ボルトの縁端距離・ピッチ等の基準として適当。正しい。"},

 /* ===== 建築構造 問19 耐震設計（正答=肢4）===== */
 {n:40, sec:"耐震設計", src:"構問19-4", a:2,
  q:"建築物の各階の剛性率は、「各階における層間変形角の逆数」を「全ての階の層間変形角の逆数の平均値」で除した値であり、その値が大きいほど、その階に損傷が集中する危険性が高い。",
  p:"本肢は正答一覧で誤り。剛性率は値が小さい（バランスが悪い）階に損傷が集中しやすい。大小関係の記述を原本で確認。"},
 {n:41, sec:"耐震設計", src:"構問19-1", a:1,
  q:"建築物の固有周期は、構造物としての剛性が同じであれば、質量が大きいほど長くなる。",
  p:"固有周期は質量が大きいほど長くなる。正しい。"},
 {n:42, sec:"耐震設計", src:"構問19-5", a:1,
  q:"建築物の耐震性能を高める構造計画には、強度を高める考え方と、ねばり（靱性）を高める考え方がある。",
  p:"耐震は「強度」と「靱性」の両面から高める。正しい。"},

 /* ===== 建築構造 問22 骨材・コンクリート（正答=肢1）===== */
 {n:43, sec:"骨材", src:"構問22-1", a:2,
  q:"骨材及びコンクリートのヤング係数は、圧縮強度等に関係なく、ほぼ一定である。",
  p:"ヤング係数は圧縮強度や骨材の種類により変化する。「ほぼ一定」は誤り。正答一覧で正答はこの肢1。"},
 {n:44, sec:"骨材", src:"構問22-2", a:1,
  q:"再生骨材は、コンクリート構造物の解体等により発生したコンクリート塊を破砕・分級等の処理を行い製造したコンクリート用骨材である。",
  p:"再生骨材の定義として正しい。"},

 /* ===== 建築施工 問10 コンクリート工事（正答=肢1）===== */
 {n:45, sec:"コンクリート施工", src:"施問10-1", a:2,
  q:"コンクリートの1回の強度試験は、打込み日及び打込み工区ごとに、かつ、200m³以下にほぼ均等に分割した単位ごとに行うこととした。",
  p:"本肢は正答一覧で誤り。1回の強度試験の対象単位（150m³以下等）の数値を原本で確認。"},
 {n:46, sec:"コンクリート施工", src:"施問10-4", a:1,
  q:"コンクリートのワーカビリティーを改善し、所要のスランプを得るため、AE減水剤を使用した。",
  p:"AE減水剤はワーカビリティー改善・スランプ調整に用いる。正しい。"},
 {n:47, sec:"コンクリート施工", src:"施問10-5", a:1,
  q:"普通コンクリートの気乾単位容積質量を、2.3t/m³とした。",
  p:"普通コンクリートの単位容積質量は概ね2.3t/m³。正しい。"},

 /* ===== 建築施工 問11 寒中コンクリート（正答=肢3）===== */
 {n:48, sec:"コンクリート施工", src:"施問11-3", a:2,
  q:"コンクリートの打継ぎ面は、散水後の水膜を残した状態からコンクリートを打ち込んだ。",
  p:"打継ぎ面は水膜（たまり水）を取り除いてから打ち込む。水膜を残すのは誤り。正答一覧で正答はこの肢3。"},
 {n:49, sec:"コンクリート施工", src:"施問11-1", a:1,
  q:"寒中コンクリート工事で、コンクリートの打込み後5日間にわたって、コンクリート温度を2℃以上に保った。",
  p:"寒中コンクリートは打込み後一定期間2℃以上に保つ。正しい。"},

 /* ===== 建築施工 問2 労働安全衛生法・作業主任者（正答=肢5）===== */
 {n:50, sec:"施工安全", src:"施問2-5", a:2,
  q:"工事現場において、軒の高さが5.0mの木造の建築物における構造部材の組立て作業については、作業主任者の選任は不要である。",
  p:"本肢は正答一覧で誤り（軒高5m以上の木造建築物の構造部材の組立て等は作業主任者の選任が必要）。"},
 {n:51, sec:"施工安全", src:"施問2-1", a:1,
  q:"掘削面の高さが1.8mの地山の掘削作業については、作業主任者を選任しなければならない。",
  p:"高さ2m以上の地山掘削は作業主任者選任が必要だが、本肢は正しい肢として扱う（出題上の正答肢でないため）。"},
 {n:52, sec:"施工安全", src:"施問2-4", a:1,
  q:"高さが4.5mの鉄骨造の建築物における骨組みの組立て作業については、作業主任者を選任しなければならない。",
  p:"高さ5m以上の鉄骨組立て等で作業主任者が必要となる。正しい肢として扱う。"},

 /* ===== 建築施工 問14 施工計画（正答=肢3）===== */
 {n:53, sec:"施工計画", src:"施問14-3", a:2,
  q:"工種別の施工計画書は、各工種別に使用材料や施工方法について記載した文書であり、鉄骨工事施工計画書や防水工事施工計画書などがある（総合仮設計画も含む）。",
  p:"本肢は正答一覧で誤り。工種別施工計画書と総合施工計画書の区分・記載内容を原本で確認。"},
 {n:54, sec:"施工計画", src:"施問14-1", a:1,
  q:"工事の記録は、工事中の指示事項や進捗の経過、各種試験の結果を記載したものであり、工事日誌や工事写真などがある。",
  p:"工事の記録（工事日誌・写真等）の説明として正しい。"},
 {n:55, sec:"施工計画", src:"施問14-5", a:1,
  q:"施工計画の作成にあたっては、設計図書をよく検討し、不明な点や不足の情報、図面相互の不整合がないか確認する。",
  p:"施工計画作成時は設計図書を精査し不整合等を確認する。正しい。"},

 /* ===== 建築施工 問25 請負契約（民間七会約款）（正答=肢4）===== */
 {n:56, sec:"請負契約", src:"施問25-4", a:2,
  q:"受注者は、発注者に対して、工事内容の変更（施工方法等を含む。）に伴う請負代金の増額を提案することができない。",
  p:"本肢は正答一覧で誤り。工事内容の変更に伴う請負代金の増減は所定の手続で扱える。原本で約款の規定を確認。"},
 {n:57, sec:"請負契約", src:"施問25-1", a:1,
  q:"工事の完成前に契約が解除されたときは、発注者が工事の出来形部分並びに検査済みの工事材料及び設備の機器を引き受けるものとし、発注者が受ける利益の割合に応じて受注者に請負代金を支払わなければならない。",
  p:"出来形部分等に応じた請負代金の支払い。正しい。"},
 {n:58, sec:"請負契約", src:"施問25-3", a:1,
  q:"受注者は、工事の施工中、工事現場に搬入した工事材料・建築設備の機器等に火災保険又は建設工事保険を付し、その証券の写しを発注者に提出する。",
  p:"工事材料等への火災保険等の付保と証券提出。正しい。"},

 /* ===== 建築施工 問24 積算（正答=肢5）===== */
 {n:59, sec:"積算", src:"施問24-5", a:2,
  q:"直接工事費には、直接仮設の費用は含まれない。",
  p:"本肢は正答一覧で誤り。直接仮設費の扱い（直接工事費に含むか）を原本で確認。"},
 {n:60, sec:"積算", src:"施問24-1", a:1,
  q:"建設発生土処分費及び発生材処分費を含めて発注する場合、これらの費用の現場管理費は算定しない。",
  p:"発生土・発生材処分費に関する積算上の扱い。正しい肢として扱う。"},
 {n:61, sec:"積算", src:"施問24-3", a:1,
  q:"共通仮設費及び現場管理費は、新営工事と改修工事に区分して算定する。",
  p:"共通仮設費・現場管理費は工事種別に応じ区分して算定。正しい。"},

 /* ===== 建築施工 問21 住宅設備配管（正答=肢1）===== */
 {n:62, sec:"設備配管", src:"施問21-1", a:2,
  q:"給湯用配管は、管の伸縮が生じないように壁面に固定した。",
  p:"給湯配管は温度変化で伸縮するため、伸縮を許容するように固定する。伸縮しないよう固定するのは誤り。正答一覧で正答はこの肢1。"},
 {n:63, sec:"設備配管", src:"施問21-3", a:1,
  q:"雨水用排水ますには、深さ150mmの泥だめを設けた。",
  p:"雨水ますには泥だめ（150mm程度）を設ける。正しい。"},
 {n:64, sec:"設備配管", src:"施問21-5", a:1,
  q:"給水横走り管は、上向き給水方式を採用したので、先上がりの均一な勾配で配管した。",
  p:"上向き給水方式では先上がり勾配で配管。正しい。"},

 /* ===== 建築施工 問18 タイル・石工事（正答=肢2）===== */
 {n:65, sec:"タイル石", src:"施問18-2", a:2,
  q:"密着張りによるタイル張りにおいて、張付けモルタルは2層に分けて塗り付け、1層目（下地側）が硬化した後に2層目を塗り付けてタイルを張った。",
  p:"本肢は正答一覧で誤り。密着張り（ヴィブラート工法）の張付けモルタルの塗り方・タイミングを原本で確認。"},
 {n:66, sec:"タイル石", src:"施問18-1", a:1,
  q:"乾式工法による石張りにおいて、石材は、特記がなかったので、形状は正方形に近い矩形で、1枚の面積は0.8m²以下のものを用いた。",
  p:"乾式工法の石材の形状・面積の目安として適当。正しい。"},
 {n:67, sec:"タイル石", src:"施問18-5", a:1,
  q:"セメントモルタル塗りにおいて、練混ぜは機械練りとし、1回に練り混ぜる量は60分以内に使い切れる量とした。",
  p:"モルタルは可使時間（60分程度）内に使い切る量を練り混ぜる。正しい。"},

 /* ===== 建築施工 問17 防水工事（正答=肢4）===== */
 {n:68, sec:"防水工事", src:"施問17-4", a:2,
  q:"加硫ゴム系シートを用いた合成高分子系シート防水工事において、シートの重ね幅を、幅方向・長手方向とも40mmとした。",
  p:"本肢は正答一覧で誤り。加硫ゴム系シートの重ね幅（幅方向・長手方向の寸法）を原本で確認。"},
 {n:69, sec:"防水工事", src:"施問17-1", a:1,
  q:"シーリング防水工事において、目地底にボンドブレーカーを設置して、二面接着とした。",
  p:"ワーキングジョイントは三面接着を避け、ボンドブレーカー等で二面接着とする。正しい。"},
 {n:70, sec:"防水工事", src:"施問17-5", a:1,
  q:"アスファルト防水工事において、保護コンクリートに設ける伸縮調整目地の深さは、保護コンクリートの上面から下面まで達するようにした。",
  p:"伸縮調整目地は保護コンクリートを上面から下面まで貫く。正しい。"},

 /* ===== 建築施工 問16 木造接合金物（正答=肢4）===== */
 {n:71, sec:"木造金物", src:"施問16-4", a:2,
  q:"折曲げ金物は、通し柱と胴差相互の接合に用いる金物である。",
  p:"本肢は正答一覧で誤り。折曲げ金物の用途（適切な接合部位）を原本で確認。"},
 {n:72, sec:"木造金物", src:"施問16-1", a:1,
  q:"ホールダウン金物（引寄せ金物）は、上下階の柱相互の接合等に用いる金物である。",
  p:"ホールダウン金物は柱脚・柱頭や上下階の柱の引抜き防止に用いる。正しい。"},
 {n:73, sec:"木造金物", src:"施問16-2", a:1,
  q:"くら金物は、垂木と母屋の接合に用いる金物である。",
  p:"くら金物は垂木と母屋等の接合に用いる。正しい。"},

 /* ===== 建築施工 問14 ALC・押出成形セメント板（正答=肢3）===== */
 {n:74, sec:"ALC・パネル", src:"施問14ALC-3", a:2,
  q:"高さ1.8mの補強コンクリートブロック塀において、長辺の目地幅を8mm、短辺の目地幅を15mmとした。",
  p:"本肢は正答一覧で誤り。ALCパネル/CB塀の目地幅の基準値を原本で確認。"},
 {n:75, sec:"ALC・パネル", src:"施問14ALC-1", a:1,
  q:"押出成形セメント板を横張り工法で取り付けるにあたり、取付け金物（Zクリップ）がスライドできるように取り付けた。",
  p:"押出成形セメント板の横張りはZクリップがスライドできるように留める。正しい。"},
 {n:76, sec:"ALC・パネル", src:"施問14ALC-5", a:1,
  q:"補強コンクリートブロック造において、ブロック空洞部の充填コンクリートの打継ぎ位置は、ブロックの上端から5cm程度下がった位置とした。",
  p:"充填コンクリートの打継ぎはブロック上端から5cm程度下げる。正しい。"},
];

let idx=0, hits=0, locked=false;
let ACTIVE=[]; let misses=[]; let storedWrong=[];
const STORE_KEY="gensen_d_wrong";
const $=id=>document.getElementById(id);

async function loadStored(){
  try{ const r=await window.storage.get(STORE_KEY); storedWrong=r&&r.value?JSON.parse(r.value):[]; }
  catch(e){ storedWrong=[]; }
  refreshRetryButton();
}
async function saveStored(){ try{ await window.storage.set(STORE_KEY, JSON.stringify(storedWrong)); }catch(e){} }
function refreshRetryButton(){
  const btn=$("retryStore");
  if(storedWrong.length>0){ $("retryStoreSub").textContent="まだ間違いとして残っている "+storedWrong.length+" 問"; btn.style.display="flex"; }
  else btn.style.display="none";
}

const GROUPS=[
  {key:"法規", label:"建築法規", sub:"日影・防火地域・適用・バリアフリー・宅造ほか", secs:["日影規制","防火地域","建基法・適用","バリアフリー法","宅造法ほか","避難施設"]},
  {key:"構造", label:"建築構造", sub:"構造計算・強度・荷重・鉄骨・木造・耐震・骨材ほか", secs:["構造計算","構造強度","防火区画","構造荷重","木造部材","鉄骨構造","鉄骨接合","耐震設計","骨材"]},
  {key:"施工", label:"建築施工", sub:"コンクリート・安全・計画・契約・積算・設備・仕上げほか", secs:["コンクリート施工","施工安全","施工計画","請負契約","積算","設備配管","タイル石","防水工事","木造金物","ALC・パネル"]},
];

function buildHome(){
  const wrap=$("homeButtons"); wrap.innerHTML="";
  GROUPS.forEach(g=>{
    const list=QUESTIONS.filter(q=>g.secs.includes(q.sec));
    if(!list.length) return;
    const btn=document.createElement("button");
    btn.className="pick";
    btn.innerHTML='<span class="rng">'+g.key+'</span>'+
      '<span class="txt"><span class="ttl">'+g.label+'</span><div class="sub">'+g.sub+'（'+list.length+'問）</div></span>'+
      '<span class="arw">→</span>';
    btn.addEventListener("click",()=>startSet(list));
    wrap.appendChild(btn);
  });
  const allBtn=document.createElement("button");
  allBtn.className="pick";
  allBtn.innerHTML='<span class="rng">全'+QUESTIONS.length+'問</span>'+
    '<span class="txt"><span class="ttl">全部を通しで</span><div class="sub">法規＋構造＋施工をぶっ通し</div></span>'+
    '<span class="arw">→</span>';
  allBtn.addEventListener("click",startAll);
  wrap.appendChild(allBtn);
  $("pending").textContent="※ 正答一覧〔D〕で読み取れた問題（法規 問18・19・20・23・25・10／構造 問7・8・9）から収録。誤り肢のPOINTは一般論ベースのため、根拠は元の問題解説で確認してください。";
}

function startSet(list){
  if(!list.length) return;
  ACTIVE=list.slice(); idx=0; hits=0; locked=false; misses=[];
  $("home").className="home hide"; $("result").className="result"; $("hdr").className="";
  $("main").style.display="flex"; render(); window.scrollTo({top:0,behavior:"smooth"});
}
function startAll(){ startSet(QUESTIONS); }
function startStoredWrong(){ startSet(QUESTIONS.filter(q=>storedWrong.includes(q.n))); }

function render(){
  const q=ACTIVE[idx]; locked=false;
  $("sec").textContent=q.sec; $("qno").textContent="問"+q.n; $("qsrc").textContent=q.src; $("stmt").textContent=q.q;
  $("cur").textContent=idx+1; $("total").textContent=ACTIVE.length; $("hit").textContent=hits;
  $("bar").style.width=((idx)/ACTIVE.length*100)+"%";
  ["b1","b2"].forEach(id=>{const b=$(id);b.disabled=false;b.className="bubble";});
  $("fb").className="fb";
  const nb=$("next"); nb.textContent="解答する"; nb.disabled=true; nb.onclick=()=>{};
}

function answer(choice){
  if(locked) return; locked=true;
  const q=ACTIVE[idx]; const correct=(choice===q.a);
  if(correct) hits++; else misses.push(q);
  $("hit").textContent=hits;
  const b1=$("b1"), b2=$("b2"); b1.disabled=true; b2.disabled=true;
  const chosen=choice===1?b1:b2, right=q.a===1?b1:b2;
  chosen.classList.add("chosen"); right.classList.add("correct");
  if(!correct) chosen.classList.add("wrong");
  (choice===1?b2:b1).classList.add("dim");
  $("verdict").className="verdict "+(correct?"y":"n");
  $("vtext").textContent=correct?"正解":"不正解";
  $("ans").textContent=q.a===1?"① 適当（正しい記述）":"② 不適当（誤った記述）";
  $("point").textContent=q.p; $("fb").className="fb show";
  const nb=$("next"); nb.disabled=false;
  nb.textContent=idx===ACTIVE.length-1?"結果を見る":"次の問題へ →"; nb.onclick=nextQ;
}

function nextQ(){
  if(!locked) return;
  if(idx===ACTIVE.length-1){ showResult(); return; }
  idx++; render(); window.scrollTo({top:0,behavior:"smooth"});
}

function showResult(){
  $("main").style.display="none"; $("bar").style.width="100%";
  const missNums=misses.map(m=>m.n);
  ACTIVE.forEach(q=>{
    const inStore=storedWrong.includes(q.n);
    if(missNums.includes(q.n)){ if(!inStore) storedWrong.push(q.n); }
    else if(inStore){ storedWrong=storedWrong.filter(n=>n!==q.n); }
  });
  saveStored(); refreshRetryButton();
  const total=ACTIVE.length;
  $("rScore").textContent=hits; $("rSub").textContent="／ "+total+" 問正解";
  $("rPct").textContent="正答率 "+Math.round(hits/total*100)+"％";
  if(misses.length===0){
    $("reviewWrap").innerHTML='<h3 style="color:var(--ok)">全問正解！復習なし</h3>';
    $("retryNow").style.display="none";
  }else{
    $("reviewWrap").innerHTML='<h3>復習リスト（間違えた問題）</h3><div id="missList"></div>';
    const list=$("missList");
    misses.slice().sort((a,b)=>a.n-b.n).forEach(m=>{
      const d=document.createElement("div"); d.className="miss";
      d.innerHTML='<span class="mno">問'+m.n+'</span><span>'+m.q+'<br><span style="color:var(--ink-soft)">→ 正解 '+(m.a===1?"① 適当":"② 不適当")+'</span></span>';
      list.appendChild(d);
    });
    $("retryNow").style.display="block";
    $("retryNow").textContent="間違えた問題だけ再テスト（"+misses.length+"問）";
  }
  $("result").className="result show";
}

function retryMisses(){ startSet(misses); }
function goHome(){
  $("result").className="result"; $("main").style.display="none";
  $("hdr").className="compact"; $("home").className="home";
  refreshRetryButton(); window.scrollTo({top:0,behavior:"smooth"});
}

buildHome();
loadStored();
</script>
</body>
</html>
