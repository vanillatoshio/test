<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>厳選D ○×トレーナー｜2級建築士 厳選問題</title>
<style>
  :root{
    --accent:#3f51b5;
    --accent-light:#5c6bc0;
    --accent-bg:#eceef9;
    --maru:#2e9e6b;
    --batsu:#d9534f;
    --ink:#2a2733;
    --muted:#85889a;
    --line:#e2e6ef;
    --card:#ffffff;
    --bg:#f5f7fb;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:var(--bg);color:var(--ink);
    line-height:1.7;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 48px;}

  header.top{text-align:center;padding:24px 0 8px;}
  header.top .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:700;}
  header.top h1{font-size:22px;margin:6px 0 2px;font-weight:800;}
  header.top .sub{font-size:13px;color:var(--muted);}

  .home-intro{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:16px 18px;margin:16px 0;font-size:13.5px;color:#55525f;
  }
  .home-intro b{color:var(--accent);}
  .home-nav{display:flex;justify-content:center;margin:4px 0 4px;}
  .home-nav a{font-size:13px;color:var(--accent);font-weight:700;text-decoration:none;}
  .sec-grid{display:flex;flex-direction:column;gap:12px;margin-top:8px;}
  .sec-btn{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:18px 20px;cursor:pointer;transition:.15s;text-align:left;width:100%;
    font-family:inherit;color:inherit;
  }
  .sec-btn:active{transform:scale(.98);}
  .sec-btn .name{font-size:17px;font-weight:700;}
  .sec-btn .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .sec-btn .count{
    background:var(--accent-bg);color:var(--accent);font-weight:700;
    border-radius:999px;padding:4px 12px;font-size:13px;white-space:nowrap;
  }
  .sec-btn.all{background:var(--accent);border-color:var(--accent);color:#fff;}
  .sec-btn.all .meta{color:rgba(255,255,255,.8);}
  .sec-btn.all .count{background:rgba(255,255,255,.22);color:#fff;}
  .sec-btn.review{background:#fff7f6;border-color:#f3d6d4;}
  .sec-btn.review .name{color:var(--batsu);}
  .sec-btn.review .count{background:#fae3e2;color:var(--batsu);}
  .sec-btn:disabled{opacity:.45;cursor:default;}
  .cat-head{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin:14px 2px 2px;}

  .bar{display:flex;align-items:center;gap:12px;margin:8px 0 14px;}
  .back{
    background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;
    cursor:pointer;font-family:inherit;padding:6px 0;
  }
  .progress{flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden;}
  .progress > i{display:block;height:100%;background:var(--accent);width:0;transition:.3s;}
  .counter{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap;}

  .card{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    padding:22px 20px;box-shadow:0 6px 20px rgba(40,70,140,.05);
  }
  .src-tag{
    display:inline-block;background:var(--accent-bg);color:var(--accent);
    font-size:12px;font-weight:700;border-radius:8px;padding:3px 10px;margin-bottom:14px;
  }
  .q-text{font-size:16.5px;line-height:1.9;font-weight:500;}

  .choices{display:flex;gap:14px;margin-top:22px;}
  .choice{
    flex:1;border:2px solid var(--line);background:var(--card);border-radius:16px;
    padding:18px 0;font-size:30px;font-weight:800;cursor:pointer;font-family:inherit;
    transition:.12s;color:var(--ink);
  }
  .choice:active{transform:scale(.96);}
  .choice.maru{color:var(--maru);}
  .choice.batsu{color:var(--batsu);}
  .choice:disabled{cursor:default;}
  .choice.sel-correct{border-color:var(--maru);background:#eef9f3;}
  .choice.sel-wrong{border-color:var(--batsu);background:#fdeeed;}
  .choice.dim{opacity:.35;}

  .result{margin-top:18px;border-radius:16px;padding:16px 18px;display:none;}
  .result.show{display:block;animation:fade .25s;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .result.ok{background:#eef9f3;border:1px solid #bfe6d2;}
  .result.ng{background:#fdeeed;border:1px solid #f3cecb;}
  .result .verdict{font-weight:800;font-size:15px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .result.ok .verdict{color:var(--maru);}
  .result.ng .verdict{color:var(--batsu);}
  .result .ans{font-size:13px;color:var(--muted);font-weight:700;}
  .result .point{font-size:14.5px;line-height:1.8;margin-top:8px;color:#3d3a47;}
  .result .point b{color:var(--accent);}
  .result .point .hl{background:#fff3bf;padding:0 2px;border-radius:3px;}

  .next{
    width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;
    border-radius:14px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;
    font-family:inherit;display:none;
  }
  .next.show{display:block;}
  .next:active{transform:scale(.98);}

  .summary{text-align:center;padding-top:10px;}
  .summary .ring{
    width:150px;height:150px;border-radius:50%;margin:18px auto;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:conic-gradient(var(--accent) var(--deg,0deg),var(--line) 0);
  }
  .summary .ring .inner{
    width:122px;height:122px;border-radius:50%;background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .summary .ring .pct{font-size:34px;font-weight:800;color:var(--accent);}
  .summary .ring .lbl{font-size:12px;color:var(--muted);}
  .summary h2{font-size:20px;margin:6px 0;}
  .summary .score{font-size:15px;color:var(--muted);margin-bottom:18px;}
  .summary .acts{display:flex;flex-direction:column;gap:10px;}
  .summary .acts button{
    border-radius:14px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;
    font-family:inherit;border:none;
  }
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-ghost{background:var(--card);color:var(--accent);border:1px solid var(--line)!important;}
  .btn-review{background:#fff7f6;color:var(--batsu);border:1px solid #f3d6d4!important;}

  .hidden{display:none!important;}
  footer{text-align:center;font-size:11px;color:#b6bccb;margin-top:28px;}
</style>
</head>
<body>
<div class="wrap">

  <!-- HOME -->
  <section id="home">
    <header class="top">
      <div class="eyebrow">2級建築士 厳選問題</div>
      <h1>厳選D ○×トレーナー</h1>
      <div class="sub">全76問</div>
    </header>
    <div class="home-nav"><a href="index.html">← メニューへ</a></div>
    <div class="home-intro">黄色マーク等の要点を <b>○×形式</b>（全76問）で出題します。<br>正解すると<b>ポイント解説</b>が表示され、間違えた問題は<b>復習</b>でまとめて解き直せます。</div>
    <div class="sec-grid" id="secGrid"></div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="bar">
      <button class="back" id="backBtn">← 戻る</button>
      <div class="progress"><i id="prog"></i></div>
      <div class="counter" id="counter"></div>
    </div>
    <div class="card">
      <span class="src-tag" id="srcTag">No.</span>
      <div class="q-text" id="qText"></div>
      <div class="choices">
        <button class="choice maru" id="cMaru">○</button>
        <button class="choice batsu" id="cBatsu">×</button>
      </div>
      <div class="result" id="result">
        <div class="verdict" id="verdict"></div>
        <div class="ans" id="ansLine"></div>
        <div class="point" id="pointText"></div>
      </div>
    </div>
    <button class="next" id="nextBtn">次の問題 →</button>
  </section>

  <!-- SUMMARY -->
  <section id="summary" class="hidden">
    <div class="summary">
      <div class="ring" id="ring"><div class="inner">
        <div class="pct" id="pct">0%</div><div class="lbl">正答率</div>
      </div></div>
      <h2 id="sumTitle">おつかれさまでした</h2>
      <div class="score" id="sumScore"></div>
      <div class="acts">
        <button class="btn-review hidden" id="sumReview"></button>
        <button class="btn-primary" id="sumRetry"></button>
        <button class="btn-ghost" id="sumHome">ホームに戻る</button>
      </div>
    </div>
  </section>

  <footer>2級建築士 学習用 ○×トレーナー（個人学習用）</footer>
</div>

<script>
const QUESTIONS = [
  {n:1, src:"問18-2", cat:"日影規制", a:false, q:"同一の敷地内に2以上の建築物がある場合、これらの建築物をそれぞれ別の建築物とみなして、日影規制を適用する。", p:"同一敷地内に2以上の建築物がある場合は、これらを「一の建築物」とみなして日影規制を適用する。別々とみなすのは誤り。"},
  {n:2, src:"問18-1", cat:"日影規制", a:true, q:"建築物の敷地が幅員10m以下の道路に接する場合、当該道路の反対側の境界線は、当該道路の幅の1/2だけ外側にあるものとみなす。", p:"幅員10m以下の道路に接する場合、道路幅の1/2だけ外側を境界線とみなす。正しい。"},
  {n:3, src:"問18-3", cat:"日影規制", a:true, q:"商業地域内においては、原則として、日影規制は適用されない。", p:"商業・工業・工業専用地域は日影規制の対象区域から除かれる。正しい。"},
  {n:4, src:"問18-4", cat:"日影規制", a:true, q:"第一種低層住居専用地域内においては、原則として、軒の高さが7mを超える建築物又は地階を除く階数が3以上の建築物について、日影規制を適用する。", p:"低層住専は「軒高7m超 又は 階数3以上」で日影規制の対象。正しい。"},
  {n:5, src:"問18-5", cat:"日影規制", a:true, q:"日影規制が適用されるか否かの建築物の高さの算定は、原則として、平均地盤面からの高さによる。", p:"日影規制の高さ算定は平均地盤面から。正しい。"},
  {n:6, src:"問19-5", cat:"防火地域", a:false, q:"準防火地域内にある3階建て、延べ面積300m²の診療所(患者の収容施設がないもの)は、耐火建築物としなければならない。", p:"患者収容施設のない診療所で3階建て・延べ300m²なら、準防火地域では準耐火建築物等でも可。耐火建築物に限るとするのは誤り。"},
  {n:7, src:"問19-1", cat:"防火地域", a:true, q:"防火地域内において一戸建て住宅を新築する場合、屋根の構造は、市街地における通常の火災による火の粉により防火上有害な発炎をしないものとしなければならない。", p:"防火・準防火地域の屋根は火の粉による発炎防止等の性能が必要。正しい。"},
  {n:8, src:"問19-2", cat:"防火地域", a:true, q:"防火地域内の高さ2mを超える看板で、建築物の屋上に設けるものは、その主要な部分を不燃材料で造り、又は覆わなければならない。", p:"防火地域内・屋上の高さ2m超の看板等は主要部を不燃材料で造る/覆う。正しい。"},
  {n:9, src:"問19-3", cat:"防火地域", a:true, q:"防火地域内にある建築物に附属する高さ2mを超える門・塀は、延焼防止上支障のない構造としなければならない。", p:"防火地域内の高さ2m超の門・塀は延焼防止上支障のない構造とする。正しい。"},
  {n:10, src:"問20-1", cat:"建基法・適用", a:false, q:"特定行政庁は、国際的な規模の競技会の用に供する特別の必要がある仮設興行場について、安全上・防火上・衛生上支障がなく公益上やむを得ないと認める場合、1年を超えて使用する建築物として建築を許可することはできない。", p:"特定行政庁は所定の手続を経れば、1年を超える期間の仮設建築物の存続を許可できる。「許可できない」とするのは誤り。"},
  {n:11, src:"問20-3", cat:"建基法・適用", a:true, q:"防火地域及び準防火地域以外の区域内における木造3階建ての一戸建て住宅(住宅以外の用途に供する部分はない)について、指定確認検査機関が建築基準法第6条の2第1項による確認をする場合、原則として消防長又は消防署長の同意が必要である。", p:"住宅でも一定規模等では消防同意が必要。正しい。"},
  {n:12, src:"問20-5", cat:"建基法・適用", a:true, q:"高さ6mの観覧車を築造する場合には、建築基準法第20条の規定が準用される。", p:"高さ6mを超える観覧車等の工作物には構造関係規定が準用される（本肢は正しい記述として扱う）。"},
  {n:13, src:"問23-イ", cat:"バリアフリー法", a:false, q:"「高齢者、障害者等の移動等の円滑化の促進に関する法律」上、移動等円滑化経路を構成する敷地内の通路の幅は、原則として、120cm以上でなければならない。", p:"敷地内通路の幅は原則として「140cm以上」。120cm以上とするのは誤り（本問は誤りの肢を含む組合せ問題で、正答は2）。"},
  {n:14, src:"問23-ハ", cat:"バリアフリー法", a:true, q:"建築物移動等円滑化基準において、多数の者が利用する駐車場を設ける場合、車椅子使用者用駐車施設の総数が200以下のときは、原則として、その総数に1/50を乗じて得た数以上の車椅子使用者用駐車施設を設けなければならない。", p:"車椅子使用者用駐車施設は総数200以下なら1/50以上を設置。正しい。"},
  {n:15, src:"問25-5", cat:"宅造法ほか", a:false, q:"「都市計画法」上、高度利用地区は、用途地域内において市街地の環境を維持し、又は土地利用の増進を図るため、建築物の高さの最高限度又は最低限度を定める地区をいう。", p:"高度利用地区は容積率の最高/最低限度や建蔽率の最高限度等を定める地区。建築物の「高さ」の最高/最低限度を定めるのは高度地区。記述は誤り。"},
  {n:16, src:"問25-1", cat:"宅造法ほか", a:true, q:"「宅地造成及び特定盛土等規制法」上、宅地造成等工事規制区域内の土地の所有者は、宅地造成等に伴う災害が生じないよう、その土地を常時安全な状態に維持するよう努めなければならない。", p:"規制区域内の土地所有者等には安全維持の努力義務がある。正しい。"},
  {n:17, src:"問25-4", cat:"宅造法ほか", a:true, q:"「都市計画法」上、都市計画施設の区域内において、地階を有しない木造2階建ての一戸建て住宅を新築しようとする者は、原則として、都道府県知事等の許可を受けなければならない。", p:"都市計画施設の区域内の建築は原則として知事等の許可が必要。正しい。"},
  {n:18, src:"問7-1", cat:"構造計算", a:false, q:"延べ面積150m²、高さ5mの平家建ての事務所(構造計算等に関する安全性の確認は行わないもの)で、補強コンクリートブロック造とする場合、耐力壁の厚さを15cmとした。", p:"補強CB造の耐力壁の厚さは原則15cm以上だが、高さ等の条件により本肢は正答一覧で誤り。数値・条件を原本で確認。"},
  {n:19, src:"問7-2", cat:"構造計算", a:true, q:"鉄筋コンクリート造とするにあたって、構造耐力上主要な部分である柱・はりにおいて、複筋ばりとし、これにあばら筋をはりの大きい方の3/4以下の間隔で配置した。", p:"あばら筋ははりの丈の3/4以下の間隔で配置。正しい。"},
  {n:20, src:"問7-3", cat:"構造計算", a:true, q:"鉄筋コンクリート造とするにあたって、構造耐力上主要な部分であるはりにおいて、その端部及び隅角部に径12mm以上の鉄筋を縦に配置した。", p:"はりの端部・隅角部の配筋として適当。正しい。"},
  {n:21, src:"問8-4", cat:"構造強度", a:false, q:"保有水平耐力計算により構造耐力上主要な部分の断面に生ずる長期の応力度を計算する場合、多雪区域においては、地震力を考慮しなければならない。", p:"本肢は正答一覧で誤り。多雪区域での荷重組合せ（長期/短期、積雪・地震の扱い）を原本で確認。"},
  {n:22, src:"問8-1", cat:"構造強度", a:true, q:"建築基準法第20条第1項第三号に掲げる建築物に設ける屋上から突出する煙突は、国土交通大臣が定める基準に従った構造計算により、風圧並びに地震その他の震動・衝撃に対して構造耐力上安全であることを確かめなければならない。", p:"屋上突出の煙突等は風圧・地震等に対する構造計算で安全確認。正しい。"},
  {n:23, src:"問8-2", cat:"構造強度", a:true, q:"構造耐力上主要な部分である柱・筋かい・土台のうち、地面から1m以内の部分には、有効な防腐措置を講ずるとともに、必要に応じてしろあり等の虫害を防ぐための措置を講じなければならない。", p:"地面から1m以内の柱・筋かい・土台には防腐・防蟻措置。正しい。"},
  {n:24, src:"問9-3", cat:"防火区画", a:false, q:"平家建て、延べ面積1,200m²の旅館で、耐火建築物及び準耐火建築物以外のものは、床面積の合計1,000m²以内ごとに防火上有効な構造の防火壁等によって区画しなければならない。", p:"本肢は正答一覧で誤り。防火壁区画の対象規模・適用除外（耐火/準耐火等）の条件を原本で確認。"},
  {n:25, src:"問9-1", cat:"防火区画", a:true, q:"木造建築物等の小屋組が木造である場合、原則として、小屋裏に準耐火構造の隔壁を設けなければならない場合がある（延べ面積等の条件による）。", p:"大規模な木造建築物等では小屋裏に準耐火構造の隔壁を設ける規定がある。正しい。"},

const STORE_KEY = "gensen_d_wrong";

/* ===== 誤答ストレージ：window.storage → localStorage → メモリ の3段フォールバック ===== */
let memStore = {};
async function storeGet(k){
  try{ if(window.storage&&window.storage.get){const r=await window.storage.get(k); if(r&&r.value!=null) return r.value;} }catch(e){}
  try{ const v=localStorage.getItem(k); if(v!=null) return v; }catch(e){}
  return memStore[k]!=null?memStore[k]:null;
}
async function storeSet(k,v){
  try{ if(window.storage&&window.storage.set){await window.storage.set(k,v);} }catch(e){}
  try{ localStorage.setItem(k,v); }catch(e){}
  memStore[k]=v;
}
async function getWrongSet(){
  const v=await storeGet(STORE_KEY);
  if(v){ try{ return new Set(JSON.parse(v)); }catch(e){} }
  return new Set();
}
async function saveWrongSet(set){ await storeSet(STORE_KEY, JSON.stringify([...set])); }

const catOf = q => q.cat || q.sec || "";

let pool=[], idx=0, correctCount=0, sessionWrong=[];
const el = id => document.getElementById(id);
const homeSec=el("home"), quizSec=el("quiz"), sumSec=el("summary");

function makeSecBtn({name,meta,count,cls,onClick}){
  const b=document.createElement("button");
  b.className="sec-btn "+(cls||"");
  b.innerHTML=`<span><span class="name">${name}</span>${meta?`<span class="meta">${meta}</span>`:""}</span>
               <span class="count">${count}問</span>`;
  b.addEventListener("click",onClick);
  return b;
}

async function renderHome(){
  const grid=el("secGrid"); grid.innerHTML="";
  const wrongSet=await getWrongSet();

  grid.appendChild(makeSecBtn({
    name:`全${QUESTIONS.length}問に挑戦`, meta:"すべての問題をランダム表示",
    count:QUESTIONS.length, cls:"all", onClick:()=>startQuiz(QUESTIONS,true)
  }));

  const wrongQs=QUESTIONS.filter(q=>wrongSet.has(q.n));
  const rev=makeSecBtn({
    name:"間違い復習", meta:wrongQs.length?"間違えた問題だけ解き直す":"間違いはまだありません",
    count:wrongQs.length, cls:"review", onClick:()=>startQuiz(wrongQs,true)
  });
  if(!wrongQs.length) rev.disabled=true;
  grid.appendChild(rev);

  /* 分野別（カテゴリがある場合のみ） */
  const cats=[...new Set(QUESTIONS.map(catOf).filter(Boolean))];
  if(cats.length>1){
    const head=document.createElement("div"); head.className="cat-head"; head.textContent="分野別に解く";
    grid.appendChild(head);
    cats.forEach(c=>{
      const qs=QUESTIONS.filter(q=>catOf(q)===c);
      grid.appendChild(makeSecBtn({ name:c, count:qs.length, cls:"", onClick:()=>startQuiz(qs,false) }));
    });
  }
}

function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(set,doShuffle){
  if(!set.length) return;
  pool=doShuffle?shuffle(set):[...set];
  idx=0; correctCount=0; sessionWrong=[];
  homeSec.classList.add("hidden"); sumSec.classList.add("hidden");
  quizSec.classList.remove("hidden"); showQuestion();
}

function showQuestion(){
  const q=pool[idx];
  const c=catOf(q);
  el("srcTag").textContent = c?`${q.src}　【${c}】`:`${q.src}`;
  el("qText").textContent=q.q;
  el("counter").textContent=`${idx+1}/${pool.length}`;
  el("prog").style.width=`${(idx/pool.length)*100}%`;
  const cM=el("cMaru"), cB=el("cBatsu");
  [cM,cB].forEach(x=>{x.disabled=false;x.classList.remove("sel-correct","sel-wrong","dim");});
  el("result").className="result"; el("nextBtn").className="next";
  cM.onclick=()=>answer(true); cB.onclick=()=>answer(false);
}

async function answer(choice){
  const q=pool[idx];
  const cM=el("cMaru"), cB=el("cBatsu");
  cM.disabled=true; cB.disabled=true;
  const isCorrect=(choice===q.a);
  const chosenEl=choice?cM:cB, otherEl=choice?cB:cM;
  if(isCorrect){ chosenEl.classList.add("sel-correct"); otherEl.classList.add("dim"); correctCount++; }
  else{ chosenEl.classList.add("sel-wrong"); (q.a?cM:cB).classList.add("sel-correct"); sessionWrong.push(q.n); }
  const res=el("result");
  res.classList.add("show", isCorrect?"ok":"ng");
  el("verdict").textContent=isCorrect?"正解！":"不正解";
  el("ansLine").textContent=`正解は「${q.a?"○":"×"}」`;
  el("pointText").innerHTML=`<b>ポイント：</b>${q.p||""}`;
  el("prog").style.width=`${((idx+1)/pool.length)*100}%`;
  const wrongSet=await getWrongSet();
  if(isCorrect) wrongSet.delete(q.n); else wrongSet.add(q.n);
  await saveWrongSet(wrongSet);
  const nb=el("nextBtn"); nb.classList.add("show");
  nb.textContent=(idx+1<pool.length)?"次の問題 →":"結果を見る →"; nb.onclick=nextQuestion;
}

function nextQuestion(){ idx++; if(idx<pool.length) showQuestion(); else showSummary(); }

function showSummary(){
  quizSec.classList.add("hidden"); sumSec.classList.remove("hidden");
  const total=pool.length, pct=Math.round((correctCount/total)*100);
  el("pct").textContent=pct+"%";
  el("ring").style.setProperty("--deg",(pct*3.6)+"deg");
  el("sumScore").textContent=`${total}問中 ${correctCount}問 正解`;
  const isReview=pool.length<QUESTIONS.length;
  let title="おつかれさまでした";
  if(pct===100) title=isReview?"間違いをすべてクリア！🎯":"全問正解！ 完璧です🎯";
  else if(pct>=80) title="good! あと少し";
  else if(pct>=50) title="復習で固めましょう";
  else title="間違いを見直そう";
  el("sumTitle").textContent=title;
  const wrongQs=pool.filter(q=>sessionWrong.includes(q.n));
  const rb=el("sumReview");
  if(wrongQs.length){ rb.classList.remove("hidden"); rb.textContent=`間違えた${wrongQs.length}問を解き直す`; rb.onclick=()=>startQuiz(wrongQs,true); }
  else rb.classList.add("hidden");
  el("sumRetry").textContent=`最初から全${QUESTIONS.length}問`;
  el("sumRetry").onclick=()=>startQuiz(QUESTIONS,true);
  el("sumHome").onclick=goHome;
}

function goHome(){ quizSec.classList.add("hidden"); sumSec.classList.add("hidden"); homeSec.classList.remove("hidden"); renderHome(); }
el("backBtn").addEventListener("click",goHome);
renderHome();
</script>
</body>
</html>
