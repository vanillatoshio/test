<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>気になる横断 暗記｜2級建築士</title>
<style>
  :root{
    --accent:#3f51b5;--accent-bg:#eceeffa0;--ink:#2a2733;--muted:#85889a;
    --line:#e2e6ef;--card:#fff;--bg:#f5f7fb;--maru:#2e9e6b;--batsu:#d9534f;--gold:#b8860b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--ink);line-height:1.7;}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 48px;}
  header.top{text-align:center;padding:22px 0 6px;}
  header.top .eyebrow{font-size:12px;letter-spacing:.18em;color:var(--accent);font-weight:700;}
  header.top h1{font-size:21px;margin:6px 0 2px;font-weight:800;}
  header.top .sub{font-size:13px;color:var(--muted);}
  .home-nav{display:flex;justify-content:center;margin:6px 0;}
  .home-nav a{font-size:13px;color:var(--accent);font-weight:700;text-decoration:none;}
  .intro{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin:12px 0;font-size:13.5px;color:#55525f;}
  .intro b{color:var(--accent);}
  .big{display:flex;flex-direction:column;gap:10px;margin-top:10px;}
  .pill{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;font-family:inherit;color:inherit;width:100%;text-align:left;}
  .pill:active{transform:scale(.98);}
  .pill .name{font-size:16px;font-weight:700;}
  .pill .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .pill .cnt{background:var(--accent-bg);color:var(--accent);font-weight:800;border-radius:999px;padding:4px 12px;font-size:13px;white-space:nowrap;}
  .pill.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pill.primary .cnt{background:rgba(255,255,255,.22);color:#fff;}
  .pill.list{background:#fffdf5;border-color:#f0e2b8;}
  .pill.list .name{color:var(--gold);}
  .pill:disabled{opacity:.5;}
  .apphead{font-size:12px;font-weight:700;color:var(--muted);margin:14px 2px 4px;}
  .approw{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:7px;cursor:pointer;}
  .approw .nm{font-size:13.5px;font-weight:600;}
  .approw .c{font-size:12px;color:var(--accent);font-weight:800;background:var(--accent-bg);border-radius:999px;padding:2px 9px;}

  .bar{display:flex;align-items:center;gap:12px;margin:8px 0 14px;}
  .back{background:none;border:none;color:var(--accent);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;padding:6px 0;}
  .progress{flex:1;height:8px;background:var(--line);border-radius:999px;overflow:hidden;}
  .progress>i{display:block;height:100%;background:var(--accent);width:0;transition:.3s;}
  .counter{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px 18px;box-shadow:0 6px 20px rgba(40,70,140,.05);}
  .tags{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;}
  .src-tag{display:inline-block;background:var(--accent-bg);color:var(--accent);font-size:11.5px;font-weight:700;border-radius:8px;padding:3px 9px;}
  .app-tag{font-size:11px;color:var(--muted);font-weight:700;text-align:right;}
  .q-text{font-size:16.5px;line-height:1.9;font-weight:500;}
  .q-text img{max-width:100%;border-radius:12px;}
  .reveal{width:100%;margin-top:18px;background:var(--accent);color:#fff;border:none;border-radius:14px;padding:15px;font-size:15.5px;font-weight:800;cursor:pointer;font-family:inherit;}
  .ans{margin-top:16px;border-radius:14px;padding:14px 16px;display:none;animation:fade .2s;}
  .ans.show{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .ans.ok{background:#eef9f3;border:1px solid #bfe6d2;}
  .ans.ng{background:#fdeeed;border:1px solid #f3cecb;}
  .ans.nu{background:#f4f5fb;border:1px solid var(--line);}
  .ox{font-size:22px;font-weight:900;}
  .ans.ok .ox{color:var(--maru);} .ans.ng .ox{color:var(--batsu);}
  .point{font-size:14px;line-height:1.8;margin-top:8px;color:#3d3a47;}
  .point b{color:var(--accent);} .point .hl{background:#fff3bf;padding:0 2px;border-radius:3px;}
  .ansmain{font-size:15px;font-weight:800;margin-bottom:4px;}
  .row2{display:flex;gap:10px;margin-top:14px;}
  .row2 button{flex:1;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;border:1px solid var(--line);background:#fff;color:var(--ink);}
  .row2 .next{background:var(--accent);color:#fff;border-color:var(--accent);}
  .unstar{background:none;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12.5px;font-weight:700;color:var(--gold);cursor:pointer;font-family:inherit;white-space:nowrap;}

  .listitem{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin-bottom:10px;}
  .listitem .lq{font-size:14.5px;line-height:1.8;}
  .listitem .lq img{max-width:100%;border-radius:10px;}
  .listitem .la{margin-top:8px;font-size:13.5px;color:#3d3a47;background:#fbfbe9;border-radius:8px;padding:8px 10px;}
  .listitem .la.hide{filter:blur(5px);}
  .listitem .meta{display:flex;justify-content:space-between;margin-bottom:6px;}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:40px 10px;}
  .loading{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px;}
  .hidden{display:none!important;}
  footer{text-align:center;font-size:11px;color:#b6bccb;margin-top:26px;}
</style>
</head>
<body>
<div class="wrap">
  <section id="home">
    <header class="top">
      <div class="eyebrow">気になる ★ 横断トレーナー</div>
      <h1>気になる問題 まとめ暗記</h1>
      <div class="sub" id="homeSub">読み込み中…</div>
    </header>
    <div class="home-nav"><a href="index.html">← メニューへ</a></div>
    <div class="intro">各アプリで <b>「☆ 気になる」</b> を付けた問題を<b>すべて集めて</b>、ここで横断で暗記できます。<br><b>暗記モード</b>＝答えを隠してめくり式／<b>一覧モード</b>＝赤シート風にまとめ読み。</div>
    <div id="homeBody" class="loading">★を集計しています…</div>
  </section>

  <section id="study" class="hidden">
    <div class="bar">
      <button class="back" id="sBack">← 戻る</button>
      <div class="progress"><i id="sProg"></i></div>
      <div class="counter" id="sCnt"></div>
    </div>
    <div class="card">
      <div class="tags"><span class="src-tag" id="sSrc"></span><span class="app-tag" id="sApp"></span></div>
      <div class="q-text" id="sQ"></div>
      <button class="reveal" id="sReveal">答えを見る</button>
      <div class="ans" id="sAns">
        <div class="ansmain" id="sAnsMain"></div>
        <div class="point" id="sPoint"></div>
      </div>
      <div class="row2" id="sRow2" style="display:none;">
        <button class="unstar" id="sUnstar">★ 解除</button>
        <button class="next" id="sNext">次へ →</button>
      </div>
    </div>
  </section>

  <section id="list" class="hidden">
    <div class="bar">
      <button class="back" id="lBack">← 戻る</button>
      <div class="counter" id="lCnt"></div>
      <button class="unstar" id="lToggle" style="margin-left:auto;">答えを隠す</button>
    </div>
    <div id="listBody"></div>
  </section>

  <footer>気になる ★ 横断トレーナー（個人学習用）</footer>
</div>
<script>
const MANIFEST = [{"f":"houki%20kakunin1.html","label":"確認申請の要否","star":"houki_kakunin1_star"},{"f": "boukachiiki kozo quiz.html", "label": "防火・準防火地域の構造規制", "star": "boukachiiki_kozo_star"}, {"f": "gensen b quiz.html", "label": "2級建築士 厳選問題B", "star": "gensen_b_star"}, {"f": "gensen b2 quiz.html", "label": "2級建築士 厳選問題B-2", "star": "gensen_b2_star"}, {"f": "gensen d quiz.html", "label": "2級建築士 厳選問題D", "star": "gensen_d_star"}, {"f": "hisshou1 houki quiz.html", "label": "必勝テスト① 法規", "star": "hisshou1_houki_star"}, {"f": "hisshou1 kozo quiz.html", "label": "必勝テスト① 構造", "star": "hisshou1_kozo_star"}, {"f": "houki kakunin itoshima 2 quiz.html", "label": "法規確認問題 糸島②", "star": "houki_itoshima2_star"}, {"f": "houki kakunin itoshima quiz.html", "label": "法規確認問題 糸島", "star": "houki_itoshima_star"}, {"f": "houki kouzou quiz.html", "label": "2級建築士 法規・構造", "star": "houki_kouzou_star"}, {"f": "houki note quiz.html", "label": "2級建築士 法規まとめノート 〇✕トレーナー", "star": "houki_note_star"}, {"f": "houki_itoshima1.html", "label": "法規 糸島① ○×", "star": "houki_itoshima1_star"}, {"f": "houki_kozo.html", "label": "法規（構造強度）○×", "star": "houki_kozo_star"}, {"f": "houki%20marathon1.html", "label": "法規", "star": "houki_marathon1_star"}, {"f": "kakunin shinsei quiz.html", "label": "建築確認の要否（法6条・R7改正）○×トレーナー", "star": "kakunin_shinsei_star"}, {"f": "kakunin1 houki quiz.html", "label": "確認テスト① 法規", "star": "kakunin1_houki_star"}, {"f": "kakunin1 keikaku quiz.html", "label": "確認テスト① 計画", "star": "kakunin1_keikaku_star"}, {"f": "keikaku kakunin itoshima quiz.html", "label": "計画確認 糸島", "star": "keikaku_marker_star"}, {"f": "keikaku quiz.html", "label": "2級建築士 計画 マラソンテスト", "star": "keikaku_star"}, {"f": "keikaku_marathon.html", "label": "計画 ○×マラソン", "star": "keikaku_marathon_star"}, {"f": "kokai moshi2 houki quiz.html", "label": "公開模試② 法規", "star": "kokai_moshi2_houki_star"}, {"f": "kokai moshi2 kouzou quiz.html", "label": "公開模試② 構造", "star": "kokai_moshi2_kouzou_star"}, {"f": "kokai moshi2 quiz.html", "label": "公開模試②", "star": "kokai_moshi2_star"}, {"f": "kokai moshi2 sekou quiz.html", "label": "公開模試② 施工", "star": "kokai_moshi2_sekou_star"}, {"f": "kozo gensen.html", "label": "2級建築士 構造 厳選マラソン", "star": "gensen_kozo_star"}, {"f": "kozo kakunin itoshima quiz.html", "label": "構造確認問題 糸島", "star": "kozo_marker_star"}, {"f": "kozo quiz.html", "label": "2級建築士 構造 マラソンテスト", "star": "kozo_star"}, {"f": "kozo_gensen.html", "label": "構造 厳選 ○×", "star": "kozo_gensen_star"}, {"f": "kozo_marathon.html", "label": "構造 ○×マラソン", "star": "kozo_marathon_star"}, {"f": "moshi2-houki.html", "label": "公開模試② 法規", "star": "moshi2_houki_star"}, {"f": "moshi2-keikaku.html", "label": "公開模試② 計画", "star": "moshi2_keikaku_star"}, {"f": "moshi2-kozo.html", "label": "公開模試② 構造", "star": "moshi2_kozo_star"}, {"f": "moshi2-sekou.html", "label": "公開模試② 施工", "star": "moshi2_sekou_star"}, {"f": "moshi2b_houki.html", "label": "法規", "star": "moshi2b_houki_star"}, {"f": "moshi2b_keikaku.html", "label": "計画", "star": "moshi2b_keikaku_star"}, {"f": "moshi2b_kozo.html", "label": "構造", "star": "moshi2b_kozo_star"}, {"f": "moshi2b_sekou.html", "label": "施工", "star": "moshi2b_sekou_star"}, {"f": "nikyu sekkei quiz.html", "label": "二級建築士の設計範囲（士法3条・3条の2）○×トレーナー", "star": "nikyu_sekkei_star"}, {"f": "saikou hosei quiz.html", "label": "採光補正係数 暗記", "star": "saikou_hosei_star"}, {"f": "sekou kakunin itoshima quiz.html", "label": "施工確認問題 糸島", "star": "sekou_kakunin_itoshima_star"}, {"f": "sekou quiz.html", "label": "2級建築士 施工 マラソンテスト", "star": "sekou_star"}, {"f": "sekou_marathon.html", "label": "施工 ○×マラソン", "star": "sekou_marathon_star"}, {"f": "setsugou kanamono quiz.html", "label": "接合金物 当てクイズ", "star": "setsugou_kanamono_star"}, {"f": "yosou 2026 quiz.html", "label": "予想問題2026", "star": "yosou2026_star"}, {"f": "keikaku%20kakunin3%20quiz.html", "label": "確認テスト③ 計画", "star": "keikaku_kakunin3_star"}, {"f": "houki%20kakunin3%20quiz.html", "label": "確認テスト③ 法規", "star": "houki_kakunin3_star"}, {"f": "hisshou3%20keikaku%20quiz.html", "label": "必勝テスト③ 計画", "star": "hisshou3_keikaku_star"}];
const el=id=>document.getElementById(id);
function lget(k){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):[];}catch(e){return [];} }
function lset(k,arr){ try{localStorage.setItem(k,JSON.stringify(arr));}catch(e){} }

function extractArray(html, name){
  const re=new RegExp("(?:const|let|var)\\s+"+name+"\\s*=\\s*(\\[[\\s\\S]*?\\n\\s*\\]);");
  const m=html.match(re); if(!m) return null;
  try{ return (new Function("return "+m[1]+";"))(); }catch(e){ return null; }
}
function extractObj(html, name){
  const re=new RegExp("(?:const|let|var)\\s+"+name+"\\s*=\\s*(\\{[\\s\\S]*?\\n\\s*\\});");
  const m=html.match(re); if(!m) return null;
  try{ return (new Function("return "+m[1]+";"))(); }catch(e){ return null; }
}
function idOf(o){ return (o.n!==undefined)?o.n:(o.id!==undefined?o.id:null); }
function oxOf(o){
  if(o.a===true) return "○"; if(o.a===false) return "×";
  if(o.a===1) return "○"; if(o.a===2) return "×";
  if(typeof o.a==="string"){ const s=o.a.trim();
    if(/^(○|◯|正しい|適当|true|o)$/i.test(s)) return "○";
    if(/^(×|✕|誤り|不適当|false|x)$/i.test(s)) return "×"; }
  return "";
}

let CARDS=[], pool=[], idx=0;

async function build(){
  const wanted=[];
  for(const app of MANIFEST){
    const ids=lget(app.star);
    if(ids && ids.length) wanted.push({app, ids});
  }
  if(!wanted.length){
    el("homeSub").textContent="まだ★がありません";
    el("homeBody").className=""; el("homeBody").innerHTML='<div class="empty">各アプリの問題カードで「☆ 気になる」を付けると、ここに集まります。</div>';
    return;
  }
  const perApp=[];
  await Promise.all(wanted.map(async w=>{
    try{
      const r=await fetch(encodeURI(w.app.f),{cache:"no-store"});
      const html=await r.text();
      const Q=extractArray(html,"QUESTIONS");
      const ITEMS=extractArray(html,"ITEMS");
      let made=[];
      if(Q){
        const want=new Set(w.ids.map(String));
        Q.forEach(o=>{ const id=idOf(o); if(id!==null && want.has(String(id))){
          if(o.opts && o.ans!==undefined){
            made.push({app:w.app.label,star:w.app.star,id, front:(o.stem||o.q||""), ox:"", ansMain:"正解（最も不適当）： "+(o.opts[o.ans-1]||""), point:(o.p||""), src:(o.src||"")});
          } else {
            const ox=oxOf(o);
            made.push({app:w.app.label,star:w.app.star,id, front:(o.q||o.stmt||o.text||""), ox, ansMain:ox?("正解は「"+ox+"」"):"", point:(o.p||o.point||""), src:(o.src||"")});
          }
        }});
      } else if(ITEMS){
        const USES=extractObj(html,"USES")||{}; const DESC=extractObj(html,"DESC")||{};
        const want=new Set(w.ids.map(String));
        ITEMS.forEach(it=>{ if(want.has(String(it.id))){
          made.push({app:w.app.label,star:w.app.star,id:it.id, front:'<img src="'+it.img+'" alt="">', ox:"", ansMain:"名前： "+it.name, point:"用途："+(USES[it.use]||it.use||"")+(it.note?" "+it.note:"")+(DESC[it.id]?("<br>📘 "+DESC[it.id]):""), src:(it.src||"金物")});
        }});
      }
      perApp.push({label:w.app.label, cards:made});
    }catch(e){ perApp.push({label:w.app.label, cards:[]}); }
  }));
  CARDS=[]; perApp.forEach(p=>p.cards.forEach(c=>CARDS.push(c)));
  renderHome(perApp);
}

function renderHome(perApp){
  const n=CARDS.length;
  el("homeSub").textContent="全 "+n+" 問（★を付けた問題）";
  const body=el("homeBody"); body.className=""; body.innerHTML="";
  if(!n){ body.innerHTML='<div class="empty">★を付けた問題がありません。</div>'; return; }
  const big=document.createElement("div"); big.className="big";
  big.innerHTML =
    '<button class="pill primary" id="bShuffle"><span><span class="name">シャッフルで暗記</span><span class="meta">全'+n+'問をランダムにめくり式</span></span><span class="cnt">'+n+'問</span></button>'+
    '<button class="pill list" id="bList"><span><span class="name">一覧で読む（赤シート風）</span><span class="meta">答えを隠して総ざらい</span></span><span class="cnt">'+n+'問</span></button>';
  body.appendChild(big);
  const head=document.createElement("div"); head.className="apphead"; head.textContent="アプリ別に解く"; body.appendChild(head);
  perApp.filter(p=>p.cards.length).sort((a,b)=>b.cards.length-a.cards.length).forEach(p=>{
    const r=document.createElement("div"); r.className="approw";
    r.innerHTML='<span class="nm">'+p.label+'</span><span class="c">'+p.cards.length+'問</span>';
    r.onclick=()=>startStudy(p.cards.slice());
    body.appendChild(r);
  });
  el("bShuffle").onclick=()=>startStudy(shuffle(CARDS.slice()));
  el("bList").onclick=()=>startList(CARDS.slice());
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function show(sec){["home","study","list"].forEach(s=>el(s).classList.toggle("hidden",s!==sec));}

function startStudy(list){ if(!list.length) return; pool=list; idx=0; show("study"); renderCard(); }
function renderCard(){
  const c=pool[idx];
  el("sSrc").textContent=c.src||""; el("sApp").textContent=c.app||"";
  el("sQ").innerHTML=c.front;
  el("sCnt").textContent=(idx+1)+"/"+pool.length;
  el("sProg").style.width=(idx/pool.length*100)+"%";
  const ans=el("sAns"); ans.className="ans "+(c.ox==="○"?"ok":c.ox==="×"?"ng":"nu");
  el("sAnsMain").innerHTML=c.ansMain||"";
  el("sPoint").innerHTML=c.point?("<b>ポイント：</b>"+c.point):"";
  el("sReveal").style.display="block"; el("sRow2").style.display="none";
  el("sReveal").onclick=()=>{ ans.classList.add("show"); el("sReveal").style.display="none"; el("sRow2").style.display="flex"; el("sProg").style.width=((idx+1)/pool.length*100)+"%"; };
  el("sNext").textContent=(idx+1<pool.length)?"次へ →":"ホームへ";
  el("sNext").onclick=()=>{ idx++; if(idx<pool.length) renderCard(); else { build(); show("home"); } };
  el("sUnstar").onclick=()=>{ unstar(c); pool=pool.filter((x,i)=>i!==idx); if(!pool.length){ build(); show("home"); return;} if(idx>=pool.length) idx=pool.length-1; renderCard(); };
}
function unstar(c){ const arr=lget(c.star).filter(x=>String(x)!==String(c.id)); lset(c.star,arr); CARDS=CARDS.filter(x=>!(x.star===c.star&&String(x.id)===String(c.id))); }

let listHidden=true;
function startList(list){ pool=list; show("list"); el("lCnt").textContent="全"+list.length+"問"; listHidden=true; el("lToggle").textContent="答えを表示"; renderList(); }
function renderList(){
  const body=el("listBody"); body.innerHTML="";
  pool.forEach(c=>{
    const d=document.createElement("div"); d.className="listitem";
    d.innerHTML='<div class="meta"><span class="src-tag">'+(c.src||"")+'</span><span class="app-tag">'+c.app+'</span></div>'+
      '<div class="lq">'+c.front+'</div>'+
      '<div class="la'+(listHidden?" hide":"")+'">'+(c.ox?("【"+c.ox+"】 "):"")+(c.ansMain||"")+(c.point?("<br>"+c.point):"")+'</div>';
    const la=d.querySelector(".la"); la.onclick=()=>la.classList.toggle("hide");
    body.appendChild(d);
  });
}
el("lToggle").onclick=()=>{ listHidden=!listHidden; el("lToggle").textContent=listHidden?"答えを表示":"答えを隠す"; document.querySelectorAll(".la").forEach(x=>x.classList.toggle("hide",listHidden)); };
el("sBack").onclick=()=>{ build(); show("home"); };
el("lBack").onclick=()=>{ build(); show("home"); };

build();
</script>
</body>
</html>
