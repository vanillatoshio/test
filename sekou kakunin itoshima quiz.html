<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>施工確認問題 糸島｜2級建築士 ○×クイズ</title>
<style>
:root{
  --accent:#0f8a82; --light:#2bb3a8; --bg:#e6f5f3;
  --maru:#2e9e6b; --batsu:#d9534f;
  --ink:#1d2a22; --sub:#5a6b61; --card:#fff; --line:#d6e6dc;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.7;
  -webkit-text-size-adjust:100%;
}
.wrap{max-width:560px;margin:0 auto;padding:16px 14px 40px;min-height:100vh}
header{text-align:center;padding:8px 0 14px}
header h1{font-size:1.15rem;margin:0;color:var(--accent);letter-spacing:.02em}
header p{margin:4px 0 0;font-size:.78rem;color:var(--sub)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.btn{display:block;width:100%;border:none;border-radius:12px;padding:15px;font-size:1.02rem;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit}
.btn.primary{background:var(--accent);color:#fff}
.btn.sub{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}
.btn.ghost{background:#eef4f0;color:var(--sub)}
.btn:disabled{opacity:.5}
.cat-btn{background:#fff;color:var(--ink);border:1.5px solid var(--line);text-align:left;font-size:.95rem}
.cat-btn .n{float:right;color:var(--sub);font-weight:600;font-size:.85rem}

.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.count{font-size:.82rem;color:var(--sub);white-space:nowrap;font-weight:600}
.bar{flex:1;height:8px;background:#dfece4;border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;background:var(--accent);width:0;transition:width .25s}
.srclabel{font-size:.72rem;color:var(--sub);margin-bottom:6px}
.cat-tag{display:inline-block;background:var(--bg);color:var(--accent);font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:99px;margin-bottom:10px}
.q{font-size:1.12rem;line-height:1.85;margin:2px 0 4px;min-height:3em}

.ox{display:flex;gap:12px;margin-top:18px}
.ox button{flex:1;border:none;border-radius:14px;padding:20px 0;font-size:2rem;font-weight:800;cursor:pointer;font-family:inherit}
.ox .maru{background:#e7f6ee;color:var(--maru);border:2px solid #bce4cd}
.ox .batsu{background:#fdeceb;color:var(--batsu);border:2px solid #f5c9c6}

.judge{margin-top:16px;border-radius:14px;padding:14px;display:none}
.judge.show{display:block;animation:pop .2s}
@keyframes pop{from{transform:scale(.97);opacity:.4}to{transform:scale(1);opacity:1}}
.judge .head{font-size:1.1rem;font-weight:800;margin-bottom:6px}
.judge.ok{background:#e7f6ee;border:1.5px solid #bce4cd}
.judge.ok .head{color:var(--maru)}
.judge.ng{background:#fdeceb;border:1.5px solid #f5c9c6}
.judge.ng .head{color:var(--batsu)}
.judge .ans{font-size:.85rem;color:var(--sub);margin-bottom:8px}
.judge .p{font-size:.95rem;line-height:1.8}
.judge .p b{color:var(--accent)}

.ring-wrap{display:flex;justify-content:center;margin:6px 0 4px}
svg.ring{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#e0ece5;stroke-width:14}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:14;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.ring-txt{font-size:1.9rem;font-weight:800;fill:var(--ink)}
.ring-sub{font-size:.7rem;fill:var(--sub)}
.score-line{text-align:center;font-size:1.05rem;margin:4px 0 2px;font-weight:700}
.score-sub{text-align:center;color:var(--sub);font-size:.85rem;margin-bottom:8px}
.note{font-size:.78rem;color:var(--sub);text-align:center;margin-top:14px;line-height:1.6}
.hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>施工確認問題 糸島</h1>
    <p>2級建築士 学科｜○×クイズ</p>
  </header>

  <section id="home">
    <div class="card">
      <button class="btn primary" id="startAllBtn">全<span id="totalN"></span>問に挑戦</button>
      <button class="btn sub" id="wrongBtn">間違い復習（<span id="wrongN">0</span>問）</button>
    </div>
    <div class="card" style="margin-top:14px" id="setBox">
      <div style="font-weight:700;font-size:.9rem;margin-bottom:8px;color:var(--sub)">20問ずつ</div>
      <div id="setList"></div>
    </div>
    <div class="card" style="margin-top:14px" id="catBox">
      <div style="font-weight:700;font-size:.9rem;margin-bottom:8px;color:var(--sub)">分野別</div>
      <div id="catList"></div>
    </div>
    <p class="note">○か×で答えてね。間違えた問題は自動で記録され、「間違い復習」でやり直せます。</p>
  </section>

  <section id="quiz" class="hide">
    <div class="topbar">
      <span class="count"><span id="cur">1</span>/<span id="len">1</span></span>
      <div class="bar"><i id="barFill"></i></div>
    </div>
    <div class="card">
      <div class="srclabel" id="src"></div>
      <span class="cat-tag" id="catTag"></span>
      <div class="q" id="qtext"></div>
      <div class="ox" id="oxBtns">
        <button class="maru" id="btnMaru">○</button>
        <button class="batsu" id="btnBatsu">×</button>
      </div>
      <div class="judge" id="judge">
        <div class="head" id="jhead"></div>
        <div class="ans" id="jans"></div>
        <div class="p" id="jp"></div>
        <button class="btn primary" id="nextBtn">次へ</button>
      </div>
    </div>
    <button class="btn ghost" style="margin-top:14px" id="abortBtn">中断してホームへ</button>
  </section>

  <section id="result" class="hide">
    <div class="card">
      <div class="ring-wrap">
        <svg class="ring" width="150" height="150" viewBox="0 0 150 150">
          <circle class="ring-bg" cx="75" cy="75" r="64"></circle>
          <circle class="ring-fg" id="ringFg" cx="75" cy="75" r="64"></circle>
          <text class="ring-txt" id="ringTxt" x="75" y="72" text-anchor="middle" transform="rotate(90 75 75)">0%</text>
          <text class="ring-sub" x="75" y="92" text-anchor="middle" transform="rotate(90 75 75)">正答率</text>
        </svg>
      </div>
      <div class="score-line" id="scoreLine"></div>
      <div class="score-sub" id="scoreSub"></div>
      <button class="btn primary" id="redoBtn">間違えた問題を解き直す</button>
      <button class="btn sub" id="restartBtn">最初から全問</button>
      <button class="btn ghost" id="homeBtn">ホーム</button>
    </div>
  </section>
</div>

<script>
const QUESTIONS = [
  {n:1, src:"R06 施工 施工計画", cat:"施工計画・契約", a:false, q:"総合施工計画書には、設計図書において指定された仮設物を除き、施工計画に関する事項を記載した。", p:"設計図書で<b>指定された仮設物</b>がある場合は、総合施工計画書にその内容を記述し、<b>監理者の承認</b>を受ける必要がある。"},
  {n:2, src:"R05 施工 施工計画", cat:"施工計画・契約", a:false, q:"施工図には、総合仮設計画書やコンクリート躯体図などが含まれる。", p:"施工図は設計図を補うために作成される図面で、コンクリート躯体図などがある。<b>総合仮設計画書は含まれない</b>。"},
  {n:3, src:"R05 施工 施工計画", cat:"施工計画・契約", a:true, q:"実施工程表は、工事の施工順序や所要時間を示したもので、全体工程表のほか週間・月間・工種別工程表などが含まれる。", p:"補足的な目的で週間・月間・工種別工程表などが含まれる。"},
  {n:4, src:"R06 施工 施工計画", cat:"施工計画・契約", a:true, q:"工種別施工計画書における品質管理計画には、品質管理組織及び品質管理実施方法についても記載する。", p:"品質管理計画には品質管理組織・管理項目・実施方法・評価方法・措置などを含む。"},
  {n:5, src:"H30 施工 施工計画", cat:"施工計画・契約", a:false, q:"設計図書に選ぶべき専門工事業者の候補が記載されていたが、施工者の責任で、候補として記載されていない専門工事業者を選定した。", p:"候補が記載されている場合は<b>その中から選定</b>する。記載がない場合に限り、内容・品質を達成し得る業者を選定する。"},
  {n:6, src:"R06 施工 施工計画", cat:"施工計画・契約", a:true, q:"設計図書に指定がない施工方法で、品質・安全に多大な影響がある場合は、監理者と協議のうえ決定する。", p:"指定がない場合は施工者の責任で決定するが、品質・安全に多大な影響がある場合は<b>監理者と協議</b>する。"},
  {n:7, src:"R03 施工 工事契約", cat:"施工計画・契約", a:false, q:"民間建設工事標準請負契約約款（甲）において、受注者は、発注者及び監理者立会いのもと、法定検査を受ける。", p:"法定検査を受けるのは<b>発注者</b>。この場合、受注者は必要な協力をする（第24条）。"},
  {n:8, src:"R02 施工 安全", cat:"安全・届出", a:true, q:"軒の高さが5m以上の木造建築物の構造部材の組立て作業には、作業主任者を選任しなければならない。", p:"軒高<b>5m以上</b>の木造建築物の構造部材組立て・屋根下地・外壁下地の取付け作業には作業主任者の選任が必要。"},
  {n:9, src:"R02 施工 安全", cat:"安全・届出", a:true, q:"高さが5m以上の鉄骨造の骨組の組立て・解体・変更の作業には、作業主任者を選任しなければならない。", p:"鉄骨造の骨組は<b>高さ5m以上</b>で作業主任者の選任が必要。"},
  {n:10, src:"R02 施工 安全", cat:"安全・届出", a:true, q:"高さが5m以上のコンクリート造の工作物の解体・破壊の作業には、作業主任者を選任しなければならない。", p:"コンクリート造工作物の解体・破壊は<b>高さ5m以上</b>で選任が必要。"},
  {n:11, src:"R02 施工 安全", cat:"安全・届出", a:true, q:"掘削面の高さが2m以上となる地山の掘削作業には、作業主任者を選任しなければならない。", p:"地山の掘削は<b>掘削面の高さ2m以上</b>で選任が必要。"},
  {n:12, src:"R05 施工 安全", cat:"安全・届出", a:true, q:"高さ又は深さが1.5mを超える箇所で作業を行うときは、安全に昇降するための設備等を設ける。", p:"<b>1.5m超</b>で昇降設備が必要（設置が著しく困難なときを除く）。"},
  {n:13, src:"R05 施工 安全", cat:"安全・届出", a:true, q:"墜落の危険のある箇所には、高さ85cm以上の手摺等及び高さ35cm以上50cm以下の中桟等を設ける。", p:"手摺は<b>85cm以上</b>、中桟は<b>35〜50cm</b>。やむを得ない場合は墜落制止用器具使用などで臨時に取り外せる。"},
  {n:14, src:"R05 施工 安全", cat:"安全・届出", a:true, q:"高さ8m以上の登り桟橋には、高さ7m以内ごとに踊場を設ける。", p:"登り桟橋は<b>8m以上で7m以内ごと</b>に踊場。"},
  {n:15, src:"R05 施工 安全", cat:"安全・届出", a:false, q:"高さ2mの作業構台において、作業床の床材間の隙間を5cmとした。", p:"高さ2m以上の作業床の床材間の隙間は<b>3cm以下</b>とする。"},
  {n:16, src:"R05 施工 安全", cat:"安全・届出", a:true, q:"吊り足場の作業床は、幅を40cm以上とし、かつ、隙間がないようにする。", p:"吊り足場の作業床は<b>幅40cm以上・隙間なし</b>。"},
  {n:17, src:"H28 施工 渉外", cat:"安全・届出", a:true, q:"建築工事届は、建築主が都道府県知事に提出する。", p:"建築工事届の提出先は<b>都道府県知事</b>（建築基準法）。"},
  {n:18, src:"H28 施工 渉外", cat:"安全・届出", a:true, q:"道路使用許可申請書は、施工者が警察署長に提出する。", p:"道路使用許可申請書は<b>警察署長</b>（道路交通法）。道路占用や特殊車両通行許可は道路管理者。"},
  {n:19, src:"H28 施工 渉外", cat:"安全・届出", a:false, q:"特定元方事業者の事業開始報告の提出先は、市町村長である。", p:"特定元方事業者の事業開始報告は<b>労働基準監督署長</b>に行う（労働安全衛生規則）。"},
  {n:20, src:"H28 施工 渉外", cat:"安全・届出", a:true, q:"特殊車両通行許可申請書は、道路管理者に提出する。", p:"特殊車両通行許可申請書は<b>道路管理者</b>（道路法）。"},
  {n:21, src:"R03 施工 仮設", cat:"仮設工事", a:true, q:"枠組足場（高さ5m以上）の壁つなぎの間隔は、垂直方向9m以下、水平方向8m以下とする。", p:"枠組足場は<b>垂直9m以下・水平8m以下</b>。"},
  {n:22, src:"H30 施工 仮設", cat:"仮設工事", a:false, q:"高さ12mの枠組足場における壁つなぎの間隔を、垂直方向8m、水平方向9mとした。", p:"枠組足場は<b>垂直9m以下・水平8m以下</b>。数値が逆。"},
  {n:23, src:"R03 施工 仮設", cat:"仮設工事", a:false, q:"はしご道のはしごの上端を、床から40cm突出させた。", p:"はしごの上端は床から<b>60cm以上</b>突出させる。"},
  {n:24, src:"H30 施工 仮設", cat:"仮設工事", a:true, q:"単管足場の建地の間隔は、桁行方向1.85m以下、はり間方向1.5m以下とする。", p:"単管足場の建地は<b>桁行1.85m以下・はり間1.5m以下</b>。"},
  {n:25, src:"H30 施工 仮設", cat:"仮設工事", a:true, q:"架設通路（登り桟橋）の勾配は30度以下とし、勾配が15度を超えるものには踏桟その他の滑り止めを設ける。", p:"登り桟橋の勾配は<b>30度以下</b>、<b>15度超</b>で滑り止めが必要。"},
  {n:26, src:"R05 施工 地業", cat:"地業・地盤・測量", a:true, q:"場所打ちコンクリート杭工法には、アースドリル工法、オールケーシング工法、リバース工法などがある。", p:"場所打ち杭の代表的な3工法。"},
  {n:27, src:"R05 施工 地業", cat:"地業・地盤・測量", a:false, q:"プレボーリング拡大根固め工法は、場所打ちコンクリート杭工法の一つである。", p:"プレボーリング拡大根固め工法は<b>既製コンクリート杭工法</b>の一つ。"},
  {n:28, src:"R05 施工 地業", cat:"地業・地盤・測量", a:true, q:"セメントミルク工法で、アースオーガーの回転方向は、掘削時・引抜き時ともに正回転とする。", p:"逆回転すると付着した土砂が落下するため、掘削時・引抜き時とも<b>正回転</b>。"},
  {n:29, src:"R05 施工 地業", cat:"地業・地盤・測量", a:true, q:"リバース工法では、孔内水位を地下水位より2m以上高く保ち、孔壁の崩壊を防ぐ。", p:"孔内水位を地下水位より<b>2m以上</b>高く保つ。"},
  {n:30, src:"R02 施工 地盤", cat:"地業・地盤・測量", a:true, q:"ベーン試験は、軟らかい粘土質地盤のせん断強さを調べる試験である。", p:"十字形の抵抗翼（ベーン）を回転させ、<b>軟らかい粘土質地盤</b>のせん断強さを求める。"},
  {n:31, src:"R02 施工 地盤", cat:"地業・地盤・測量", a:false, q:"砂質地盤において、地盤のせん断強度を把握するために、ベーン試験を行った。", p:"ベーン試験は<b>軟らかい粘土質地盤</b>用。砂質地盤には適さない。"},
  {n:32, src:"R02 施工 地盤", cat:"地業・地盤・測量", a:true, q:"スクリューウエイト貫入試験（旧スウェーデン式サウンディング試験）の結果は、地盤の許容応力度の算定に利用できる。", p:"主に戸建住宅など小規模構造物の支持力把握に用いる。告示により許容応力度の算定に利用可。"},
  {n:33, src:"R04 施工 測量", cat:"地業・地盤・測量", a:false, q:"平板測量において、敷地内に建築物があり見通しが悪いので、放射法により測量した。", p:"放射法は<b>見通しの良い場合</b>に用いる。見通しが悪い場合は<b>進測法</b>等を用いる。"},
  {n:34, src:"R04 施工 測量", cat:"地業・地盤・測量", a:true, q:"傾斜地の距離測量で、高いほうから低いほうへ下がりながら進める降測法を用いた。", p:"降測法は昇測法に比べ疲れが少なく精度も高い。"},
  {n:35, src:"R04 施工 測量", cat:"地業・地盤・測量", a:true, q:"真北は、測量地点の磁針偏差と磁北から求めることができる。", p:"真北と磁北のずれが<b>磁針偏差</b>。磁北と磁針偏差から真北を求められる。"},
  {n:36, src:"R04 施工 木工事", cat:"木工事", a:false, q:"短期計算許容耐力が25kNのホールダウン専用アンカーボルトの、コンクリートへの埋込み長さを250mmとした。", p:"25kN以下のホールダウン専用アンカーボルトの埋込み長さは<b>360mm以上</b>。"},
  {n:37, src:"R04 施工 木工事", cat:"木工事", a:true, q:"ねこ土台は、土台を浮かせて水湿を防ぐとともに、基礎に孔を設けずに床下換気を確保できる工法である。", p:"基礎パッキンで土台を浮かせ、<b>連続的に床下換気</b>を確保する。"},
  {n:38, src:"R01 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"鉄筋の加工寸法の検査は、加工種別ごとに、搬入時又は現場加工後の最初の一組について行う。", p:"加工後にスケールで測定し、加工種別ごとに最初の一本又は一組について確認する。"},
  {n:39, src:"R01 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"梁のスペーサーの配置は、特記がない場合、間隔を1.5m程度、端部を0.5m程度となるようにする。", p:"スペーサーの配置間隔は<b>1.5m程度</b>、端部は<b>0.5m程度</b>。"},
  {n:40, src:"R01 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"D19の異形鉄筋の端部に設ける180度フックの折り曲げ余長を、3dとした。", p:"フックの余長は<b>180度で4d以上</b>。3dは不足。"},
  {n:41, src:"R01 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"鉄筋のフックの余長は、180度で4d以上、135度で6d以上、90度で8d以上とする。", p:"<b>180度＝4d / 135度＝6d / 90度＝8d</b>（鉄筋の種類・径に関係なく）。"},
  {n:42, src:"R01 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"ガス圧接継手で、ふくらみの直径や長さが規定値を満たさず不合格となった圧接部は、再加熱・加圧して修正できる。", p:"ふくらみが規定値（径1.4倍・長さ1.1倍）に満たない場合、鉄筋を切断せず再加熱・加圧で修正できる。"},
  {n:43, src:"R05 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"板厚22mmの鋼材を突合せ継手とする完全溶込み溶接で、特記がなかったので余盛りの高さを2mmとした。", p:"完全溶込み溶接の余盛り高さは開先寸法により許容値が異なるが、<b>2mmは許容値以内</b>で適合。"},
  {n:44, src:"R05 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"架構の倒壊防止用ワイヤロープを、建入れ直し用に兼用した。", p:"倒壊防止用ワイヤロープは<b>建入れ直し用に兼用してもよい</b>。"},
  {n:45, src:"R04 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:false, q:"柱のエレクションピースに使用する仮ボルトは、一群のボルト数の3/4を締め付ければよい。", p:"エレクションピースの仮ボルトは<b>高力ボルトを全数締め付ける</b>。"},
  {n:46, src:"H30 施工 左官", cat:"仕上げ・工法", a:false, q:"コンクリート壁面へのモルタル塗りを、下塗り→中塗り→むら直し→上塗りの順で行った。", p:"正しい順は<b>下塗り→むら直し→中塗り→上塗り</b>。"},
  {n:47, src:"H30 施工 左官", cat:"仕上げ・工法", a:true, q:"モルタル塗りの上塗りは、下塗りよりも貧調合とし、乾燥収縮を小さくしてひび割れを防ぐ。", p:"下塗りは富調合で付着を高め、上塗りは<b>貧調合</b>でひび割れを防ぐ。"},
  {n:48, src:"H30 施工 タイル", cat:"仕上げ・工法", a:true, q:"内壁タイルの密着張りでは、タイルを上部から下部へ張り進める。", p:"密着張りは<b>上部から下部</b>へ、一段おきに数段張り付けた後その間を埋める。"},
  {n:49, src:"R07 施工 工法", cat:"仕上げ・工法", a:true, q:"ノンスカラップ工法は、鉄骨工事の溶接で、ひずみ集中の原因となるスカラップを設けない工法である。", p:"梁ウェブの断面欠損がなく、力学的に望ましい。<b>鉄骨工事の溶接</b>の工法。"},
  {n:50, src:"R07 施工 工法", cat:"仕上げ・工法", a:true, q:"シャーカッターは、鉄筋の切断に用いる機械である。", p:"シャーカッターは<b>鉄筋の切断</b>に用いる。ノンスカラップ工法（鉄骨溶接）とは関係がない。"},
  {n:51, src:"H30 施工 地業", cat:"地業・地盤・測量", a:true, q:"場所打ちコンクリート杭のコンクリートの構造体強度補正値Sは、特記がなければ3N/mm²とする。", p:"調合管理強度＝設計基準強度Fc＋構造体強度補正値S。Sは特記がなければ<b>3N/mm²</b>。"},
  {n:52, src:"H30 施工 地業", cat:"地業・地盤・測量", a:true, q:"既製コンクリート杭の継手は、特記がなければ、アーク溶接による溶接継手又は機械式継手とする。", p:"既製杭の継手は<b>アーク溶接</b>又は<b>機械式継手（無溶接継手）</b>。"},
  {n:53, src:"H30 施工 地業", cat:"地業・地盤・測量", a:false, q:"オールケーシング工法などの場所打ちコンクリート杭で、近接している杭を連続して施工した。", p:"近接している杭は<b>連続して施工しない</b>。"},
  {n:54, src:"R04 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"柱・梁等の鉄筋のかぶり厚さは、施工誤差を考慮し、最小かぶり厚さに10mmを加えた数値を標準とする。", p:"<b>最小かぶり厚さ＋10mm</b>を標準とする（JASS 5）。"},
  {n:55, src:"R04 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"ガス圧接完了後の圧接部の外観検査（外観試験）の対象は、抜取りとすればよい。", p:"外観試験の対象は<b>全ての圧接部</b>。抜取りではない。"},
  {n:56, src:"R04 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"ガス圧接では、圧接箇所1か所につき鉄筋径程度（1d〜1.5d）の縮み代を見込んで鉄筋を加工する。", p:"圧接で1箇所当たり<b>1d〜1.5d</b>縮むため、鉄筋径程度の縮み代を見込む。"},
  {n:57, src:"R04 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"径の同じ鉄筋のガス圧接継手で、圧接部における鉄筋中心軸の偏心量は、鉄筋径の1/5以下とする。", p:"中心軸の偏心量は<b>1/5d以下</b>（径が異なる場合は細い方の径）。"},
  {n:58, src:"R02 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"ガス圧接部のふくらみの直径は、鉄筋径（径が異なる場合は細い方）の1.4倍以上、長さは1.1倍以上とする。", p:"ふくらみ直径<b>1.4d以上</b>、長さ<b>1.1d以上</b>、圧接面のずれ1/4d以下。"},
  {n:59, src:"R02 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"柱主筋のガス圧接継手の位置を、隣り合う主筋で同じ高さに揃え、300mmずらした。", p:"隣り合う継手の位置は、ガス圧接で<b>400mm以上</b>ずらす。"},
  {n:60, src:"R02 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"隣り合う鉄筋の重ね継手の位置は、継手長さの0.5倍又は1.5倍ずらす。", p:"重ね継手は<b>継手長さの0.5倍又は1.5倍</b>ずらす。ガス圧接は400mm以上。"},
  {n:61, src:"R06 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"D19の異形鉄筋の端部に設ける90度フックの折曲げ内法直径を、70mmとした。", p:"D19〜D41は<b>4d以上</b>。4×19＝76mm以上必要で70mmは不足。"},
  {n:62, src:"R06 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"異形鉄筋D19〜D41の折曲げ内法直径は、4d以上とする。", p:"折曲げ内法直径：16φ/D16以下＝3d以上、D19〜D41＝<b>4d以上</b>、D41超＝5d以上。"},
  {n:63, src:"R03 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"梁主筋を柱内に折り曲げて定着させる場合、投影定着長さを柱せいの1/2とした。", p:"投影定着長さは柱せいの<b>3/4倍以上</b>。"},
  {n:64, src:"R06 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"鉄筋相互のあきは、粗骨材の最大寸法の1.25倍以上、25mm以上、かつ呼び名の数値の1.5倍以上とする。", p:"あき＝<b>粗骨材最大寸法×1.25</b>・<b>25mm</b>・<b>呼び名×1.5</b>のうち最大。"},
  {n:65, src:"R06 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"径が異なる鉄筋の重ね継手の長さは、細い方の鉄筋径による。", p:"重ね継手長さは<b>細い方の鉄筋径（呼び名）</b>による。"},
  {n:66, src:"R06 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"土に接する普通コンクリートを用いた基礎部分の鉄筋の最小かぶり厚さを、50mmとした。", p:"基礎の最小かぶり厚さは<b>60mm以上</b>（土に接する柱・梁・壁・床・布基礎立上りは40mm）。"},
  {n:67, src:"H30 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:false, q:"D25の主筋の加工寸法の許容差を、±25mmの範囲のものを合格とした。", p:"加工寸法許容差：主筋D25以下＝<b>±15mm</b>、D29〜D41＝±20mm、全長＝±20mm。"},
  {n:68, src:"H30 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"あばら筋・帯筋・スパイラル筋の加工寸法の許容差は、±5mmとする。", p:"あばら筋・帯筋・スパイラル筋＝<b>±5mm</b>。主筋より厳しい。"},
  {n:69, src:"H30 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"スラブ筋のスペーサーの間隔は0.9m程度とし、端部は0.1m以内とする。", p:"スラブ筋スペーサーは間隔<b>0.9m程度</b>・端部<b>0.1m以内</b>。"},
  {n:70, src:"H28 施工 鉄筋", cat:"鉄筋・鉄骨工事", a:true, q:"柱の鉄筋のかぶり厚さは、帯筋の外側表面からコンクリート表面までの最短距離とする。", p:"柱では<b>帯筋の外側表面</b>からコンクリート表面までの最短距離。"},
  {n:71, src:"施工 型枠", cat:"型枠・コンクリート", a:true, q:"パイプサポートを支柱として用い、高さが3.5mを超えるときは、高さ2m以内ごとに水平つなぎを2方向に設ける。", p:"3.5m超は<b>2m以内ごと</b>に水平つなぎを2方向に設け、変位を防止する。"},
  {n:72, src:"施工 型枠", cat:"型枠・コンクリート", a:false, q:"高さ3.6mのパイプサポートで、高さ2.1mの位置にのみ水平つなぎを2方向に設けた。", p:"3.5m超は<b>2m以内ごと</b>。2.1mでは間隔が2mを超え不適。"},
  {n:73, src:"施工 型枠", cat:"型枠・コンクリート", a:true, q:"パイプサポートを継いで用いるときは、4本以上のボルト又は専用金具を用いて継ぐ。", p:"継ぐときは<b>4本以上のボルト</b>又は専用金具で固定する。"},
  {n:74, src:"施工 型枠", cat:"型枠・コンクリート", a:true, q:"パイプサポートは、支柱として用いる場合、3本以上継いで用いてはならない。", p:"パイプサポートは<b>2本まで</b>（3本以上継がない）。"},
  {n:75, src:"R04 施工 型枠", cat:"型枠・コンクリート", a:true, q:"梁を貫通する配管用スリーブで、開口補強が不要で径が200mm以下の部分は、紙チューブを使用できる。", p:"スリーブは鋼管・つば付き鋼管などが基本だが、<b>径200mm以下・開口補強不要</b>なら紙チューブ可。"},
  {n:76, src:"R04 施工 型枠", cat:"型枠・コンクリート", a:true, q:"スラブ下及び梁下の支保工の存置期間は、コンクリートの圧縮強度が12N/mm²以上であることが確認されるまでとする。", p:"スラブ下・梁下支保工は<b>圧縮強度12N/mm²以上</b>かつ安全確認まで存置。"},
  {n:77, src:"施工 型枠", cat:"型枠・コンクリート", a:true, q:"普通ポルトランドセメントのコンクリート（計画供用期間が短期）で、せき板の最小存置期間は、平均気温20℃以上で4日、10℃以上20℃未満で6日とする。", p:"基礎・梁側・柱・壁のせき板存置：<b>20℃以上＝4日</b>、<b>10〜20℃＝6日</b>。"},
  {n:78, src:"R06 施工 打込み", cat:"型枠・コンクリート", a:true, q:"内部振動機による締固めは、先端が先に打ち込まれた下層に入るように、ほぼ鉛直に挿入する。", p:"コールドジョイント防止のため、先端を<b>下層に入れほぼ鉛直</b>に挿入する。"},
  {n:79, src:"R06 施工 打込み", cat:"型枠・コンクリート", a:true, q:"内部振動機の挿入間隔は60cm以下とし、加振はコンクリート上面にセメントペーストが浮くまでとする。", p:"挿入間隔<b>60cm以下</b>、加振は<b>セメントペーストが浮くまで</b>。"},
  {n:80, src:"R05 施工 打込み", cat:"型枠・コンクリート", a:false, q:"コンクリートの打込みで、数本の柱を連続させて、バイブレーターで横流ししながら打ち込んだ。", p:"横流しすると鉄筋で粗骨材が阻害されモルタル過多になるため<b>横流ししてはならない</b>。"},
  {n:81, src:"R06 施工 打込み", cat:"型枠・コンクリート", a:false, q:"片持ち形式のバルコニーの跳出し部は、構造体部分の強度が十分発現した後に、別に打ち込んだ。", p:"跳出し部はひび割れしやすいので、根元を<b>構造体部分と一緒に打ち込む</b>。"},
  {n:82, src:"R05 施工 打込み", cat:"型枠・コンクリート", a:true, q:"暑中コンクリート（日平均気温の平年値が25℃を超える）で、打込み後の養生開始時期は、コンクリート上面のブリーディング水が消失した時点とする。", p:"暑中コンクリートの養生開始は<b>ブリーディング水が消失した時点</b>。"},
  {n:83, src:"R05 施工 打込み", cat:"型枠・コンクリート", a:true, q:"寒中コンクリートで、凍結のおそれのある期間は、圧縮強度が5N/mm²以上となるまで初期養生を行う。", p:"凍結のおそれのある期間は<b>圧縮強度5N/mm²以上</b>になるまで初期養生。"},
  {n:84, src:"R04 施工 打込み", cat:"コンクリート品質・管理", a:false, q:"梁のコンクリートは、柱及び壁のコンクリートと連続して、梁の上部まで打ち込んだ。", p:"梁の打込みは、柱・壁のコンクリートの<b>沈みが落ち着いた後</b>に行う。梁下で止めずに連続して打ち込むと、柱・壁の沈降によって梁にひび割れが発生するおそれがある。"},
  {n:85, src:"R04 施工 その他", cat:"コンクリート品質・管理", a:true, q:"普通コンクリートの気乾単位容積質量を、2.3t/m³とした。", p:"普通コンクリートの気乾単位容積質量は、<b>2.1t/m³を超え2.5t/m³以下</b>を標準とする。2.3t/m³は範囲内で適。"},
  {n:86, src:"H30 施工 打込み", cat:"コンクリート品質・管理", a:true, q:"捨てコンクリートの粗骨材の最大寸法を、25mmとした。", p:"捨てコンクリートの粗骨材の最大寸法は<b>25mm以下</b>とする（公共建築工事標準仕様書）。25mmは適。"},
  {n:87, src:"R03 施工 打込み", cat:"コンクリート品質・管理", a:true, q:"構造体コンクリートの1回の強度試験は、打込み工区ごとに行い、1日の打込み量が150m³を超えるときは150m³以下に分割した単位ごとに行う。", p:"強度試験は<b>打込み工区ごと</b>、1日の打込み量が<b>150m³を超える</b>ときは150m³以下にほぼ均等に分割した単位ごと（JASS 5）。"},
  {n:88, src:"R03 施工 暑中", cat:"コンクリート品質・管理", a:true, q:"暑中コンクリート（日平均気温の平年値が25℃を超える期間）を打ち込む場合、荷卸し時のコンクリートの温度を35℃以下とした。", p:"暑中コンクリートの<b>荷卸し時の温度は35℃以下</b>とする（公共建築工事標準仕様書）。"},
  {n:89, src:"R02 施工 受入れ", cat:"コンクリート品質・管理", a:true, q:"レディーミクストコンクリートの受入検査で、指定スランプ18cmに対し測定値が20cmであったので合格とした。", p:"指定スランプ18cmの許容差は<b>±2.5cm</b>（15.5〜20.5cm）。20cmは範囲内で合格。"},
  {n:90, src:"R02 施工 打込み", cat:"コンクリート品質・管理", a:false, q:"コンクリートの練混ぜから打込み終了までの時間を、外気温が28℃であったので120分を限度とした。", p:"練混ぜから打込み終了までの限度は、外気温<b>25℃以下＝120分</b>、<b>25℃超＝90分</b>。28℃なので90分以内とする。"},
  {n:91, src:"R01 施工 打継ぎ", cat:"コンクリート品質・管理", a:true, q:"外壁の水平打継ぎ面について、止水性を考慮し、打継ぎ面に外側下がりの勾配を付ける方法とした。", p:"外壁部の水平打継ぎでは、止水性確保のため<b>外側下がりの勾配</b>をつける方法がある（JASS 5）。"},
  {n:92, src:"R01 施工 かぶり", cat:"コンクリート品質・管理", a:true, q:"直接土に接する柱・梁・壁・スラブの設計かぶり厚さを、特記がなかったので50mmとした。", p:"土に接する部分の設計かぶり厚さ＝最小かぶり厚さ＋施工精度10mm。柱・梁・壁等は<b>40＋10＝50mm</b>（基礎は60＋10＝70mm）。"},
  {n:93, src:"H28 施工 塩化物", cat:"コンクリート品質・管理", a:false, q:"構造耐力上主要な部分のコンクリートに含まれる塩化物量を、塩化物イオン量として0.35kg/m³とした。", p:"コンクリートに含まれる塩化物量は、塩化物イオン量として<b>0.30kg/m³以下</b>とする（JASS 5）。0.35は不適。"},
  {n:94, src:"H28 施工 ひび割れ", cat:"コンクリート品質・管理", a:true, q:"コンクリートに幅0.4mmのひび割れが発生したので、耐久性上支障のないよう適切な処置を施したうえで、工事監理者の承認を受けた。", p:"許容ひび割れ幅は特記がなければ<b>0.3mm</b>。これを超える場合は耐久性上支障のないよう適切な処置を施し、<b>工事監理者の承認</b>を受ける（JASS 5）。"},
  {n:95, src:"H29 施工 受入れ", cat:"コンクリート品質・管理", a:true, q:"荷卸し時のコンクリートの空気量が、指定された値に対して+1.0%であったので許容した。", p:"コンクリートの空気量の許容差は<b>±1.5%</b>。+1.0%は範囲内で許容できる。"},
  {n:96, src:"H29 施工 強度試験", cat:"コンクリート品質・管理", a:false, q:"構造体コンクリートの1回の強度試験は、打込み日及び打込み工区ごとに、200m³以下にほぼ均等に分割した単位ごとに行うこととした。", p:"分割の単位は<b>150m³以下</b>（200m³ではない）。打込み日ごと・打込み工区ごとに150m³以下に分割する（JASS 5）。"},
  {n:97, src:"R01 施工 強度判定", cat:"コンクリート品質・管理", a:true, q:"調合管理強度の判定で、1回の試験結果が調合管理強度の85%以上、かつ3回の試験結果の平均値が調合管理強度以上であったので、合格とした。", p:"判定基準：(1)1回の試験結果＝<b>調合管理強度の85%以上</b>、(2)3回の試験結果の平均値＝<b>調合管理強度以上</b>。両方満たせば合格（公共建築工事標準仕様書）。"},
  {n:98, src:"R05 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:false, q:"高力ボルト接合部の材厚の差により1.2mmの肌すきが生じたので、ボルトの締付けのトルク値を高めることにより修正した。", p:"材厚の差等により<b>1mmを超える肌すき</b>が生じる場合は、<b>フィラープレート</b>という薄鋼板を用いて補う。トルク値を高めても肌すきの処理はできない。"},
  {n:99, src:"R05 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"一群の高力ボルトの締付けは、群の中央部から周辺に向かう順序で行う。", p:"締付け順序は<b>群の中央から周辺</b>に向かう（公共建築工事標準仕様書）。"},
  {n:100, src:"R05 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"ボルト頭部又はナットと接合部材の面が、1/20以上傾斜している場合は、勾配座金を使用する。", p:"接合面が<b>1/20以上傾斜</b>している場合は<b>勾配座金</b>を使用する（公共建築工事標準仕様書）。"},
  {n:101, src:"R05 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"高力ボルト接合による継手の仮ボルトは、本接合のボルトと同軸径の普通ボルト等を用い、締付け本数は一群のボルト数の1/3以上、かつ2本以上とする。", p:"仮ボルトは<b>同軸径の普通ボルト</b>等で、<b>1/3以上かつ2本以上</b>をバランスよく配置して締め付ける（JASS 6）。"},
  {n:102, src:"R01 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"高力六角ボルトのナット回転法による本締めは、一次締め完了後を起点として、ナットを120度（M12は60度）回転させて行う。", p:"ナット回転法の本締めは<b>120°（M12は60°）</b>回転（JASS 6）。"},
  {n:103, src:"R01 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"高力ボルト摩擦接合部の摩擦面には、錆止め塗装を行わない。", p:"高力ボルト摩擦接合部の<b>摩擦面は錆止め塗装をしない</b>（すべり係数を確保するため）（JASS 6）。"},
  {n:104, src:"R04 施工 溶接", cat:"鉄筋・鉄骨工事", a:false, q:"作業場所の気温が3℃であったので、溶接線から40mmまでの範囲の母材部分を加熱して、溶接を行った。", p:"気温-5℃〜5℃では、接合部（溶接線）より<b>100mmの範囲</b>の母材を適切に加熱すれば溶接できる。40mmでは不足（JASS 6）。"},
  {n:105, src:"施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"作業場所の気温が-5℃を下回る場合には、溶接を行ってはならない。", p:"<b>-5℃を下回る</b>場合は溶接禁止。-5℃〜5℃なら溶接線より100mm加熱で溶接可（JASS 6）。"},
  {n:106, src:"施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"作業場所の気温が-5℃から5℃のときは、接合部（溶接線）より100mmの範囲の母材部分を適切に加熱すれば、溶接することができる。", p:"-5℃〜5℃は<b>溶接線より100mm範囲</b>を加熱すれば溶接可（JASS 6）。"},
  {n:107, src:"R02 施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"溶接部に割れがある場合は、溶接金属を全長にわたって除去し、再溶接を行う。", p:"割れは<b>全長にわたり除去</b>し再溶接。適切な試験で割れ範囲を確認した場合は、割れ及び端から50mm以上を除去（公共建築工事標準仕様書）。"},
  {n:108, src:"R02 施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"隅肉溶接の溶接長さは、有効溶接長さに隅肉サイズの2倍を加えた長さとする。", p:"溶接長さ＝<b>有効溶接長さ＋サイズの2倍</b>（両端のクレーターの分を加える）。"},
  {n:109, src:"R02 施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"溶接部の清掃作業において、溶接作業に支障のない溶接面に固着したミルスケールは、除去せずにそのまま残してよい。", p:"溶接作業に<b>支障のないミルスケール</b>（黒皮）は除去せず残してよい。"},
  {n:110, src:"R04 施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"スタッド溶接後の打撃曲げ試験において、15度まで曲げて溶接部に割れその他の欠陥が入らないスタッドは、欠陥がなければそのまま使用してよい。", p:"打撃曲げ試験は<b>15度まで曲げて</b>欠陥がないことを確認。欠陥がなければそのまま使用する（公共建築工事標準仕様書）。"},
  {n:111, src:"R04 施工 溶接", cat:"鉄筋・鉄骨工事", a:true, q:"スタッド溶接の溶接面に著しい錆が付着していたので、スタッド軸径の2倍以上の範囲の錆をグラインダーで除去し、溶接を行った。", p:"溶接面に支障となるもの（水分・錆・塗料・亜鉛めっき等）は、<b>スタッド軸径の2倍以上</b>の範囲をグラインダー等で除去・清掃する。"},
  {n:112, src:"H28 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:false, q:"建方の精度検査において、高さ5mの柱の倒れが10mmであったので合格とした。", p:"柱の倒れの管理許容差は<b>高さの1/1000以下、かつ10mm以下</b>。高さ5mなら5mm以下で合格。10mmは不合格（JASS 6）。"},
  {n:113, src:"H28 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"建方精度における柱の倒れの管理許容差は、高さの1/1000以下、かつ10mm以下とする。", p:"柱の倒れの管理許容差＝<b>高さの1/1000以下、かつ10mm以下</b>（JASS 6）。"},
  {n:114, src:"H28 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"柱の溶接継手に使用するエレクションピースの仮ボルトは、高力ボルトを使用して全数締め付けた。", p:"現場溶接接合の仮接合に用いるエレクションピースの仮ボルトは、<b>高力ボルトを全数締め付ける</b>（公共建築工事標準仕様書、JASS 6）。"},
  {n:115, src:"H28 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"耐火被覆の吹付け工法において、柱の耐火材の吹付け厚さは、厚さ確認ピンを柱1面に各1本植え込んで確認する。", p:"吹付け施工後、厚さ確認ピンを<b>柱1面に各1本</b>、梁はウェブ両面・下フランジ下面・端面に各1本植え込んで確認する（鉄骨工事技術指針）。"},
  {n:116, src:"H28 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"デッキプレート相互の接合を、アークスポット溶接により行った。", p:"デッキプレート相互の接合は、<b>溶接（アークスポット溶接・隅肉溶接）</b>、タッピンねじ、嵌合、かしめ又は重ねによる（JASS 6）。"},
  {n:117, src:"R03 施工 鉄骨", cat:"鉄筋・鉄骨工事", a:true, q:"トルシア形高力ボルトの締付け完了後の検査では、すべてのボルトについてピンテールが破断されていることを確認する。", p:"トルシア形高力ボルトは<b>ピンテールの破断</b>を確認するとともに、共回り・軸回りの有無、ナット回転量、ナット面からのボルト突出し量を目視検査する（JASS 6）。"},
  {n:118, src:"R06 施工 木工事", cat:"木工事", a:true, q:"大壁造の面材耐力壁において、厚さ12mmの構造用合板を用い、N50の釘を150mm以下の間隔で留め付けた。", p:"大壁造の面材耐力壁は、構造用合板（厚さ12mm以上）を用い、N50の釘を<b>150mm以下</b>の間隔で留め付ける（木造住宅工事仕様書）。"},
  {n:119, src:"R06 施工 木工事", cat:"木工事", a:true, q:"建方精度の許容値は、特記がなければ、垂直・水平とも1/1000以下とする。", p:"建方精度の許容値は特記による。特記がなければ垂直・水平の誤差の範囲は<b>1/1000以下</b>（JASS 11）。"},
  {n:120, src:"R06 施工 木工事", cat:"木工事", a:true, q:"根太を用いない床組（床梁又は胴差の間隔が1m程度）で、床下地板に厚さ24mm以上の構造用合板を用いた。", p:"根太を用いず直接床梁・胴差に留め付ける場合の床下地板は、構造用合板で<b>厚さ24mm以上</b>とする（木造住宅工事仕様書）。"},
  {n:121, src:"R06 施工 木工事", cat:"木工事", a:false, q:"根太を用いない床組（梁等の間隔が910mm）であったので、床下地板として厚さ18mmの構造用合板を用いた。", p:"根太を用いない床組の床下地板は、構造用合板で<b>厚さ24mm以上</b>が必要。18mmでは不足（木造住宅工事仕様書）。"},
  {n:122, src:"R06 施工 木工事", cat:"木工事", a:true, q:"木造2階建て住宅の通し柱の断面寸法を135mm×135mmとする場合、ヒノキ等を用いた集成材又は構造用単板積層材を用いるときは、120mm×120mm以上とすることができる。", p:"集成材・構造用単板積層材を用いる場合は、当該柱の断面寸法を<b>120mm×120mm以上</b>とできる（木造住宅工事仕様書）。"},
  {n:123, src:"R05 施工 木工事", cat:"木工事", a:true, q:"跳ね出しレバルコニーの水勾配は、下地板で1/50以上の勾配を設け、排水溝部分では1/200以上の勾配を設ける。", p:"バルコニーの水勾配は、下地板で<b>1/50以上</b>、溝部分で<b>1/200以上</b>（木造住宅工事仕様書）。"},
  {n:124, src:"R05 施工 木工事", cat:"木工事", a:true, q:"構造用面材による床組の補強において、断面寸法105mm×105mm以上の床梁を、1,820mm以下の間隔で配置した。", p:"構造用面材による床組は、<b>断面寸法105mm×105mm以上</b>の床梁を<b>1,820mm以下</b>の間隔で配置する（木造住宅工事仕様書）。"},
  {n:125, src:"R05 施工 木工事", cat:"木工事", a:true, q:"大壁造の面材耐力壁において、胴差部で上下階の構造用面材の間に6mm以上のあきを設けた。", p:"大壁造の面材耐力壁は、胴差部において1階・2階の構造用面材の上下同位置で、相互間に<b>6mm以上のあき</b>を設ける。"},
  {n:126, src:"R05 施工 木工事", cat:"木工事", a:false, q:"上下階に配置する大壁の面材耐力壁における構造用面材は、胴差部に配置する大壁の耐力壁において、3mmのあきを設けた。", p:"胴差部の上下階の構造用面材相互間のあきは<b>6mm以上</b>必要。3mmでは不足。"},
  {n:127, src:"R03 施工 木工事", cat:"木工事", a:true, q:"根太を設けた床下地板にパーティクルボードを使用する場合は、厚さ15mm以上のものを用いる。", p:"パーティクルボードは耐水1又は耐水2のJISに適合するもので、<b>厚さ15mm以上</b>のものを使用する。"},
  {n:128, src:"R03 施工 木工事", cat:"木工事", a:false, q:"根太を設けた床下地板に、厚さ12mmのパーティクルボードを用いた。", p:"床下地板に用いるパーティクルボードは<b>厚さ15mm以上</b>が必要。12mmでは不足。"},
  {n:129, src:"R03 施工 木工事", cat:"木工事", a:true, q:"構造材に用いる製材の品質は、JASに適合する構造用製材若しくは広葉樹製材、又はこれらと同等以上の性能を有するものとする。", p:"構造材は<b>JAS適合の構造用製材・広葉樹製材</b>又は同等以上の性能を有するものとする（木造住宅工事仕様書）。"},
  {n:130, src:"R03 施工 木工事", cat:"木工事", a:true, q:"合板とは、木材を薄くむいた1.0〜5.5mmの単板を繊維方向に1枚ごとに直交させ、奇数枚を接着剤で貼り合わせて1枚の板としたものである。", p:"合板は<b>単板を繊維方向が直交</b>するように<b>奇数枚</b>を接着剤で貼り合わせたもの。"},
  {n:131, src:"R03 施工 木工事", cat:"木工事", a:true, q:"釘の長さは、原則として、打ち付ける板厚の2.5倍以上を標準とする。", p:"釘の長さは、原則として打ち付ける<b>板厚の2.5倍以上</b>を標準とする（公共建築工事標準仕様書）。"},
  {n:132, src:"R04 施工 木工事", cat:"木工事", a:true, q:"木材は、根元であった方を元口、枝葉のあった方を末口といい、柱材では元口を下（土台側）にして用いる。", p:"<b>元口（根元側）・末口（枝側）</b>。柱材は<b>元口を下（土台側）</b>にして用いる（JASS 11）。"},
  {n:133, src:"R04 施工 木工事", cat:"木工事", a:true, q:"土台に使用する木材は、耐久性のある樹種の心材若しくは心持材を選定する。", p:"土台は<b>耐久性のある樹種の心材又は心持材</b>（ひのき・ひば・けやき・くり等）を選定する（JASS 11）。"},
  {n:134, src:"R04 施工 木工事", cat:"木工事", a:true, q:"梁材や桁材のような水平材では、背（凸側）が上端になるように用いる。", p:"梁・桁などの水平材は、たわみを考慮して<b>背（凸側）を上端</b>にして用いる。"},
  {n:135, src:"R04 施工 木工事", cat:"木工事", a:true, q:"床材は、木表を上にして取り付ける。", p:"床材は化粧面・反りを考慮し<b>木表を上</b>にして取り付ける。一般に床束が持ち上がるような反りを避けるため。"},
  {n:136, src:"R04 施工 金物", cat:"木工事", a:true, q:"短ざく金物は、上下階の柱相互又は胴差し相互の接合に用いる。", p:"短ざく金物は<b>上下階の柱相互・胴差し相互</b>の接合に用いる（木造住宅工事仕様書）。"},
  {n:137, src:"R04 施工 金物", cat:"木工事", a:true, q:"羽子板ボルトは、小屋梁と軒桁、軒桁と柱、梁と柱、胴差と通し柱の接合に用いる。", p:"羽子板ボルトは<b>小屋梁と軒桁・軒桁と柱・梁と柱・胴差と通し柱</b>等の接合に用いる。"},
  {n:138, src:"R04 施工 金物", cat:"木工事", a:true, q:"筋かいプレートは、筋かいを柱及び横架材（軒桁・土台等）に同時に接合するのに用いる。", p:"筋かいプレートは<b>筋かいを柱及び横架材に同時に接合</b>するのに用いる。"},
  {n:139, src:"R04 施工 金物", cat:"木工事", a:true, q:"かね折り金物は、通し柱と胴差の取合い部に用いる。", p:"かね折り金物は<b>通し柱と胴差の取合い部</b>に用いる（木造住宅工事仕様書）。"},
  {n:140, src:"R04 施工 金物", cat:"木工事", a:false, q:"かね折り金物は、垂木と軒桁の接合に用いる。", p:"垂木と軒桁の接合には<b>ひねり金物・折曲げ金物・くら金物</b>を用いる。かね折り金物は通し柱と胴差の取合い部用。"},
  {n:141, src:"R05 施工 仕口", cat:"木工事", a:true, q:"筋かいが付かない管柱と土台の仕口は、短ほぞ差し、かど金物当て釘打ちとする。", p:"筋かいが付かない管柱と土台の仕口は、<b>短ほぞ差し・かど金物当て釘打ち</b>等とする（JASS 11）。"},
  {n:142, src:"R05 施工 仕口", cat:"木工事", a:true, q:"軒桁の継手は、柱心より150mm内外持出した位置で、腰掛け鎌継ぎとする。", p:"軒桁の継手は、同じ柱間にある軒桁の継手位置及び柱間に小屋梁の掛かる位置を避け、<b>柱心より150mm内外持出した位置で腰掛け鎌継ぎ</b>とする（JASS 11）。"},
  {n:143, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"補強コンクリートブロック造の塀の高さは2.2m以下とし、塀の高さが2mを超える場合に用いるブロックの正味厚さは、15cm以上とする。", p:"塀の高さは<b>2.2m以下</b>。正味厚さは高さ2m以下で12cm以上（施行令は10cm以上）、<b>2m超で15cm以上</b>（JASS 7）。"},
  {n:144, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"補強コンクリートブロック造の塀の縦筋は、下部は基礎に定着し、上部は横筋に180度フックによりかぎ掛けとするか、又は90度フックで余長10d以上とする。", p:"塀の縦筋は<b>下部を基礎に定着</b>、上部を横筋に<b>180°フックかぎ掛け</b>又は<b>90°フックで余長10d以上</b>とする（建築工事監理指針）。"},
  {n:145, src:"R01 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"補強コンクリートブロック造の塀において、特記がなかったので、長さ3.4m以下ごとに控壁を設けた。", p:"補強コンクリートブロック造の塀は、<b>長さ3.4m以下ごと</b>に控壁を設ける（JASS 7）。"},
  {n:146, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:false, q:"耐力壁のブロックは、水平目地のモルタルをフェイスシェル部分にのみ塗布して積み上げた。", p:"横目地（水平目地）モルタルは<b>ブロック上端の全面</b>に塗り付ける。フェイスシェル部分のみに塗布するのは不適当（公共建築工事標準仕様書）。"},
  {n:147, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"横目地（水平目地）のモルタルは、ブロック上端の全面に塗り付ける。", p:"横目地モルタルは<b>ブロック上端全面</b>、縦目地モルタルは接合面にそれぞれ隙間なく塗り付ける（公共建築工事標準仕様書）。"},
  {n:148, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"ブロックの空洞部への充填用コンクリートには、空洞部の大きさを考慮して豆砂利コンクリートを用いた。", p:"空洞部への充填用コンクリートは、通常<b>空洞部の大きさを考慮して豆砂利コンクリート</b>を用いる（建築工事監理指針）。"},
  {n:149, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"押し目地仕上げは、化粧目地材を用いないで、目地モルタルが硬化する前に目地ごてによって押さえる。", p:"押し目地仕上げは<b>硬化する前に目地ごて</b>で押さえ、密度が一様になるようにする（JASS 7）。"},
  {n:150, src:"R05 施工 ALC", cat:"ブロック・ALC工事", a:true, q:"外壁のALCパネルを縦壁ロッキング構法で取り付けるに当たり、自重受け金物を、パネル積上げ段数5段以下ごとに設けた。", p:"縦壁ロッキング構法の自重受け金物は、<b>パネル積上げ段数5段以下</b>（JASS 21では3〜5段）ごとに設ける。"},
  {n:151, src:"R05 施工 ALC", cat:"ブロック・ALC工事", a:true, q:"外壁のALCパネルの短辺小口相互の接合部の目地幅を20mmとし、シーリング材を充填した。", p:"外壁ALCパネルの短辺小口相互の接合部の目地幅は<b>10〜20mm程度</b>とし、伸縮調整目地としてシーリング材を充填する。20mmは適。"},
  {n:152, src:"R05 施工 ALC", cat:"ブロック・ALC工事", a:false, q:"外壁のALCパネルの短辺小口相互の接合部の目地は伸縮調整目地とし、目地幅を5mmとした。", p:"短辺小口相互の接合部の目地幅は<b>10〜20mm程度</b>必要。5mmでは小さく不適当（公共建築工事標準仕様書）。"},
  {n:153, src:"R04 施工 ブロック", cat:"ブロック・ALC工事", a:true, q:"ブロック塀の縦筋は、頂上部の横筋に180度フックによりかぎ掛けとした。", p:"塀の縦筋は上部を横筋に<b>180°フックでかぎ掛け</b>とするか又は90°フックで余長10d以上とする。"},
  {n:154, src:"R03 施工 木工事", cat:"木工事", a:true, q:"構造用合板を床下地板に用いる場合、JASに適合し、種類は1類、厚さは12mm以上のものとする。", p:"床下地板の構造用合板は<b>JAS適合・種類1類・厚さ12mm以上</b>のものとする。"},
  {n:155, src:"R03 施工 木工事", cat:"木工事", a:true, q:"木造軸組工法のアンカーボルトの埋込み位置は、筋かいが取り付く柱の下部、土台切れの箇所、土台継手及び仕口箇所の上木端部とし、その他の部分は2階建て以下で2.7m以内の間隔とする。", p:"アンカーボルトは<b>筋かい柱下部・土台切れ・継手仕口の上木端部</b>に設け、その他は2階建て以下で<b>2.7m以内</b>（3階建ては2.0m以内）とする。"},
  {n:156, src:"R03 施工 金物", cat:"木工事", a:true, q:"垂木と軒桁又は母屋との接合には、ひねり金物、くら金物又は折曲げ金物を用いる。", p:"<b>垂木と軒桁・母屋</b>の接合には<b>ひねり金物・くら金物・折曲げ金物</b>を用いる。"},
  {n:157, src:"R02 施工 金物", cat:"木工事", a:true, q:"かど金物は、引張りを受ける柱の上下（柱と土台・軒桁等）との接合に用いる。", p:"かど金物は<b>引張りを受ける柱の上下</b>（柱と土台・軒桁等）の接合に用いる（木造住宅工事仕様書）。"},
  {n:158, src:"R02 施工 金物", cat:"木工事", a:false, q:"折曲げ金物は、小屋組の隅角部の補強に用いる。", p:"折曲げ金物は<b>垂木と軒桁・母屋</b>の接合に用いる。<b>小屋組隅角部の補強は火打金物</b>であり、不適当。"},
  {n:159, src:"R02 施工 金物", cat:"木工事", a:true, q:"ひねり金物は、垂木と軒桁又は母屋との接合に用いる。", p:"ひねり金物は<b>垂木と軒桁・母屋</b>の接合に用いる（木造住宅工事仕様書）。"},
  {n:160, src:"R02 施工 金物", cat:"木工事", a:true, q:"小屋組の隅角部の補強には、火打金物を用いる。", p:"<b>小屋組隅角部の補強は火打金物</b>を用いる。折曲げ金物は垂木と軒桁・母屋の接合用。"},
  {n:161, src:"H30 施工 木工事", cat:"木工事", a:true, q:"せっこうボードを受け材タイプで張る場合、厚さ12mm以上のものとし、GNF40又はGNC40のくぎを150mm以下の間隔で留め付ける。", p:"受け材タイプは<b>厚さ12mm以上</b>のせっこうボードを<b>GNF40・GNC40を150mm以下</b>で留め付ける（貫タイプはGNF32・GNC32）。"},
  {n:162, src:"H30 施工 木工事", cat:"木工事", a:true, q:"くぎGNF40は、GNF32よりも長いくぎである。", p:"GNF40はGNF32より<b>長い</b>くぎ。長い釘への変更は安全側であり適当。表示はGN（種類）・F（平頭フラット）・40（長さ）。"},
  {n:163, src:"H30 施工 木工事", cat:"木工事", a:true, q:"根太を用いない床組の床下地板は、厚さ24mm以上の構造用合板とし、その四周を床梁又は胴差に直接N75釘で150mm以下の間隔で平打ちして留め付ける。", p:"根太なし床組の下地板は<b>構造用合板24mm以上</b>、四周を床梁・胴差に<b>N75釘150mm以下で平打ち</b>。"},
  {n:164, src:"R01 施工 木工事", cat:"木工事", a:true, q:"大壁造の面材耐力壁に構造用合板を用いる場合、その厚さは7.5mm以上とし、N50の釘で留付け間隔を150mm以下とする。", p:"大壁の面材耐力壁は<b>構造用合板7.5mm以上</b>、<b>N50釘・留付け間隔150mm以下</b>（木造住宅工事仕様書）。"},
  {n:165, src:"R01 施工 木工事", cat:"木工事", a:true, q:"根太の断面寸法は45mm×45mm以上とするが、大引又は床ばりの間隔が900mm内外の場合は45mm×60mm以上とする。", p:"根太は<b>45×45以上</b>、大引・床ばり間隔<b>900mm内外で45×60以上</b>、1,800mm内外で45×105以上。"},
  {n:166, src:"R01 施工 木工事", cat:"木工事", a:true, q:"棟木の継手は、束の位置を避けて束より持ち出し、腰掛けかま継ぎ又は蟻継ぎとし、N75釘2本打ちとする。", p:"棟木の継手は<b>束位置を避け束より持ち出し</b>、腰掛けかま継ぎ又は蟻継ぎ、<b>N75釘2本打ち</b>。"},
  {n:167, src:"R01 施工 木工事", cat:"木工事", a:false, q:"本ざねじゃくりの縁甲板を根太に直接張り付けるに当たり、継手位置を根太の心で一直線上にそろえた。", p:"継手は最大の弱点となりやすく1箇所に集中させない。縁甲板の継手は<b>受材心で乱に継ぐ</b>。一直線にそろえるのは不適当。"},
  {n:168, src:"R02 施工 木工事", cat:"木工事", a:true, q:"外気に通じる小屋裏の外壁部分については、断熱構造としなくてもよい。", p:"外気に通じる床裏・<b>小屋裏</b>・天井裏で外気に接するものは<b>断熱構造としなくてもよい</b>（木造住宅工事仕様書）。"},
  {n:169, src:"R02 施工 木工事", cat:"木工事", a:true, q:"大引の継手は、床束心から150mm程度持ち出し、腰掛け蟻継ぎとし、釘2本打ちとする。", p:"大引の継手は<b>束心から150mm程度持ち出し、腰掛け蟻継ぎ・釘2本打ち</b>（公共建築工事標準仕様書）。"},
  {n:170, src:"R02 施工 木工事", cat:"木工事", a:false, q:"大引の継手は、床束心から150mm持ち出し、そぎ継ぎとした。", p:"大引は<b>腰掛け蟻継ぎ</b>。そぎ継ぎは斜めにそぎ落した木口を突き付け釘打ちする継手で<b>垂木や根太等</b>に用いる。不適当。"},
  {n:171, src:"R02 施工 木工事", cat:"木工事", a:true, q:"桁などで継ぎ伸ばしの都合上やむを得ず短材を使用する場合、その長さは2m程度を限度とする。", p:"短材を使う場合の長さは<b>2m程度を限度</b>とする。"},
  {n:172, src:"H30 施工 木工事", cat:"木工事", a:true, q:"心持ち材の化粧柱は、特記のない化粧材の場合は、背割りを行ったものとする。", p:"特記のない化粧材は<b>背割り</b>を行ったものとする（JASS 11）。"},
  {n:173, src:"H30 施工 木工事", cat:"木工事", a:false, q:"敷居は、木裏を上端にして使用する。", p:"敷居・鴨居は乾燥すると木裏が凸になり、溝じゃくりを木裏に設けると建具の開閉が固くなる。溝じゃくりは木表に設け、敷居は<b>木表を上端</b>にして使用する。"},
  {n:174, src:"H30 施工 木工事", cat:"木工事", a:true, q:"梁に用いる樹種には、アカマツ、クロマツ、ベイマツ、カラマツ等がある。", p:"梁の樹種は<b>アカマツ・クロマツ・ベイマツ・カラマツ</b>等（木造住宅工事仕様書）。"},
  {n:175, src:"H29 施工 木工事", cat:"木工事", a:true, q:"せっこうボード等を下地へ釘留めする場合、釘の間隔はボード周辺部で100mm内外、その他の中間部で150mm内外とする。", p:"釘間隔は<b>周辺部100mm内外</b>（へりより10mm程度内側）、<b>中間部150mm内外</b>（木造住宅工事仕様書）。"},
  {n:176, src:"H29 施工 木工事", cat:"木工事", a:false, q:"せっこうラスボードの張付けにおいて、釘留め間隔をボード周辺部については150mm、その他の中間部は200mmとした。", p:"正しくは<b>周辺部100mm内外・中間部150mm内外</b>。150mm／200mmは大きすぎて不適当。"},
  {n:177, src:"H29 施工 木工事", cat:"木工事", a:true, q:"末口135mm以上の丸太（小屋梁）の継手は、受け材上で台持ち継ぎとし、下木にだぼ2本を植え込みかすがい両面打ちとするか、又は六角ボルト2本締めとする。", p:"小屋梁の継手は<b>受け材上で台持ち継ぎ</b>、だぼ2本＋かすがい両面打ち又は<b>六角ボルト2本締め</b>。"},
  {n:178, src:"H29 施工 木工事", cat:"木工事", a:true, q:"床の縁甲板張りは、板の側面を本ざね加工又は相じゃくり加工とし、受材に当たり隠し釘打ちとする。", p:"縁甲板は<b>本ざね加工又は相じゃくり加工</b>、受材で<b>隠し釘打ち</b>（JASS 11）。"},
  {n:179, src:"H29 施工 木工事", cat:"木工事", a:true, q:"開口部のまぐさ・窓台の仕口は、一方は柱へ傾ぎ大入れ短ほぞ差しとする。", p:"まぐさ・窓台の仕口は一方を柱へ<b>傾ぎ大入れ短ほぞ差し</b>とする（JASS 11）。"},
  {n:180, src:"H28 施工 木工事", cat:"木工事", a:true, q:"ひき立て寸法とは、木材を製材した状態（のこ引きしたままの状態）の木材断面寸法である。", p:"<b>ひき立て寸法</b>＝製材した（のこ引きのまま）状態の木材断面寸法（公共建築木造工事標準仕様書）。"},
  {n:181, src:"H28 施工 木工事", cat:"木工事", a:true, q:"仕上り寸法とは、かんな掛け等で木材表面を仕上げた後の部材断面寸法である。", p:"<b>仕上り寸法</b>＝かんな掛け等で表面を仕上げた後の部材断面寸法。"},
  {n:182, src:"H28 施工 木工事", cat:"木工事", a:true, q:"たいこ材とは、構造用製材のうち、丸太の髄心を中心に平行する2平面のみを切削した角類のものである。", p:"<b>たいこ材</b>＝丸太の髄心を中心に平行する2平面のみを切削した角類のもの。"},
  {n:183, src:"H28 施工 木工事", cat:"木工事", a:false, q:"本ざね加工とは、板材等の側面に溝を彫り、その溝に細長い木片をはめ込む加工である。", p:"本ざね加工は<b>一方に凸形の突起、他方に凹形の溝</b>を付けたもの。溝に細長い木片をはめ込むのは<b>雇いざね加工</b>であり不適当。"},
  {n:184, src:"H28 施工 木工事", cat:"木工事", a:true, q:"枠組壁工法において、アンカーボルトの埋込み位置の許容誤差は、特記がなければ±5mmとする。", p:"枠組壁工法のアンカーボルト埋込み位置の許容誤差は特記なければ<b>±5mm</b>（公共建築木造工事標準仕様書）。"},
  {n:185, src:"H28 施工 木工事", cat:"木工事", a:true, q:"枠組壁工法において、壁枠組に設ける幅90cm以上の開口部の上部には、まぐさを設ける。", p:"枠組壁工法では<b>幅90cm以上の開口部上部にまぐさ</b>を設ける（平成13年国交告1540号）。"},
  {n:186, src:"H28 施工 木工事", cat:"木工事", a:true, q:"枠組壁工法において、小屋組は、水平力に対して安全なものとなるように振れ止めを設ける。", p:"枠組壁工法の小屋組は<b>水平力に対し振れ止め</b>を設ける（公共建築木造工事標準仕様書）。"},
  {n:187, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:true, q:"土間コンクリート床は厚さ120mm以上とし、断面の中央部に、鉄線径4mm以上・網目150mm以内のワイヤーメッシュを配する。", p:"土間コンクリート床は<b>厚さ120mm以上</b>、中央部に<b>径4mm以上・網目150mm以内</b>のワイヤーメッシュを配する。"},
  {n:188, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:true, q:"床下防湿措置を防湿フィルムで行う場合、JISに適合する厚さ0.1mm以上のフィルムを床下地面全面に重ね幅150mm以上で敷き、全面をコンクリート又は乾燥した砂等で押える。", p:"防湿フィルムは<b>JIS適合・厚さ0.1mm以上</b>、<b>重ね幅150mm以上</b>、全面をコンクリート又は乾燥砂等で押える。"},
  {n:189, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:true, q:"基礎断熱工法の場合、防湿フィルムを乾燥した砂等で押え、その押えの厚さは50mm以上とする。", p:"基礎断熱工法では防湿フィルムを<b>乾燥砂等で押え、厚さ50mm以上</b>とする。"},
  {n:190, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:false, q:"断熱材がある土間スラブにおいて、防湿層を土間スラブと断熱材の間に設けた。", p:"断熱材がある土間スラブ（土間コンクリート）の防湿層は<b>断熱材の直下</b>に設ける。スラブと断熱材の間（断熱材の上）は不適当（建築工事監理指針）。"},
  {n:191, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:true, q:"べた基礎において、地面から基礎の立上り部分の上端までの高さは、400mm以上とする。", p:"べた基礎の<b>地面から立上り上端まで400mm以上</b>（木造住宅工事仕様書）。"},
  {n:192, src:"R01 施工 木造基礎", cat:"木造基礎工事", a:true, q:"布基礎の底盤の厚さは150mm以上、幅は450mm以上とする。", p:"布基礎の底盤は<b>厚さ150mm以上・幅450mm以上</b>（木造住宅工事仕様書）。"},
  {n:193, src:"R01 施工 木造基礎", cat:"木造基礎工事", a:false, q:"布基礎の底盤については、厚さを120mm、幅を450mmとした。", p:"底盤の厚さは<b>150mm以上</b>必要。120mmは不適当（幅450mmは適）。"},
  {n:194, src:"R01 施工 木造基礎", cat:"木造基礎工事", a:true, q:"布基礎の床下防湿措置で防湿用コンクリートを打設する場合は、床下地面全面に厚さ60mm以上のコンクリートを打ち込む。", p:"防湿用コンクリートは<b>床下地面全面に厚さ60mm以上</b>打ち込む。"},
  {n:195, src:"R01 施工 木造基礎", cat:"木造基礎工事", a:true, q:"アンカーボルトは土台を基礎に緊結するため、径12mm以上・埋込み長さ250mm以上とし、ホールダウン金物を緊結する場合は径16mm以上・埋込み長さ360mm以上を目安とする。", p:"アンカーボルトは<b>径12mm以上・埋込み250mm以上</b>、ホールダウン緊結時は<b>径16mm以上・埋込み360mm以上</b>（JASS 11）。"},
  {n:196, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:true, q:"布基礎の根入れ深さは、地面より240mm以上とし、かつ建設地域の凍結深度より深いものとするか、凍結を防止するための有効な措置を講ずる。", p:"布基礎の根入れ深さは<b>地面より240mm以上、かつ凍結深度より深く</b>。底盤の幅は450mm以上。"},
  {n:197, src:"R06 施工 木造基礎", cat:"木造基礎工事", a:false, q:"布基礎の根入れ深さを、地面より200mmとした。", p:"根入れ深さは<b>240mm以上</b>必要。200mmは不適当。"},
  {n:198, src:"R05 施工 木造基礎", cat:"木造基礎工事", a:true, q:"割栗地業の締固めは、ランマー2回突き以上又は振動ローラー3回突き以上とし、凹凸部は目つぶし砂利等で上ならしをする。", p:"割栗地業の締固めは<b>ランマー2回突き以上又は振動ローラー3回突き以上</b>。"},
  {n:199, src:"R05 施工 木造基礎", cat:"木造基礎工事", a:true, q:"布基礎の底盤部分の主筋にはD10以上を用い、その間隔を300mm以下とし、底盤両端部の補助筋と緊結させる。", p:"布基礎底盤の主筋は<b>D10以上・間隔300mm以下</b>、両端部のD10以上の補助筋と緊結（木造住宅工事仕様書）。"},
  {n:200, src:"R05 施工 木造基礎", cat:"木造基礎工事", a:true, q:"べた基礎の基礎底盤には、排水するための水抜き孔を適切な位置に設け、工事完了後に適切にふさぐ。", p:"べた基礎底盤には<b>水抜き孔</b>を設け、<b>工事完了後にふさぐ</b>。"},
  {n:201, src:"R05 施工 木造基礎", cat:"木造基礎工事", a:false, q:"コンクリートの打込みに際して、コンクリートに振動を与えないように注意した。", p:"打込み時は<b>十分な突き・たたき・振動</b>を与え、空隙が生じないようにする。振動を与えないのは不適当。"},
  {n:202, src:"R05 施工 木造基礎", cat:"木造基礎工事", a:true, q:"普通ポルトランドセメントを用いたコンクリートの打込み後、最低気温が15℃を下回らなかったので、基礎の型枠の存置期間を3日とした。", p:"普通ポルトランドセメントで<b>15℃以上の場合、型枠存置期間は3日以上</b>が目安（5〜15℃未満はより長く）。"},
  {n:203, src:"H30 施工 木造基礎", cat:"木造基礎工事", a:true, q:"床下換気措置でねこ土台を使用する場合、外周部の土台全周にわたって、1m当たり有効面積75cm²以上の換気孔を設ける。", p:"ねこ土台では外周部の土台全周に<b>1m当たり有効面積75cm²以上</b>の換気を確保する。"},
  {n:204, src:"H28 施工 木造基礎", cat:"木造基礎工事", a:true, q:"捨てコンクリート地業は、砂・砂利又は地肌地業の上に施工する厚さ50〜100mmの敷ならしコンクリートで、地盤の強化が目的ではない。", p:"捨てコンクリート地業は<b>厚さ50〜100mm</b>、墨出し・鉄筋型枠組立てのためのもので<b>地盤強化が目的ではない</b>。"},
  {n:205, src:"H28 施工 木造基礎", cat:"木造基礎工事", a:false, q:"地盤を強化することを目的として、布基礎の下部に厚さ60mmの捨てコンクリート地業を行った。", p:"捨てコンクリート地業は<b>地盤強化が目的ではない</b>。墨出しや鉄筋・型枠組立てのために設けるもので不適当。"},
  {n:206, src:"R02 施工 防水", cat:"防水・屋根工事", a:true, q:"アスファルト防水層の保護コンクリートの伸縮目地の割付けは、周辺の立上り部から600mm程度とし、中間部は縦横間隔3,000mm程度とする。", p:"伸縮目地は<b>立上り部から600mm程度</b>、中間部<b>縦横3,000mm程度</b>（公共建築工事標準仕様書）。"},
  {n:207, src:"R02 施工 防水", cat:"防水・屋根工事", a:true, q:"アスファルト防水層の保護コンクリートの伸縮調整目地は、排水溝を含めて立上りの仕上り面に達するものとし、保護コンクリートの上面から下面まで達するように設ける。", p:"伸縮目地は<b>保護コンクリートの上面から下面まで達する</b>ように設ける。"},
  {n:208, src:"R02 施工 防水", cat:"防水・屋根工事", a:false, q:"加硫ゴム系シートを用いた合成高分子系シート防水で、平場一般部のシートの重ね幅を、幅方向・長手方向とも40mmとした。", p:"加硫ゴム系ルーフィングシートの平場の重ね幅は<b>幅・長手とも100mm以上</b>、立上りと平場の取合い部は<b>150mm以上</b>。40mmは不適当。"},
  {n:209, src:"R02 施工 防水", cat:"防水・屋根工事", a:true, q:"合成高分子系シート防水の防水層の下地は、出隅は通りよく45°の面取りとし、入隅は通りよく直角とする。", p:"シート防水下地は<b>出隅45°面取り・入隅直角</b>（公共建築工事標準仕様書）。"},
  {n:210, src:"R02 施工 防水", cat:"防水・屋根工事", a:true, q:"塗膜防水工事のプライマー塗りは、下地が十分に乾燥した後に清掃を行い、ローラーばけ等を用いて当日の施工範囲をむらなく塗布する。", p:"プライマーは<b>下地乾燥後に清掃</b>し、<b>当日の施工範囲をむらなく</b>塗布する。"},
  {n:211, src:"R06 施工 防水", cat:"防水・屋根工事", a:true, q:"合成高分子系シート防水工事には接着工法と機械的固定工法があるが、ALCパネル下地には機械的固定工法を適用しない。", p:"シート防水の<b>機械的固定工法はALCパネル下地には適用しない</b>（接着工法を用いる）。"},
  {n:212, src:"R03 施工 屋根", cat:"防水・屋根工事", a:true, q:"屋根の下葺きに用いるアスファルトルーフィングは、壁面との取合い部において、壁面に沿って250mm以上、かつ、雨押え上端より50mm以上立ち上げる。", p:"下葺き材は壁取合い部で<b>壁面に沿って250mm以上、かつ雨押え上端より50mm以上</b>立ち上げる。"},
  {n:213, src:"R03 施工 屋根", cat:"防水・屋根工事", a:true, q:"硬質塩化ビニル製の雨樋において、軒樋の樋受金物の取付け間隔は1.0m以下、たて樋の樋受金物の取付け間隔は1.2m以下とする。", p:"硬質塩ビ雨樋は<b>軒樋1.0m以下・たて樋1.2m以下</b>（公共建築工事標準仕様書）。"},
  {n:214, src:"R03 施工 屋根", cat:"防水・屋根工事", a:false, q:"硬質塩化ビニル製の雨樋において、軒樋の樋受金物の取付け間隔を1.8mとした。", p:"軒樋の樋受金物の取付け間隔は<b>1.0m以下</b>。1.8mは不適当。"},
  {n:215, src:"R03 施工 屋根", cat:"防水・屋根工事", a:true, q:"粘土瓦葺における瓦の留付けに使用する緊結線は、合成樹脂等で被覆された径1.0mm以上の銅線又は径0.9mm以上のステンレス製とする。", p:"瓦の緊結線は<b>径1.0mm以上の銅線又は径0.9mm以上のステンレス製</b>。"},
  {n:216, src:"R03 施工 防水", cat:"防水・屋根工事", a:true, q:"アスファルトルーフィング類の上下層の継目は、同一箇所とならないように張り付ける。", p:"ルーフィング類の上下層の継目は<b>同一箇所としない</b>（公共建築工事標準仕様書）。"},
  {n:217, src:"R03 施工 防水", cat:"防水・屋根工事", a:true, q:"塗膜防水工事において、防水材塗りの塗継ぎの重ね幅は100mm以上とし、補強布の重ね幅は50mm以上とする。", p:"塗膜防水の重ね幅は<b>防水材100mm以上・補強布50mm以上</b>。"},
  {n:218, src:"R02 施工 防水", cat:"防水・屋根工事", a:true, q:"シーリング防水工事で、窯業系サイディングのパネル間目地の目地深さが所定の寸法であったので、目地底にボンドブレーカーを設置して二面接着とした。", p:"パネル間目地は<b>目地底にボンドブレーカーを設置し二面接着</b>とする（三面接着を避ける）。"},
  {n:219, src:"H30 施工 防水", cat:"防水・屋根工事", a:true, q:"塩化ビニル樹脂系ルーフィングシート類の接合部は熱風融着又は溶剤溶着とし、その重ね幅は幅方向・長手方向とも40mm以上とする。", p:"塩ビ系シートは<b>接合部を熱風融着又は溶剤溶着</b>、重ね幅は<b>幅・長手とも40mm以上</b>（加硫ゴム系は100mm以上）。"},
  {n:220, src:"H30 施工 防水", cat:"防水・屋根工事", a:true, q:"アスファルト防水工事において、ルーフドレン回りは漏水などの欠陥が発生しやすいため、平場のルーフィング類の張付けに先立ち増張りを行う。", p:"ルーフドレン回りは欠陥が出やすいため、<b>平場の張付けに先立ち増張り</b>を行う。"},
  {n:221, src:"H30 施工 防水", cat:"防水・屋根工事", a:false, q:"アスファルト防水層の保護コンクリートの伸縮目地で、パラペットの立上りに最も近い目地を、立上りの仕上り面から1.5mの位置に設けた。", p:"立上り部に最も近い伸縮目地は仕上り面から<b>600mm程度</b>とする。1.5mは離れすぎで不適当。"},
  {n:222, src:"R01 施工 防水", cat:"防水・屋根工事", a:true, q:"シーリング工事において、充填箇所以外の部分に付着したシリコーン系シーリング材は、硬化後に取り除く。", p:"シリコーン系は未硬化で取ると汚染を拡散するおそれがあるため<b>硬化後に取り除く</b>。"},
  {n:223, src:"R01 施工 屋根", cat:"防水・屋根工事", a:true, q:"金属製折板屋根工事において、タイトフレームの受梁への取付けは隅肉溶接とし、溶接後はスラグを除去し、アンダーカットなどの欠陥がないことを確認して防錆処置を行う。", p:"タイトフレームは受梁に<b>隅肉溶接</b>、スラグ除去・<b>アンダーカット等の欠陥確認</b>・防錆処置（JASS 12）。"},
  {n:224, src:"R01 施工 屋根", cat:"防水・屋根工事", a:true, q:"住宅屋根用化粧スレートの葺板は、1枚ごとに所定の位置に専用釘を用いて野地板に留め付ける。", p:"化粧スレートの葺板は<b>1枚ごとに専用釘で野地板に留め付ける</b>（木造住宅工事仕様書）。"},
  {n:225, src:"R03 施工 タイル", cat:"タイル・石工事", a:true, q:"コンクリート壁面へのモルタル塗りにおいて、上塗りには下塗りよりも貧調合のモルタルを使用する。", p:"下塗りはセメント量の多い<b>富調合</b>で付着を高め、上塗りは<b>貧調合</b>で乾燥収縮を小さくしひび割れを防ぐ（JASS 15）。"},
  {n:226, src:"R03 施工 左官", cat:"タイル・石工事", a:true, q:"屋内のせっこうプラスター塗りにおいて、施工後せっこうが硬化するまでは著しい通風を避け、硬化し終わった後に適度な通風を与えて塗り面の乾燥を図る。", p:"せっこうプラスターは<b>硬化までは著しい通風を避け</b>、硬化後に適度な通風で乾燥を図る。"},
  {n:227, src:"R03 施工 タイル", cat:"タイル・石工事", a:true, q:"壁タイルの密着張りにおいて、張付けモルタルの塗り厚は5〜8mmとし、2層に分けて塗り付け、1層目はこて圧をかけて塗り付ける。", p:"密着張りの張付けモルタルは<b>塗り厚5〜8mm</b>、<b>2層に分け1層目はこて圧</b>（公共建築工事標準仕様書）。"},
  {n:228, src:"R03 施工 タイル", cat:"タイル・石工事", a:false, q:"外壁の二丁掛けタイルの密着張りにおいて、張付けモルタルの塗り厚を15mmとした。", p:"密着張りの張付けモルタルの塗り厚は<b>5〜8mm</b>。15mmは厚すぎて不適当。"},
  {n:229, src:"R02 施工 タイル", cat:"タイル・石工事", a:false, q:"密着張りによるタイル張りにおいて、張付けモルタルをこて圧をかけずに1層で塗り付けた。", p:"密着張りの張付けモルタルは<b>2層に分け、1層目はこて圧</b>をかけて塗り付ける。こて圧なし1層は不適当。"},
  {n:230, src:"R03 施工 タイル", cat:"タイル・石工事", a:true, q:"タイルのマスク張りにおいて、ユニットタイル用マスクを用い、ユニット裏面全面に張付けモルタルを塗り付け、タイル周辺から張付けモルタルがはみ出すまでたたき締める。", p:"マスク張りは<b>ユニット裏面全面に張付けモルタル</b>、周辺からはみ出すまでたたき締める。"},
  {n:231, src:"R02 施工 タイル", cat:"タイル・石工事", a:true, q:"タイル張り面の伸縮調整目地は、下地のひび割れ誘発目地、各階の水平打継ぎ目地、構造スリットなどと一致して設ける。", p:"タイルの伸縮調整目地は<b>下地のひび割れ誘発目地・各階水平打継ぎ目地・構造スリット等と一致</b>させる（JASS 19）。"},
  {n:232, src:"R02 施工 タイル", cat:"タイル・石工事", a:true, q:"壁タイルの密着張りにおいて、張付けモルタルの1回の塗付け面積の限度は、1人が施工可能な面積として2m²以内とする。", p:"張付けモルタルの1回塗付け面積の限度は、触れると手に付く状態のまま張り終えられる<b>1人2m²以内</b>。"},
  {n:233, src:"R03 施工 石", cat:"タイル・石工事", a:true, q:"外壁乾式工法による石材の取付けにおいて、特記がなければ、石材間の目地幅を8mm以上とし、シーリング材を充填する。", p:"外壁乾式工法の石材間の目地幅は特記なければ<b>8mm以上</b>とし、シーリング材を充填する。"},
  {n:234, src:"R02 施工 石", cat:"タイル・石工事", a:true, q:"乾式工法による石張りにおいて、特記がなければ、石材の形状は正方形に近い矩形とし、1枚の面積は0.8m²以下のものを用いる。", p:"石材は特記なければ<b>正方形に近い矩形・1枚0.8m²以下</b>とする。"},
  {n:235, src:"R02 施工 左官", cat:"タイル・石工事", a:true, q:"セメントモルタル塗りにおいて、モルタルの練混ぜは原則として機械練りとし、1回の練混ぜ量は可使時間内に使い切れる量とする。", p:"練混ぜは原則<b>機械練り</b>、1回量は<b>可使時間内</b>（JASS 15で夏期90分・他120分）に使い切れる量。"},
  {n:236, src:"R02 施工 左官", cat:"タイル・石工事", a:true, q:"屋内のセルフレベリング材塗りにおいて、材料が硬化するまでの間は甚だしい通風を避けるため、窓や開口部をふさぐ。", p:"セルフレベリング材は硬化前の風でしわが発生するため、<b>硬化までは甚だしい通風を避ける</b>。"},
  {n:237, src:"R05 施工 設備", cat:"設備工事", a:true, q:"屋内の排水横管の勾配は、管径が太いものほど緩やかにし、管径65mm以下は最小1/50、75・100mmは1/100、125mmは1/150、150mm以上は1/200とする。", p:"排水横管の勾配は<b>管径が太いほど緩く</b>。65以下1/50、75・100は1/100、125は1/150、150以上1/200。"},
  {n:238, src:"R05 施工 設備", cat:"設備工事", a:false, q:"屋内の排水横管の勾配を、管径が75mmであったので1/150とした。", p:"管径75mmの排水横管の勾配は<b>1/100以上</b>とする。1/150は緩すぎて不適当。"},
  {n:239, src:"R05 施工 設備", cat:"設備工事", a:true, q:"給湯管には、架橋ポリエチレン管、ポリブテン管、耐熱性硬質ポリ塩化ビニル管、銅管等を使用する。", p:"給湯管には<b>架橋ポリエチレン管・ポリブテン管・耐熱性硬質塩化ビニル管・銅管</b>等を使用する。"},
  {n:240, src:"R05 施工 設備", cat:"設備工事", a:true, q:"雨水用排水ます（ためます）には、底部に深さ150mm以上の泥だめを設ける。", p:"雨水ますは底部に<b>深さ150mm以上の泥だめ</b>を設ける。"},
  {n:241, src:"R05 施工 設備", cat:"設備工事", a:true, q:"寒冷地以外の一般敷地内において、特記がなければ、給水管の地中埋設深さ（土かぶり）を300mm以上とする。", p:"管の土かぶりは<b>一般敷地300mm以上</b>、車両道路は600mm以上、寒冷地は凍結深度より深くする。"},
  {n:242, src:"R06 施工 設備", cat:"設備工事", a:true, q:"給水管と排水管とを平行に地中に埋設する場合、両配管の水平間隔を500mm以上とし、給水管は排水管の上方に埋設する。", p:"漏水しても安全なよう、平行埋設は<b>水平間隔500mm以上・給水管を排水管の上方</b>に（交差時も給水管が上方）。"},
  {n:243, src:"R06 施工 設備", cat:"設備工事", a:true, q:"給水横走り管は、上向き給水方式の場合は先上がりの均一な勾配で配管する。", p:"横走り管は<b>上向き給水方式は先上がり</b>、下向き給水方式は先下がりの均一な勾配で配管する。"},
  {n:244, src:"R06 施工 設備", cat:"設備工事", a:false, q:"上向き給水管方式を採用した給水横走り管を、先下がりの均一な勾配で配管した。", p:"<b>上向き給水方式は先上がり</b>勾配。先下がりは下向き給水方式の場合であり不適当。"},
  {n:245, src:"R06 施工 設備", cat:"設備工事", a:true, q:"給水・給湯設備工事における防露・保温材は、特記がなければ厚さ20mmの保温筒とする。", p:"防露・保温材は筒・帯・板とし、特記なければ<b>厚さ20mmの保温筒</b>（木造住宅工事仕様書）。"},
  {n:246, src:"R06 施工 設備", cat:"設備工事", a:true, q:"LPガス（空気より重いガス）のガス漏れ警報設備の検知器は、ガス燃焼器から水平距離4m以内、かつ、その上端が床面から上方0.3m以内の位置に取り付ける。", p:"LPガスは空気より重いため、検知器は<b>燃焼器から水平4m以内・上端が床面から上方0.3m以内</b>。"},
  {n:247, src:"R06 施工 設備", cat:"設備工事", a:true, q:"都市ガス（空気に対する比重が1より小さいガス）のガス漏れ警報設備の検知器は、ガス栓から水平距離8m以内とし、検知器の下端が天井面から下方30cm以内の位置に設ける。", p:"都市ガスは空気より軽いため、検知器は<b>ガス栓から水平8m以内・下端が天井面から下方30cm以内</b>（昭和56年建設省告示1099号）。"},
  {n:248, src:"R06 施工 設備", cat:"設備工事", a:true, q:"住宅用防災警報器は、寝室や階段などの壁又は梁から0.6m以上離れた天井の屋内に面する部分、又は天井から下方0.15m以上0.5m以内の壁の屋内に面する部分に設ける。", p:"住宅用防災警報器は<b>壁・梁から0.6m以上離れた天井</b>、又は<b>天井から下方0.15〜0.5mの壁</b>に設ける。"},
  {n:249, src:"R06 施工 仕上げ", cat:"仕上げ・工法", a:true, q:"外部に面する網入り板ガラスの小口処理について、下辺小口及び縦小口下端から1/4の高さまで、防錆テープによる防錆処理を行う。", p:"網入り板ガラスは下辺小口・縦小口下端から<b>1/4の高さまで防錆処理</b>を行う。"},
  {n:250, src:"R06 施工 仕上げ", cat:"仕上げ・工法", a:true, q:"グリッパー工法によるカーペット敷きにおいて、上敷きの敷詰めは、伸張用工具で幅300mmにつき200N程度の張力をかけて伸張し、グリッパーに固定する。", p:"グリッパー工法は<b>幅300mmにつき200N程度の張力</b>で伸張し固定する。"},
  {n:251, src:"R06 施工 仕上げ", cat:"仕上げ・工法", a:true, q:"間仕切壁の特殊加工化粧合板（A種）の張付けは、接着剤を併用した沈めねじ留めとし、ねじ穴は表面仕上げ材と同色のパテ詰めとする。", p:"A種の特殊加工化粧合板は<b>接着剤併用の沈めねじ留め</b>、ねじ穴は<b>表面仕上げ材と同色のパテ詰め</b>。"},
  {n:252, src:"R06 施工 仕上げ", cat:"仕上げ・工法", a:true, q:"コンクリート下地にせっこうボードを直張りする場合、せっこう系直張り用接着材の間隔は、ボード周辺部で150〜200mm、床上1.2m以下の部分で200〜250mm、床上1.2mを超える部分で250〜300mmとする。", p:"直張り用接着材の間隔は<b>周辺部150〜200mm・床上1.2m以下200〜250mm・1.2m超250〜300mm</b>。"},
  {n:253, src:"R06 施工 仕上げ", cat:"仕上げ・工法", a:false, q:"コンクリート下地にせっこうボードを直張りするに当たり、せっこう系直張り用接着材の間隔を、各ボードの周辺部で350mmとした。", p:"直張り用接着材の間隔は周辺部で<b>150〜200mm</b>。350mmは大きすぎて不適当。"},
  {n:254, src:"R05 施工 機械", cat:"用語・機械", a:true, q:"ハッカーは、鉄筋を結束線（なまし鉄線）で結束するときに使用する工具である。", p:"<b>ハッカー</b>は鉄筋の結束に使用する工具。"},
  {n:255, src:"R05 施工 機械", cat:"用語・機械", a:true, q:"チェーンブロックは、鉄骨組の建入れ直しに用いる器具で、レバーブロック等がある。", p:"<b>チェーンブロック</b>は鉄骨建方の建入れ直しに用いる器具。"},
  {n:256, src:"R05 施工 機械", cat:"用語・機械", a:true, q:"インパクトレンチは、鉄骨建方時の高力ボルトの締付けに用いる。", p:"<b>インパクトレンチ</b>は高力ボルトの締付けに用いる（型枠フォームタイの締付けには用いない）。"},
  {n:257, src:"R05 施工 機械", cat:"用語・機械", a:true, q:"トレミー管は、場所打ちコンクリート杭等の水中コンクリートの打込みに用いる直径15〜30cmの管（投入管）である。", p:"<b>トレミー管</b>は水中コンクリートの打込みに用いる管で、先端をコンクリート中に入れたまま引き上げる。"},
  {n:258, src:"H29 施工 機械", cat:"用語・機械", a:true, q:"地盤アンカー工法は、切ばりの代わりに、山留め壁にかかる側圧を良質地盤に定着させた地盤アンカーで支えながら掘削する山留め工事である。", p:"<b>地盤アンカー工法は山留め工事</b>であり、杭工事ではない。"},
  {n:259, src:"H29 施工 機械", cat:"用語・機械", a:false, q:"杭工事において、地盤が軟弱であったので、地盤アンカー工法を採用した。", p:"地盤アンカー工法は<b>山留め工事</b>。杭工事に採用するのは用語の組合せとして不適当。"},
  {n:260, src:"H29 施工 機械", cat:"用語・機械", a:true, q:"防水工事におけるトーチ工法は、改質アスファルトシート防水の工法のひとつで、トーチバーナーでルーフィングシート裏面を熱し下地に溶着する、においが少ない工法である。", p:"<b>トーチ工法</b>は改質アスファルトシート防水の工法で、においが少なく溶剤使用量が少ない。"},
  {n:261, src:"H29 施工 機械", cat:"用語・機械", a:true, q:"パワーショベルは、機械の接地面より上方の土砂をすくい取る掘削機械である。", p:"<b>パワーショベル</b>は接地面より<b>上方</b>の土砂をすくい取る掘削機械（下方はドラグショベル）。"},
  {n:262, src:"H29 施工 機械", cat:"用語・機械", a:true, q:"鉄筋工事における鉄筋の切断には、シヤーカッター、電動カッター等を使用する。", p:"鉄筋の切断には<b>シヤーカッター・電動カッター</b>等を使用する。"},
  {n:263, src:"H29 施工 機械", cat:"用語・機械", a:true, q:"鉄骨工事における高力ボルトの締付けには、電動インパクトレンチやトルクレンチ等を使用する。", p:"高力ボルトの締付けには<b>電動インパクトレンチ・トルクレンチ</b>等を使用する。"},
  {n:264, src:"R05 施工 機械", cat:"用語・機械", a:true, q:"親杭横矢板工法は、地下水位が床付け面より低い場合の山留めに用いられる。", p:"<b>親杭横矢板工法</b>は地下水位が床付け面より低い場合の山留めに用いる。"},
  {n:265, src:"R05 施工 機械", cat:"用語・機械", a:true, q:"プレボーリング根固め工法は、既製コンクリート杭の杭先端部を支持地盤に定着させる工法である。", p:"<b>プレボーリング根固め工法</b>は既製コンクリート杭を支持地盤に定着させる。"},
  {n:266, src:"R02 施工 積算", cat:"積算", a:true, q:"工事費（積算価額）は、工事価格に消費税等相当額を加えたものである。", p:"工事費＝<b>工事価格＋消費税等相当額</b>。工事価格＝工事原価＋一般管理費等。"},
  {n:267, src:"H28 施工 積算", cat:"積算", a:true, q:"工事原価は、純工事費と現場管理費（現場経費）とを合わせたものである。", p:"工事原価＝<b>純工事費＋現場管理費</b>。工事価格＝工事原価＋一般管理費等。"},
  {n:268, src:"R06 施工 積算", cat:"積算", a:true, q:"純工事費は、直接工事費と共通仮設費とを合わせたものである。", p:"純工事費＝<b>直接工事費＋共通仮設費</b>。"},
  {n:269, src:"R05 施工 積算", cat:"積算", a:true, q:"共通費は、共通仮設費、現場管理費及び一般管理費等に区分される。", p:"共通費＝<b>共通仮設費＋現場管理費＋一般管理費等</b>（公共建築工事積算基準）。"},
  {n:270, src:"R02 施工 積算", cat:"積算", a:true, q:"直接工事費は、建築物を生産するために直接必要な費用で、材料費・直接仮設費・人件費などのほか、下請工事業者の経費を含んだものをいう。", p:"直接工事費は<b>材料費・直接仮設費・労務費＋下請工事業者の経費</b>を含む。"},
  {n:271, src:"R02 施工 積算", cat:"積算", a:false, q:"直接工事費には、直接仮設及び下請経費は含まれない。", p:"直接工事費には<b>直接仮設費も下請経費も含まれる</b>。含まれないとするのは不適当。"},
  {n:272, src:"R02 施工 積算", cat:"積算", a:true, q:"一般管理費等は、工事施工に当たる受注者の継続運営に必要な費用で、一般管理費と付加利益等からなり、現場管理費は含まれない。", p:"一般管理費等は本店・支店の管理運営費用で<b>一般管理費＋付加利益等</b>。<b>現場管理費は含まれない</b>。"},
  {n:273, src:"R02 施工 積算", cat:"積算", a:true, q:"共通仮設費には、現場事務所などの施設に要する仮設建物費が含まれる。", p:"共通仮設費は仮囲い・仮事務所などの仮施設費、仮設電力・用水などの水道光熱費等で、<b>仮設建物費を含む</b>。"},
  {n:274, src:"H28 施工 積算", cat:"積算", a:true, q:"複合単価は、材料持ちで施工する場合の費用の単価で、材料費・労務費・小運搬費・工具損料・仮設費など2種類以上の費用を合わせたものの単価をいう。", p:"複合単価は<b>2種類以上の費用を合わせた単価</b>（材料持ち施工）。"},
  {n:275, src:"R04 施工 積算", cat:"積算", a:true, q:"共通仮設は、複数の工事種目に共通して使用する仮設（仮囲い・現場事務所など）をいう。", p:"<b>共通仮設＝複数の工事種目に共通</b>して使用する仮設（建築数量積算基準）。"},
  {n:276, src:"R04 施工 積算", cat:"積算", a:true, q:"直接仮設は、工事種目ごとの複数の工事科目に共通して使用する仮設（遣方・墨出し・足場・養生等）をいう。", p:"<b>直接仮設＝工事種目ごとの複数の工事科目に共通</b>。遣方・墨出し・足場・躯体支保工・養生等で、費用は工事種目ごとに算出。"},
  {n:277, src:"R04 施工 積算", cat:"積算", a:true, q:"専用仮設は、工事種目ごとの工事科目で単独に使用する仮設で、山留め・支保工、コンクリート足場、鉄骨足場等が該当する。", p:"<b>専用仮設＝工事科目で単独に使用</b>。土工専用仮設（山留め・支保工）・コンクリート足場・鉄骨足場等。"},
  {n:278, src:"R04 施工 積算", cat:"積算", a:true, q:"専用仮設には、コンクリート足場が含まれる。", p:"コンクリート足場は<b>専用仮設</b>に該当する。"},
  {n:279, src:"R04 施工 積算", cat:"積算", a:true, q:"直接仮設には、遣方や墨出しが含まれる。", p:"直接仮設には<b>遣方・墨出し</b>・足場等が含まれる。"},
  {n:280, src:"R04 施工 積算", cat:"積算", a:false, q:"共通仮設には、土工事における山留めが含まれる。", p:"土工事の山留めは<b>専用仮設</b>に該当する。共通仮設に含まれるとするのは不適当。"},
  {n:281, src:"R01 施工 積算", cat:"積算", a:false, q:"直接仮設は、工事種目ごとの工事科目で単独に使用する仮設をいう。", p:"これは<b>専用仮設</b>の説明。直接仮設は工事種目ごとの複数の工事科目に共通して使用する仮設。"},
  {n:282, src:"R05 施工 積算", cat:"積算", a:false, q:"共通仮設費は、各工事種目ごとに必要となる仮設に要する費用とする。", p:"共通仮設費は<b>各工事種目に共通の仮設</b>に要する費用。各工事種目ごとに必要となる仮設は専用仮設であり不適当。"},
  {n:283, src:"R01 施工 積算", cat:"積算", a:true, q:"設計数量は、設計図書に記載されている個数や設計寸法から求めた長さ・面積・体積等の数量で、大部分の施工数量がこれに該当する。", p:"<b>設計数量</b>＝設計図書の個数・設計寸法から求めた数量（大部分の施工数量）。"},
  {n:284, src:"R01 施工 積算", cat:"積算", a:true, q:"所要数量は、定尺寸法による切り無駄や施工上やむを得ない損耗を含んだ数量をいう。", p:"<b>所要数量</b>＝切り無駄・損耗を含んだ数量（市場品寸法と設計寸法の違いで切り無駄が生じる）。"},
  {n:285, src:"R01 施工 積算", cat:"積算", a:true, q:"計画数量は、設計図書に基づいた施工計画により求めた数量で、仮設や土工の数量等がこれに該当する。", p:"<b>計画数量</b>＝施工計画により求めた数量（仮設・土工の数量等）。"},
  {n:286, src:"H28 施工 積算", cat:"積算", a:false, q:"設計数量は、定尺寸法による切り無駄及び施工上やむを得ない損耗を含んだ数量である。", p:"これは<b>所要数量</b>の説明。設計数量は設計図書の個数・設計寸法から求めた数量。"},
  {n:287, src:"H30 施工 積算", cat:"積算", a:true, q:"外部本足場の数量は、足場の中心（構築物等の外壁面から1.0mの位置）の水平長さと構築物等の上部までの高さによる面積として算出する。", p:"外部本足場は<b>足場の中心（外壁面から1.0m）の水平長さ×上部までの高さ</b>の面積（建築数量積算基準）。"},
  {n:288, src:"H30 施工 積算", cat:"積算", a:true, q:"土工事における土砂量は、掘削による増加や締固めによる減少を考慮しない地山数量として算出する。", p:"土砂量は<b>地山数量</b>（自然地盤そのままの数量。体積変化を考慮しない）とする。"},
  {n:289, src:"H30 施工 積算", cat:"積算", a:true, q:"鉄骨造の形鋼、鋼管及び平鋼の所要数量を求めるための設計数量に対する割増率は、5%とする。", p:"形鋼・鋼管・平鋼の所要数量の<b>割増率は5%</b>（建築数量積算基準）。"},
  {n:290, src:"H30 施工 積算", cat:"積算", a:false, q:"シート防水の数量は、シートの重ね代の面積を加えて算出する。", p:"シート防水等の<b>重ね代は計測の対象としない</b>。重ね代を加えるのは不適当。"},
  {n:291, src:"H30 施工 積算", cat:"積算", a:true, q:"壁仕上げ塗装で、開口部の面積が1箇所当たり0.5m²以下のときは、開口部による主仕上の欠除はないものとして算出する。", p:"開口部面積が<b>1箇所0.5m²以下</b>のときは主仕上の欠除はないものとする（建築数量積算基準）。"},
  {n:292, src:"R05 施工 積算", cat:"積算", a:true, q:"工事費の積算は、建築工事、電気設備工事、機械設備工事及び昇降機設備工事等の工事種別ごとに行う。", p:"工事費の積算は<b>工事種別ごと</b>に行う（公共建築工事積算基準）。"}
];

async function storeGet(k){
  try{ if(window.storage&&window.storage.get){const r=await window.storage.get(k);return r?r.value:null;} }catch(e){}
  try{ return localStorage.getItem(k); }catch(e){}
  return memStore[k]||null;
}
async function storeSet(k,v){
  try{ if(window.storage&&window.storage.set){await window.storage.set(k,v);return;} }catch(e){}
  try{ localStorage.setItem(k,v);return; }catch(e){}
  memStore[k]=v;
}
async function getWrong(){
  const raw=await storeGet(STORE_KEY);
  if(!raw) return [];
  try{ return JSON.parse(raw)||[]; }catch(e){ return []; }
}
async function setWrong(arr){ await storeSet(STORE_KEY, JSON.stringify([...new Set(arr)])); }
async function addWrong(n){ const w=await getWrong(); if(!w.includes(n)){w.push(n); await setWrong(w);} }
async function removeWrong(n){ let w=await getWrong(); w=w.filter(x=>x!==n); await setWrong(w); }

let queue=[], idx=0, correct=0, wrongThisRun=[], mode="all";
const el=id=>document.getElementById(id);
function topScroll(){ try{ window.scrollTo(0,0); }catch(e){} }
function show(sec){ ["home","quiz","result"].forEach(s=>el(s).classList.toggle("hide",s!==sec)); topScroll(); }

async function initHome(){
  el("totalN").textContent=QUESTIONS.length;
  const w=await getWrong();
  el("wrongN").textContent=w.length;
  el("wrongBtn").disabled=w.length===0;
  const setCount=Math.ceil(QUESTIONS.length/CHUNK);
  el("setList").innerHTML="";
  for(let i=0;i<setCount;i++){
    const s=i*CHUNK, e=Math.min(s+CHUNK, QUESTIONS.length);
    const b=document.createElement("button");
    b.className="btn cat-btn";
    b.innerHTML=`セット${i+1}（問${s+1}〜${e}）<span class="n">${e-s}問</span>`;
    b.addEventListener("click",()=>startSet(s,e));
    el("setList").appendChild(b);
  }
  const present=CAT_ORDER.filter(c=>QUESTIONS.some(q=>q.cat===c));
  el("catList").innerHTML="";
  present.forEach(c=>{
    const cnt=QUESTIONS.filter(q=>q.cat===c).length;
    const b=document.createElement("button");
    b.className="btn cat-btn";
    b.innerHTML=`${c}<span class="n">${cnt}問</span>`;
    b.addEventListener("click",()=>startCat(c));
    el("catList").appendChild(b);
  });
  show("home");
}

async function start(kind){
  mode=kind;
  if(kind==="wrong"||kind==="redo"){
    const src = kind==="wrong" ? await getWrong() : wrongThisRun.slice();
    queue=QUESTIONS.filter(q=>src.includes(q.n));
  }else{
    queue=QUESTIONS.slice();
  }
  if(queue.length===0){ await initHome(); return; }
  idx=0; correct=0; wrongThisRun=[];
  show("quiz"); render();
}
function startCat(c){
  mode="cat"; queue=QUESTIONS.filter(q=>q.cat===c);
  idx=0; correct=0; wrongThisRun=[];
  show("quiz"); render();
}
function startSet(s,e){
  mode="set"; queue=QUESTIONS.slice(s,e);
  idx=0; correct=0; wrongThisRun=[];
  show("quiz"); render();
}

function render(){
  const q=queue[idx];
  el("cur").textContent=idx+1;
  el("len").textContent=queue.length;
  el("barFill").style.width=((idx)/queue.length*100)+"%";
  el("src").textContent=q.src;
  el("catTag").textContent=q.cat;
  el("qtext").textContent=q.q;
  el("judge").className="judge";
  el("oxBtns").style.display="flex";
  [...el("oxBtns").children].forEach(b=>b.disabled=false);
  topScroll();
}

async function answer(val){
  if(el("judge").classList.contains("show")) return; // 二重回答防止
  const q=queue[idx];
  [...el("oxBtns").children].forEach(b=>b.disabled=true);
  const ok=(val===q.a);
  const j=el("judge");
  j.classList.add("show", ok?"ok":"ng");
  el("jhead").textContent= ok ? "正解 ◎" : "不正解 …";
  el("jans").textContent= "答え：" + (q.a?"○（正しい）":"×（誤り）");
  el("jp").innerHTML=q.p;
  el("barFill").style.width=((idx+1)/queue.length*100)+"%";
  el("nextBtn").textContent=(idx===queue.length-1)?"結果を見る":"次へ";
  if(ok){ correct++; await removeWrong(q.n); }
  else{ wrongThisRun.push(q.n); await addWrong(q.n); }
  // 「次へ」ボタンが画面内に来るようにスクロール
  setTimeout(()=>{ try{ el("nextBtn").scrollIntoView({behavior:"smooth", block:"center"}); }catch(e){} }, 80);
}

function next(){
  idx++;
  if(idx>=queue.length){ finish(); return; }
  render();
}

function finish(){
  const total=queue.length;
  const pct=Math.round(correct/total*100);
  const r=64, c=2*Math.PI*r;
  const fg=el("ringFg");
  fg.style.strokeDasharray=c;
  fg.style.strokeDashoffset=c;
  el("ringTxt").textContent=pct+"%";
  el("scoreLine").textContent=`${total}問中 ${correct}問 正解`;
  el("scoreSub").textContent= wrongThisRun.length ? `間違い ${wrongThisRun.length}問` : "全問正解！";
  el("redoBtn").style.display= wrongThisRun.length ? "block" : "none";
  show("result");
  requestAnimationFrame(()=>{ setTimeout(()=>{ fg.style.strokeDashoffset=c*(1-pct/100); },60); });
}

function goHome(){ initHome(); }

// イベントはまとめて確実にバインド（インラインonclickを使わない）
document.getElementById("startAllBtn").addEventListener("click",()=>start("all"));
document.getElementById("wrongBtn").addEventListener("click",()=>start("wrong"));
document.getElementById("btnMaru").addEventListener("click",()=>answer(true));
document.getElementById("btnBatsu").addEventListener("click",()=>answer(false));
document.getElementById("nextBtn").addEventListener("click",next);
document.getElementById("abortBtn").addEventListener("click",goHome);
document.getElementById("redoBtn").addEventListener("click",()=>start("redo"));
document.getElementById("restartBtn").addEventListener("click",()=>start("all"));
document.getElementById("homeBtn").addEventListener("click",goHome);

initHome();
</script>
</body>
</html>
